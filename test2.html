const SCORE_WEIGHTS = { cost: 0.35, leadTime: 0.25, quality: 0.25, moq: 0.15 };
let uid = 300;
const newId = () => "id" + (uid++);

function scoreSupplier(supplier, allSuppliers) {
  const parse = (v) => parseFloat(v) || 0;
  const vals = (key) => allSuppliers.map((s) => parse(s[key])).filter(Boolean);
  const norm = (val, arr, inv = false) => {
    if (!arr.length || !val) return 0;
    const [mn, mx] = [Math.min(...arr), Math.max(...arr)];
    if (mx === mn) return 100;
    const n = ((val - mn) / (mx - mn)) * 100;
    return Math.round(inv ? 100 - n : n);
  };
  const p = (k) => parse(supplier[k]);
  return Math.round(
    norm(p("cost"), vals("cost"), true) * SCORE_WEIGHTS.cost +
    norm(p("leadTime"), vals("leadTime"), true) * SCORE_WEIGHTS.leadTime +
    norm(p("quality"), vals("quality")) * SCORE_WEIGHTS.quality +
    norm(p("moq"), vals("moq"), true) * SCORE_WEIGHTS.moq
  );
}

function useDragSort(items, setItems) {
  const dragIdx = useRef(null);
  return {
    onDragStart: (i) => { dragIdx.current = i; },
    onDragOver: (e, i) => {
      e.preventDefault();
      if (dragIdx.current === null || dragIdx.current === i) return;
      const next = [...items];
      const [m] = next.splice(dragIdx.current, 1);
      next.splice(i, 0, m);
      dragIdx.current = i;
      setItems(next);
    },
    onDragEnd: () => { dragIdx.current = null; },
  };
}

// - ŃéóŃā╝Ńé½ŃéżŃā¢ (localStorage) -
const ARCHIVE_KEY = "shoury_archive_v1";
function loadArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]"); } catch { return []; }
}
function saveToArchive(snapshot) {
  const list = loadArchive();
  list.unshift(snapshot);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list.slice(0, 50)));
}
function deleteFromArchive(id) {
  const list = loadArchive().filter(s => s.id !== id);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list));
}

function exportBackup(theme, categories, parts, processes, matrix, archive) {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    current: { theme, categories, parts, processes, matrix },
    archive,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "shoury_backup_" + (new Date().toISOString().slice(0,10)) + ".json";
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !data.current) throw new Error("ÕĮóÕ╝ÅŃüīõĖŹµŁŻŃü¦ŃüÖ");
      onSuccess(data);
    } catch (err) {
      onError("Ķ¬ŁŃü┐ĶŠ╝Ńü┐Ńü½Õż▒µĢŚŃüŚŃüŠŃüŚŃü¤: " + err.message);
    }
  };
  reader.readAsText(file);
}

    // Header row 1: theme
    aoa.push([theme.name]);
    // Header row 2: category
    aoa.push(["ŃĆÉ" + (cat.name) + "ŃĆæ"]);

    // Process header row with arrows
    const procHeader = ["ķā©ÕōüÕÉŹ"];
    processes.forEach((proc, pi) => {
      procHeader.push(proc.name);
      if (pi < processes.length - 1) procHeader.push("ŌåÆ");
    });
    aoa.push(procHeader);

    // Each part row
    catParts.forEach(part => {
      const row = [part.name];
      processes.forEach((_, ci) => {
        const cell = getCell(part.id, ci);
        const sel = cell.suppliers.find(s => s.id === cell.selected);
        if (sel) {
          row.push(sel.name + "\n┬ź" + parseFloat(sel.cost || 0).toLocaleString() + "  LT:" + (sel.leadTime || "?") + "µŚź");
        } else {

          row.push(count > 0 ? "(" + (count) + "ńżŠµż£Ķ©ÄõĖŁ)" : "");
        }
        if (ci < processes.length - 1) row.push("ŌåÆ");
      });
      aoa.push(row);

      // Candidate rows (non-selected)
      const maxCandidates = Math.max(...processes.map((_, ci) => {
        const cell = getCell(part.id, ci);
        return (cell.suppliers || []).filter(s => s.id !== cell.selected).length;
      }), 0);

      for (let ri = 0; ri < maxCandidates; ri++) {
        const candRow = [""];
        processes.forEach((_, ci) => {
          const cell = getCell(part.id, ci);
          const others = (cell.suppliers || []).filter(s => s.id !== cell.selected);
          const s = others[ri];
          if (s) {

    });

    // Summary section
    aoa.push([]);
    aoa.push(["- Ńé│Ńé╣ŃāłķøåĶ©ł -"]);
    const summaryHeader = ["ķā©ÕōüÕÉŹ", ...processes.map(p => p.name), "ÕÉłĶ©ł"];
    aoa.push(summaryHeader);
    catParts.forEach(part => {
      let total = 0;
      const row = [part.name];
      processes.forEach((_, ci) => {
        const cell = getCell(part.id, ci);
        const sel = cell.suppliers.find(s => s.id === cell.selected);
        const cost = sel.cost ? parseFloat(sel.cost) : 0;

    const ws = XLSX.utils.aoa_to_sheet(aoa);

// - PDFÕć║ÕŖø’╝łŃāĢŃāŁŃā╝Õø│SVGŃéÆPDFÕī¢’╝ē -
// - PDFÕć║ÕŖø’╝łńÖĮĶāīµÖ»Ńā╗Õģ©ķā©Õōü/ķā©ÕōüŃüöŃü©’╝ē -
function buildPartSVG(themeName, partName, catName, procNames, getCell, partId) {
  var NW=190, NH=72, NGAP=8, CGAP=48, LW=130, HDRH=36, PAD=16;
  var cols = procNames.map(function(proc, ci) {
    var cell = getCell(partId, ci);
    return { proc: proc, suppliers: cell&&cell.suppliers?cell.suppliers:[], selected: cell?cell.selected:null, candidates: cell&&cell.candidates?cell.candidates:[] };
  });
  var maxRows = Math.max.apply(null, cols.map(function(c){return c.suppliers.length;}).concat([1]));
  var svgW = PAD + LW + procNames.length*NW + (procNames.length-1)*CGAP + PAD;
  var svgH = PAD + 20 + HDRH + maxRows*(NH+NGAP) + PAD;
  var out = [];
  out.push('<svg xmlns="http://www.w3.org/2000/svg" width="'+svgW+'" height="'+svgH+'" style="background:#fff;font-family:Arial,sans-serif">');
  out.push('<rect width="'+svgW+'" height="'+svgH+'" fill="#fff"/>');
  var titleY = PAD+14;
  out.push('<text x="'+PAD+'" y="'+titleY+'" font-size="13" font-weight="bold" fill="#1e293b">'+(catName?catName+' / ':'')+partName+'</text>');
  out.push('<text x="'+(svgW-PAD)+'" y="'+titleY+'" font-size="10" fill="#94a3b8" text-anchor="end">'+themeName+'</text>');
  var baseY = PAD+20;
  out.push('<rect x="'+PAD+'" y="'+(baseY+HDRH)+'" width="'+LW+'" height="'+(maxRows*(NH+NGAP))+'" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>');
  out.push('<text x="'+(PAD+LW/2)+'" y="'+(baseY+HDRH+maxRows*(NH+NGAP)/2+5)+'" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">'+partName+'</text>');
  out.push('<defs><marker id="ga" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#16a34a"/></marker></defs>');
  cols.forEach(function(col, ci) {
    var x = PAD+LW+ci*(NW+CGAP);
    out.push('<rect x="'+x+'" y="'+baseY+'" width="'+NW+'" height="'+HDRH+'" rx="6" fill="#334155"/>');
    out.push('<text x="'+(x+NW/2)+'" y="'+(baseY+HDRH/2+5)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">'+col.proc+'</text>');
    if (ci < cols.length-1) {
      var ay = baseY+HDRH/2;
      out.push('<line x1="'+(x+NW)+'" y1="'+ay+'" x2="'+(x+NW+CGAP-8)+'" y2="'+ay+'" stroke="#94a3b8" stroke-width="1.5"/>');
      out.push('<polygon points="'+(x+NW+CGAP-8)+','+(ay-4)+' '+(x+NW+CGAP)+','+ay+' '+(x+NW+CGAP-8)+','+(ay+4)+'" fill="#94a3b8"/>');
    }
    col.suppliers.forEach(function(s, si) {
      var ny = baseY+HDRH+si*(NH+NGAP);
      var isSel = s.id===col.selected;
      var isCand = col.candidates.indexOf(s.id)>=0;
      var bg = isSel?'#eff6ff':isCand?'#f8fafc':'#fff';
      var stroke = isSel?'#2563eb':'#e2e8f0';
      var sw2 = isSel?2:1;
      out.push('<rect x="'+x+'" y="'+ny+'" width="'+NW+'" height="'+NH+'" rx="7" fill="'+bg+'" stroke="'+stroke+'" stroke-width="'+sw2+'"/>');
      if (isSel) {
        out.push('<rect x="'+(x+4)+'" y="'+(ny-7)+'" width="30" height="12" rx="6" fill="#2563eb"/>');
        out.push('<text x="'+(x+19)+'" y="'+(ny+1)+'" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">&#x2713;µÄĪńö©</text>');
      } else if (isCand) {
        out.push('<rect x="'+(x+4)+'" y="'+(ny-7)+'" width="24" height="12" rx="6" fill="#64748b"/>');
        out.push('<text x="'+(x+16)+'" y="'+(ny+1)+'" text-anchor="middle" font-size="7" fill="#fff">ÕĆÖĶŻ£</text>');
      }
      out.push('<text x="'+(x+8)+'" y="'+(ny+18)+'" font-size="11" font-weight="'+(isSel?'bold':'normal')+'" fill="'+(isSel?'#1e3a8a':'#374151')+'">'+((s.name||'µ£¬ÕģźÕŖø').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))+'</text>');
      if (s.cost) out.push('<text x="'+(x+8)+'" y="'+(ny+34)+'" font-size="9" fill="#2563eb">&#165;'+parseFloat(s.cost).toLocaleString()+'</text>');
      if (s.leadTime) out.push('<text x="'+(x+8)+'" y="'+(ny+48)+'" font-size="9" fill="#64748b">LT:'+s.leadTime+'&#26085;</text>');
    });
    // µÄĪńö©Ńā½Ńā╝Ńāłń¤óÕŹ░
    if (ci>0) {
      var prev = cols[ci-1];
      if (prev.selected && col.selected) {
        var psi = prev.suppliers.findIndex(function(s){return s.id===prev.selected;});
        var csi2 = col.suppliers.findIndex(function(s){return s.id===col.selected;});
        if (psi>=0 && csi2>=0) {
          var px2 = PAD+LW+(ci-1)*(NW+CGAP)+NW;
          var py2 = baseY+HDRH+psi*(NH+NGAP)+NH/2;
          var cx3 = PAD+LW+ci*(NW+CGAP);
          var cy3 = baseY+HDRH+csi2*(NH+NGAP)+NH/2;
          out.push('<line x1="'+px2+'" y1="'+py2+'" x2="'+(cx3-6)+'" y2="'+cy3+'" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ga)"/>');
        }
      }
    }
  });
  out.push('</svg>');
  return out.join('');
}

function exportPDF(mode, themeName, targetParts, categories, processes, getCell) {
  var pages = [];
  if (mode==="all") {
    var svgs = targetParts.map(function(part) {
      var cat = categories.find(function(c){return c.id===part.categoryId;});
      return buildPartSVG(themeName, part.name, cat?cat.name:'', processes.map(function(p){return p.name;}), getCell, part.id);
    });
    pages.push('<div>'+svgs.join('<div style="height:24px"></div>')+'</div>');
  } else {
    targetParts.forEach(function(part, i) {
      var cat = categories.find(function(c){return c.id===part.categoryId;});
      var svg = buildPartSVG(themeName, part.name, cat?cat.name:'', processes.map(function(p){return p.name;}), getCell, part.id);
      pages.push('<div style="page-break-after:'+(i<targetParts.length-1?'always':'avoid')+'">'+svg+'</div>');
    });
  }
  var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>&#21830;&#27969;&#12501;&#12525;&#12540;&#22259;</title>'
    +'<style>body{margin:0;padding:16px;background:#fff}@media print{body{margin:0;padding:0}@page{size:landscape;margin:10mm}}</style>'
    +'</head><body>'+pages.join('')
    +'<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},600);};<\/scr'+'ipt>'
    +'</body></html>';
  var win = window.open('','_blank');
  if (win){win.document.write(html);win.document.close();}
}

// - ScoreBar -
function ScoreBar({ value }) {
  const color = value >= 70 ? "#22c55e" : value >= 40 ? "#f59e0b" : "#ef4444";

    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>

      </div>
      <span style={{ fontSize: 10, fontWeight: 700, color: color, minWidth: 24 }}>{value}</span>
    </div>
  );
}

function CellModal({ partName, processName, cellData, onUpdate, onClose, showConfirm }) {

    onUpdate({ ...cellData, suppliers: suppliers.filter(s => s.id !== id), selected: selected === id ? null : selected });
  }
  const changeSupplier = (id, key, val) => {
    onUpdate({ ...cellData, suppliers: suppliers.map(s => s.id === id ? { ...s, [key]: val } : s) });

const CROSS_LINKS_KEY = "shoury_crosslinks_v1";
function loadCrossLinks() { try { return JSON.parse(localStorage.getItem(CROSS_LINKS_KEY) || "{}"); } catch { return {}; } }
function saveCrossLinks(data) { localStorage.setItem(CROSS_LINKS_KEY, JSON.stringify(data)); }

const FNODE_W = 180, FNODE_GAP = 40, FLABEL_W = 148;

function FlowView({ partIds, parts, setParts, removePart, categories, processes, getCell, setCell, targetCostMap, setTargetCostMap, onOpenModal, themeId, showConfirm }) {
  var displayParts = partIds === "__all__" ? parts : parts.filter(function(p) { return partIds.indexOf(p.id) >= 0; });
  var [crossLinks, setCrossLinksRaw] = useState(function() {
    var all = loadCrossLinks(); return all[themeId] || [];
  });
  var [linkDialog, setLinkDialog] = useState(null); // { fromPartId, fromProcIdx, fromLabel }
  var nodeRefs = useRef({}); // key: "partId_ci" -> DOM el
  var containerRef = useRef(null);
  var [svgLines, setSvgLines] = useState([]);

  function saveCL(next) { var all = loadCrossLinks(); all[themeId] = next; saveCrossLinks(all); setCrossLinksRaw(next); }

  function addCrossLink(fromPartId, fromProcIdx, toPartId, toProcIdx) {
    var next = crossLinks.concat([{ id: newId(), fromPartId: fromPartId, fromProcIdx: fromProcIdx, toPartId: toPartId, toProcIdx: toProcIdx }]);
    saveCL(next); setLinkDialog(null);
  }
  function removeCrossLink(id) { saveCL(crossLinks.filter(function(l) { return l.id !== id; })); }

  var [arrowLines, setArrowLines] = useState([]);

  // DOMĶ©łµĖ¼Ńü¦SVGńĘÜÕ║¦µ©ÖŃéÆµø┤µ¢░
  // getRelPos: Ķ”üń┤ĀŃü«Ńé│Ńā│ŃāåŃāŖÕ¤║µ║¢Ńü«Õ║¦µ©ÖŃéÆĶ┐öŃüÖ’╝łŃé╣Ńé»ŃāŁŃā╝Ńā½Õ»ŠÕ┐£’╝ē
  function getRelPos(el, container) {
    var eRect = el.getBoundingClientRect();
    var cRect = container.getBoundingClientRect();
    // Ńé│Ńā│ŃāåŃāŖŃü«Ńé╣Ńé»ŃāŁŃā╝Ńā½ķćÅŃééÕŖĀń«Ś
    var scrollLeft = container.scrollLeft || 0;
    var scrollTop  = container.scrollTop  || 0;
    return {
      left:   eRect.left   - cRect.left + scrollLeft,
      right:  eRect.right  - cRect.left + scrollLeft,
      top:    eRect.top    - cRect.top  + scrollTop,
      bottom: eRect.bottom - cRect.top  + scrollTop,
      width:  eRect.width,
      height: eRect.height,
    };
  }

  function recalcLines() {
    if (!containerRef.current) return;
    var cont = containerRef.current;

    // ķā©Õōüķ¢ōÕÉłµĄüńĘÜ
    var lines = crossLinks.map(function(link) {
      var fromEl = nodeRefs.current[link.fromPartId + "_" + link.fromProcIdx];
      var toEl   = nodeRefs.current[link.toPartId   + "_" + link.toProcIdx];
      if (!fromEl || !toEl) return null;
      var fr = getRelPos(fromEl, cont);
      var tr = getRelPos(toEl,   cont);
      return { id: link.id,
        x1: fr.right,            y1: fr.top + fr.height / 2,
        x2: tr.left,             y2: tr.top + tr.height / 2 };
    }).filter(Boolean);
    setSvgLines(lines);

    // ÕĘźń©ŗķ¢ōµÄĪńö©ń¤óÕŹ░’╝łŃé╣ŃéŁŃāāŃāŚÕ»ŠÕ┐£’╝ē
    var arrows = [];
    displayParts.forEach(function(part) {
      var adoptedCols = [];
      processes.forEach(function(proc, ci) {
        var cell = getCell(part.id, ci);
        if (cell && cell.selected) adoptedCols.push(ci);
      });
      for (var i = 0; i < adoptedCols.length - 1; i++) {
        var fromCi = adoptedCols[i];
        var toCi   = adoptedCols[i + 1];
        var fromEl = nodeRefs.current[part.id + "_" + fromCi];
        var toEl   = nodeRefs.current[part.id + "_" + toCi];
        if (!fromEl || !toEl) continue;
        var pr  = getRelPos(fromEl, cont);
        var cr2 = getRelPos(toEl,   cont);
        arrows.push({
          id: part.id + "_arr_" + fromCi + "_" + toCi,
          x1: pr.right,            y1: pr.top  + pr.height  / 2,
          x2: cr2.left,            y2: cr2.top + cr2.height / 2,
          adopted: true,
          skip: (toCi - fromCi) > 1,
        });
      }
    });
    setArrowLines(arrows);
  }

  useEffect(function() {
    recalcLines();
  }, [crossLinks, displayParts.length, processes.length,
      displayParts.map(function(p) {
        return processes.map(function(proc, ci) {
          var cell = getCell(p.id, ci); return cell ? cell.selected : null;
        }).join(',');
      }).join('|')
  ]);

  // Ńé╣Ńé»ŃāŁŃā╝Ńā½Ńā╗Ńā¬ŃéĄŃéżŃé║µÖéŃééÕåŹĶ©łń«Ś
  useEffect(function() {
    window.addEventListener('scroll', recalcLines, true);
    window.addEventListener('resize', recalcLines);
    return function() {
      window.removeEventListener('scroll', recalcLines, true);
      window.removeEventListener('resize', recalcLines);

                    {part.name} ŌåÆ {proc}

            })}
          </div>
          <button onClick={function() { setLinkDialog(null); }}

            ŃéŁŃāŻŃā│Ńé╗Ńā½
          </button>
        </div>

      {/* SVGŃé¬Ńā╝ŃāÉŃā╝Ńā¼Ńéż’╝ÜÕĘźń©ŗķ¢ōń¤óÕŹ░ + ķā©Õōüķ¢ōÕÉłµĄüńĘÜ */}
      {(svgLines.length > 0 || arrowLines.length > 0) && (
        <svg style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 10, overflow: "visible", minWidth: "100%", minHeight: "100%" }}>
