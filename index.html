<!DOCTYPE html>
<html lang="ja"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>商流シミュレーター</title>
  <meta name="theme-color" content="#6366f1"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="商流"/>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{background:#020817}</style>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(x){x.unregister();});});
      caches.keys().then(function(k){k.forEach(function(x){caches.delete(x);});});
      window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js');});
    }
    window.onerror=function(msg,src,line,col,err){
      document.getElementById('root').innerHTML='<div style="color:red;padding:20px;font-family:monospace;background:#fff;white-space:pre">Error: '+msg+'\nLine: '+line+'\nSrc: '+src+'</div>';
    };
  </script>
</head><body>
  <div id="root"><div style="color:#fff;padding:40px;text-align:center">読み込み中...</div></div>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="text/babel" data-presets="react" src="./app-v23.js"></script>
</body></html>
