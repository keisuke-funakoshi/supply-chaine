// - フロービュー -
const CROSS_LINKS_KEY = "shoury_crosslinks_v1";
function loadCrossLinks() { try { return JSON.parse(localStorage.getItem(CROSS_LINKS_KEY) || "{}"); } catch { return {}; } }
function saveCrossLinks(data) { localStorage.setItem(CROSS_LINKS_KEY, JSON.stringify(data)); }

const FNODE_W = 180, FNODE_GAP = 40, FLABEL_W = 148;

function FlowView({ partIds, parts, setParts, removePart, categories, processes, getCell, setCell, targetCostMap, setTargetCostMap, onOpenModal, themeId, showConfirm }) {
  var displayParts = partIds === "__all__" ? parts : parts.filter(function(p) { return partIds.indexOf(p.id) >= 0; });
  var [crossLinks, setCrossLinksRaw] = useState(function() {
    var all = loadCrossLinks(); return all[themeId] || [];
  });
  var [linkDialog, setLinkDialog] = useState(null); // { fromPartId, fromProcIdx, fromLabel }
  var nodeRefs = useRef({}); // key: "partId_ci" -> DOM el
  var containerRef = useRef(null);
  var [svgLines, setSvgLines] = useState([]);

  function saveCL(next) { var all = loadCrossLinks(); all[themeId] = next; saveCrossLinks(all); setCrossLinksRaw(next); }

  function addCrossLink(fromPartId, fromProcIdx, toPartId, toProcIdx) {
    var next = crossLinks.concat([{ id: newId(), fromPartId: fromPartId, fromProcIdx: fromProcIdx, toPartId: toPartId, toProcIdx: toProcIdx }]);
    saveCL(next); setLinkDialog(null);
  }
  function removeCrossLink(id) { saveCL(crossLinks.filter(function(l) { return l.id !== id; })); }

  var [arrowLines, setArrowLines] = useState([]);

  // DOM計測でSVG線座標を更新
  // getRelPos: 要素のコンテナ基準の座標を返す（スクロール対応）
  function getRelPos(el, container) {
    var eRect = el.getBoundingClientRect();
    var cRect = container.getBoundingClientRect();
    // コンテナのスクロール量も加算
    var scrollLeft = container.scrollLeft || 0;
    var scrollTop  = container.scrollTop  || 0;
    return {
      left:   eRect.left   - cRect.left + scrollLeft,
      right:  eRect.right  - cRect.left + scrollLeft,
      top:    eRect.top    - cRect.top  + scrollTop,
      bottom: eRect.bottom - cRect.top  + scrollTop,
      width:  eRect.width,
      height: eRect.height,
    };
  }

  function recalcLines() {
    if (!containerRef.current) return;
    var cont = containerRef.current;

    // 部品間合流線
    var lines = crossLinks.map(function(link) {
      var fromEl = nodeRefs.current[link.fromPartId + "_" + link.fromProcIdx];
      var toEl   = nodeRefs.current[link.toPartId   + "_" + link.toProcIdx];
      if (!fromEl || !toEl) return null;
      var fr = getRelPos(fromEl, cont);
      var tr = getRelPos(toEl,   cont);
      return { id: link.id,
        x1: fr.right,            y1: fr.top + fr.height / 2,
        x2: tr.left,             y2: tr.top + tr.height / 2 };
    }).filter(Boolean);
    setSvgLines(lines);

    // 工程間採用矢印（スキップ対応）
    var arrows = [];
    displayParts.forEach(function(part) {
      var adoptedCols = [];
      processes.forEach(function(proc, ci) {
        var cell = getCell(part.id, ci);
        if (cell && cell.selected) adoptedCols.push(ci);
      });
      for (var i = 0; i < adoptedCols.length - 1; i++) {
        var fromCi = adoptedCols[i];
        var toCi   = adoptedCols[i + 1];
        var fromEl = nodeRefs.current[part.id + "_" + fromCi];
        var toEl   = nodeRefs.current[part.id + "_" + toCi];
        if (!fromEl || !toEl) continue;
        var pr  = getRelPos(fromEl, cont);
        var cr2 = getRelPos(toEl,   cont);
        arrows.push({
          id: part.id + "_arr_" + fromCi + "_" + toCi,
          x1: pr.right,            y1: pr.top  + pr.height  / 2,
          x2: cr2.left,            y2: cr2.top + cr2.height / 2,
          adopted: true,
          skip: (toCi - fromCi) > 1,
        });
      }
    });
    setArrowLines(arrows);
  }

  useEffect(function() {
    recalcLines();
  }, [crossLinks, displayParts.length, processes.length,
      displayParts.map(function(p) {
        return processes.map(function(proc, ci) {
          var cell = getCell(p.id, ci); return cell ? cell.selected : null;
        }).join(',');
      }).join('|')
  ]);

  // スクロール・リサイズ時も再計算
  useEffect(function() {
    window.addEventListener('scroll', recalcLines, true);
    window.addEventListener('resize', recalcLines);
    return function() {
      window.removeEventListener('scroll', recalcLines, true);
      window.removeEventListener('resize', recalcLines);
    };
  }, [crossLinks, displayParts.length, processes.length]);

  if (displayParts.length === 0) return (
    <div style={{ textAlign: "center", padding: "60px 20px", color: "#334155", border: "2px dashed #1e293b", borderRadius: 12 }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>📋</div>
      <p style={{ margin: 0, fontSize: 12 }}>上の「＋ 部品」ボタンで部品を追加してください</p>
    </div>
  );

  return (
    <div ref={containerRef} style={{ overflowX: "auto", overflowY: "visible", position: "relative" }}>
      {/* 部品間合流線ダイアログ */}
      {linkDialog && (
        <div style={{ background: "#0f172a", border: "1px solid #6366f1", borderRadius: 10, padding: "14px 16px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, color: "#a5b4fc", marginBottom: 10 }}>
            🔗 <strong>{linkDialog.fromLabel}</strong> から合流先を選択
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 200, overflowY: "auto" }}>
            {displayParts.map(function(part) {
              if (part.id === linkDialog.fromPartId) return null;
              return processes.map(function(proc, ci) {
                var cell = getCell(part.id, ci);
                var hasSup = cell && cell.suppliers && cell.suppliers.length > 0;
                if (!hasSup) return null;
                return (
                  <button key={part.id + "_" + ci}
                    onClick={function() { addCrossLink(linkDialog.fromPartId, linkDialog.fromProcIdx, part.id, ci); }}
                    style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "6px 12px", fontSize: 11, cursor: "pointer", textAlign: "left" }}>
                    {part.name} → {proc}
                  </button>
                );
              });
            })}
          </div>
          <button onClick={function() { setLinkDialog(null); }}
            style={{ marginTop: 10, background: "none", border: "1px solid #334155", borderRadius: 7, color: "#475569", padding: "4px 12px", fontSize: 11, cursor: "pointer" }}>
            キャンセル
          </button>
        </div>
      )}

      {/* SVGオーバーレイ：工程間矢印 + 部品間合流線 */}
      {(svgLines.length > 0 || arrowLines.length > 0) && (
        <svg style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 10, overflow: "visible", minWidth: "100%", minHeight: "100%" }}>
          <defs>
            <marker id="cl-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
              <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
            </marker>
            <marker id="gr-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
              <path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/>
            </marker>
            <marker id="gy-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
              <path d="M0,0 L7,3.5 L0,7 Z" fill="#334155"/>
            </marker>
          </defs>
          {/* 工程間矢印（スキップは曲線） */}
          {arrowLines.map(function(a) {
            var mx = (a.x1 + a.x2) / 2;
            var my = Math.min(a.y1, a.y2) - 30;
            var pathD = a.skip
              ? "M" + a.x1 + "," + a.y1 + " Q" + mx + "," + my + " " + a.x2 + "," + a.y2
              : null;
            return (
              <g key={a.id}>
                {a.adopted && !a.skip && <line x1={a.x1} y1={a.y1} x2={a.x2} y2={a.y2} stroke="#22c55e" strokeWidth={7} opacity={0.12}/>}
                {a.skip ? (
                  <path d={pathD} fill="none"
                    stroke="#22c55e" strokeWidth={2.5}
                    strokeDasharray="6,3"
                    markerEnd="url(#gr-arrow)" opacity={0.9}/>
                ) : (
                  <line x1={a.x1} y1={a.y1} x2={a.x2} y2={a.y2}
                    stroke="#22c55e" strokeWidth={2.5}
                    markerEnd="url(#gr-arrow)" opacity={1}/>
                )}
              </g>
            );
          })}
          {/* 部品間合流線 */}
          {svgLines.map(function(line) {
            return (
              <path key={line.id}
                d={"M" + line.x1 + "," + line.y1 + " C" + (line.x1+60) + "," + line.y1 + " " + (line.x2-60) + "," + line.y2 + " " + line.x2 + "," + line.y2}
                fill="none" stroke="#6366f1" strokeWidth={2.5} opacity={0.85} markerEnd="url(#cl-arrow)"/>
            );
          })}
        </svg>
      )}

      {/* 合流線削除ボタン（DOM要素で実装、確実にクリック可） */}
      {svgLines.map(function(line, idx) {
        var mx = (line.x1 + line.x2) / 2;
        var my = (line.y1 + line.y2) / 2;
        return (
          <div key={"del-" + line.id}
            onClick={function() { removeCrossLink(line.id); }}
            style={{ position: "absolute", left: mx - 10, top: my - 10, width: 20, height: 20, background: "#6366f1", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", zIndex: 20, fontSize: 12, color: "#fff", fontWeight: 700, userSelect: "none" }}>
            ×
          </div>
        );
      })}

      {/* 工程ヘッダー */}
      <div style={{ display: "flex", marginBottom: 8, marginLeft: FLABEL_W, position: "relative", zIndex: 1 }}>
        {processes.map(function(proc, ci) {
          return (
            <div key={ci} style={{ display: "flex", alignItems: "center", flexShrink: 0 }}>
              <div style={{ width: FNODE_W, background: "#1e293b", borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8" }}>{proc}</span>
              </div>
              {ci < processes.length - 1 && <div style={{ width: FNODE_GAP, flexShrink: 0 }}/>}
            </div>
          );
        })}
      </div>

      {/* 部品行 */}
      {displayParts.map(function(part, pi) {
        var cat = categories.find(function(c) { return c.id === part.categoryId; });
        var adoptedCost = processes.reduce(function(sum, proc, ci) {
          var cell = getCell(part.id, ci);
          var sel = cell && cell.suppliers ? cell.suppliers.find(function(s) { return s.id === cell.selected; }) : null;
          return sel && sel.cost ? sum + parseFloat(sel.cost) : sum;
        }, 0);
        var targetCost = targetCostMap[part.id] || "";
        var overBudget = targetCost && adoptedCost > parseFloat(targetCost);

        var partIdx = parts.indexOf(part);

        function movePart(dir) {
          var idx = parts.indexOf(part);
          var target = idx + dir;
          if (target < 0 || target >= parts.length) return;
          var next = parts.slice();
          var tmp = next[idx]; next[idx] = next[target]; next[target] = tmp;
          setParts(next);
        }

        return (
          <div key={part.id} style={{ display: "flex", marginBottom: 10, alignItems: "flex-start", position: "relative", zIndex: 1 }}>
            {/* 部品ラベル */}
            <div style={{ width: FLABEL_W, flexShrink: 0, background: "#0f172a", border: "1px solid " + (cat ? cat.color + "44" : "#1e293b"), borderRadius: 10, padding: "10px 10px", boxSizing: "border-box" }}>
              {cat && <div style={{ fontSize: 9, color: cat.color, fontWeight: 700, marginBottom: 3 }}>{cat.name}</div>}
              {/* 部品名（インライン編集） */}
              <input value={part.name}
                onChange={function(e) {
                  var next = parts.map(function(p) { return p.id === part.id ? Object.assign({}, p, { name: e.target.value }) : p; });
                  setParts(next);
                }}
                style={{ width: "100%", background: "transparent", border: "none", borderBottom: "1px solid #334155", color: "#f1f5f9", fontSize: 12, fontWeight: 800, outline: "none", marginBottom: 6, padding: "1px 0", boxSizing: "border-box" }}
              />
              {/* 上下移動・削除ボタン */}
              <div style={{ display: "flex", gap: 4, marginBottom: 6 }}>
                <button onClick={function() { movePart(-1); }}
                  style={{ flex: 1, background: partIdx === 0 ? "none" : "#1e293b", border: "1px solid #334155", borderRadius: 4, color: partIdx === 0 ? "#1e293b" : "#64748b", fontSize: 11, padding: "2px 0", cursor: partIdx === 0 ? "default" : "pointer" }}>↑</button>
                <button onClick={function() { movePart(1); }}
                  style={{ flex: 1, background: partIdx === parts.length - 1 ? "none" : "#1e293b", border: "1px solid #334155", borderRadius: 4, color: partIdx === parts.length - 1 ? "#1e293b" : "#64748b", fontSize: 11, padding: "2px 0", cursor: partIdx === parts.length - 1 ? "default" : "pointer" }}>↓</button>
                <button onClick={function() { showConfirm("「" + part.name + "」を削除しますか？", function() { removePart(part.id); }); }}
                  style={{ width: 26, background: "#1e293b", border: "1px solid #ef444433", borderRadius: 4, color: "#ef4444", fontSize: 11, padding: "2px 0", cursor: "pointer" }}>×</button>
              </div>
              <div style={{ fontSize: 9, color: "#475569", marginBottom: 2 }}>目標コスト</div>
              <input type="number" value={targetCost}
                onChange={function(e) { setTargetCostMap(function(prev) { var n = Object.assign({}, prev); n[part.id] = e.target.value; return n; }); }}
                placeholder="—"
                style={{ width: "100%", background: "#1e293b", border: "1px solid " + (overBudget ? "#ef4444" : "#334155"), borderRadius: 5, color: "#e2e8f0", padding: "3px 5px", fontSize: 10, outline: "none", boxSizing: "border-box" }}
              />
              {adoptedCost > 0 && (
                <div style={{ marginTop: 4, fontSize: 9, fontWeight: 700, color: overBudget ? "#ef4444" : "#22c55e" }}>
                  採用計 ¥{adoptedCost.toLocaleString()}
                  {overBudget && <div style={{ fontSize: 8, color: "#ef4444" }}>▲超過</div>}
                </div>
              )}
            </div>

            {/* 工程カラム */}
            <div style={{ display: "flex", alignItems: "stretch", flexShrink: 0 }}>
              {processes.map(function(proc, ci) {
                var cell = getCell(part.id, ci);
                var suppliers = cell && cell.suppliers ? cell.suppliers : [];
                var selected = cell ? cell.selected : null;
                var scores = suppliers.map(function(s) { return scoreSupplier(s, suppliers); });
                var maxScore = Math.max.apply(null, scores.concat([0]));
                return (
                  <div key={ci} style={{ display: "flex", alignItems: "center", flexShrink: 0 }}>
                    {/* 工程間スペース（矢印はSVGで描画） */}
                    {ci > 0 && <div style={{ width: FNODE_GAP, flexShrink: 0 }}/>}

                    {/* サプライヤーカード */}
                    <div style={{ width: FNODE_W, position: "relative" }}>
                      {suppliers.length === 0 ? (
                        <div onClick={function() { onOpenModal(part.id, part.name, ci); }}
                          style={{ minHeight: 80, border: "2px dashed #334155", borderRadius: 9, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#475569", fontSize: 13 }}>
                          <div>＋</div>
                          <div style={{ fontSize: 9, color: "#334155", marginTop: 2 }}>タップして登録</div>
                        </div>
                      ) : (
                        <div>
                          {suppliers.map(function(s, si) {
                            var isSel = s.id === selected;
                            // candidates: cell.candidates は候補IDの配列
                            var candidates = cell && cell.candidates ? cell.candidates : [];
                            var isCandidate = candidates.indexOf(s.id) >= 0;
                            // 状態: 採用 > 候補 > なし
                            // クリックで: なし→候補→採用→なし
                            var status = isSel ? "adopted" : isCandidate ? "candidate" : "none";
                            var score = scores[si];
                            var isWin = suppliers.length > 1 && score === maxScore && score > 0;
                            var sc = score >= 70 ? "#22c55e" : score >= 40 ? "#f59e0b" : "#ef4444";

                            // 採用サプライヤーにrefを付ける（矢印線用）
                            var refFn = isSel ? function(el) { if (el) nodeRefs.current[part.id + "_" + ci] = el; } : null;

                            // 背景・枠色
                            var bg = isSel ? "linear-gradient(135deg,#0c2040,#0a2a1a)"
                                   : isCandidate ? "#0f1a2e"
                                   : "#0a1220";
                            var borderColor = isSel ? "#0ea5e9"
                                           : isCandidate ? "#334155"
                                           : "#1e293b";
                            var borderW = isSel ? 2 : 1;
                            var nameColor = isSel ? "#f1f5f9" : isCandidate ? "#cbd5e1" : "#475569";

                            return (
                              <div key={s.id}
                                ref={refFn}
                                onClick={function() {
                                  var newCandidates = candidates.slice();
                                  var newSelected = selected;
                                  if (status === "none") {
                                    // なし → 候補
                                    newCandidates.push(s.id);
                                    newSelected = selected; // 採用は変えない
                                  } else if (status === "candidate") {
                                    // 候補 → 採用（他の採用を解除）
                                    newSelected = s.id;
                                  } else {
                                    // 採用 → なし（候補からも外す）
                                    newSelected = null;
                                    newCandidates = newCandidates.filter(function(id) { return id !== s.id; });
                                  }
                                  setCell(part.id, ci, Object.assign({}, cell, { selected: newSelected, candidates: newCandidates }));
                                }}
                                style={{ marginBottom: 4, minHeight: 64, background: bg, border: borderW + "px solid " + borderColor, borderRadius: 9, padding: "8px 10px", cursor: "pointer", position: "relative", userSelect: "none", opacity: status === "none" ? 0.5 : 1 }}>
                                {/* 状態バッジ */}
                                {isSel && <div style={{ position: "absolute", top: -8, left: 6, background: "#0ea5e9", color: "#fff", fontSize: 8, fontWeight: 800, padding: "1px 6px", borderRadius: 20 }}>✓採用</div>}
                                {isCandidate && !isSel && <div style={{ position: "absolute", top: -8, left: 6, background: "#334155", color: "#94a3b8", fontSize: 8, fontWeight: 700, padding: "1px 6px", borderRadius: 20 }}>候補</div>}
                                {isWin && !isSel && <div style={{ position: "absolute", top: -8, right: 6, background: "#22c55e", color: "#000", fontSize: 8, fontWeight: 800, padding: "1px 6px", borderRadius: 20 }}>推奨</div>}
                                {/* 状態インジケーター */}
                                <div style={{ position: "absolute", top: 6, right: 6, width: 6, height: 6, borderRadius: "50%", background: isSel ? "#0ea5e9" : isCandidate ? "#64748b" : "#1e293b" }}/>
                                <div style={{ fontSize: 11, fontWeight: 700, color: nameColor, paddingRight: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 3 }}>{s.name || ("S" + (si+1))}</div>
                                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                  {s.cost && <span style={{ fontSize: 10, color: "#0ea5e9" }}>¥{parseFloat(s.cost).toLocaleString()}</span>}
                                  {s.leadTime && <span style={{ fontSize: 10, color: "#64748b" }}>LT:{s.leadTime}日</span>}
                                </div>
                                <div style={{ marginTop: 5, height: 3, background: "#1e293b", borderRadius: 2, overflow: "hidden" }}>
                                  <div style={{ width: score + "%", height: "100%", background: sc, borderRadius: 2 }}/>
                                </div>
                                {/* タップヒント */}
                                <div style={{ position: "absolute", bottom: 4, right: 6, fontSize: 8, color: "#334155" }}>
                                  {status === "none" ? "tap→候補" : status === "candidate" ? "tap→採用" : "tap→解除"}
                                </div>
                              </div>
                            );
                          })}
                          <div style={{ display: "flex", gap: 4, marginTop: 2 }}>
                            <div onClick={function() { onOpenModal(part.id, part.name, ci); }}
                              style={{ flex: 1, border: "1px dashed #334155", borderRadius: 7, padding: "3px 0", textAlign: "center", cursor: "pointer", color: "#475569", fontSize: 10 }}>
                              ＋ 候補
                            </div>
                            <div onClick={function() { setLinkDialog({ fromPartId: part.id, fromProcIdx: ci, fromLabel: part.name + " / " + proc }); }}
                              title="部品間合流線を引く"
                              style={{ width: 28, border: "1px dashed #6366f155", borderRadius: 7, padding: "3px 0", textAlign: "center", cursor: "pointer", color: "#6366f1", fontSize: 12 }}>
                              🔗
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* 凡例 */}
      <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 10, color: "#475569", flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 20, height: 2, background: "#22c55e" }}/><div style={{ width: 0, height: 0, borderLeft: "7px solid #22c55e", borderTop: "4px solid transparent", borderBottom: "4px solid transparent" }}/>採用ルート（緑線）</div>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 20, height: 2, background: "#6366f1" }}/>部品間合流線（🔗で追加、×で削除）</div>
        <div style={{ color: "#334155" }}>カードをタップ: なし → 候補 → 採用 → なし</div>
      </div>
    </div>
  );
}

// - テーマデータ構造ヘルパー -
const THEMES_KEY = "shoury_themes_v1";
const ACTIVE_KEY = "shoury_active_v1";

function makeBlankThemeData(name = "新規開発テーマ") {
  const tid = newId();
  return {
    theme: { id: tid, name },
    categories: [],
    parts: [],
    processes: [
      { id: newId(), name: "材料調達" },
      { id: newId(), name: "部品加工" },
      { id: newId(), name: "組立" },
      { id: newId(), name: "検査・品質" },
      { id: newId(), name: "物流・納品" },
    ],
    matrix: {},
  };
}

function loadThemes() {
  try {
    const raw = localStorage.getItem(THEMES_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  // First launch — seed with sample data
  const sample = {
    theme: SAMPLE_THEME,
    categories: SAMPLE_CATEGORIES,
    parts: SAMPLE_PARTS,
    processes: SAMPLE_PROCESSES,
    matrix: SAMPLE_MATRIX,
  };
  const list = [sample];
  localStorage.setItem(THEMES_KEY, JSON.stringify(list));
  return list;
}

function saveThemes(list) {
  localStorage.setItem(THEMES_KEY, JSON.stringify(list));
}

function loadActiveId(themes) {
  const saved = localStorage.getItem(ACTIVE_KEY);
  if (saved && themes.find(t => t.theme.id === saved)) return saved;
  return themes[0].theme.id || null;
}

// - メインアプリ -
function App() {
  const [themes, setThemesRaw] = useState(() => loadThemes());
  const [activeThemeId, setActiveThemeIdRaw] = useState(() => loadActiveId(loadThemes()));
  const [modal, setModal] = useState(null);
  const [view, setView] = useState("flow");
  const [flowPartId, setFlowPartId] = useState(null);
  const [filterCatId, setFilterCatId] = useState(null);
  const [newPartName, setNewPartName] = useState("");
  const [newPartCatId, setNewPartCatId] = useState("");
  const [newProcName, setNewProcName] = useState("");
  const [archive, setArchive] = useState(() => loadArchive());
  const [importError, setImportError] = useState("");
  const importFileRef = useRef(null);
  const [confirmModal, setConfirmModal] = useState(null);
  const [targetCostMap, setTargetCostMap] = useState({}); // { message, onOk }

  const showConfirm = (message, onOk) => setConfirmModal({ message, onOk });

  // - アクティブテーマデータの読み書き -
  const activeData = themes.find(t => t.theme.id === activeThemeId) || themes[0] || makeBlankThemeData();
  const theme = activeData.theme;
  const categories = activeData.categories || [];
  const parts = activeData.parts || [];
  const processes = activeData.processes || SAMPLE_PROCESSES;
  const matrix = activeData.matrix || {};

  const updateActiveData = (patch) => {
    const next = themes.map(t => {
      t.theme.id === activeThemeId ? { ...t, ...patch } : t;
    }
    );
    setThemesRaw(next);
    saveThemes(next);
  };

  const setTheme = (val) => updateActiveData({ theme: val });
  const setCategories = (val) => updateActiveData({ categories: val });
  const setParts = (val) => updateActiveData({ parts: val });
  const setProcesses = (val) => updateActiveData({ processes: val });

  const setActiveThemeId = (id) => {
    setActiveThemeIdRaw(id);
    localStorage.setItem(ACTIVE_KEY, id);
    setFlowPartId(null);
    setFilterCatId(null);
    setView("matrix");
  };

  // - テーマ追加・削除 -
  const addTheme = () => {
    const blank = makeBlankThemeData();
    const next = [...themes, blank];
    setThemesRaw(next);
    saveThemes(next);
    setActiveThemeId(blank.theme.id);
    setView("theme");
  };

  const deleteTheme = (id) => {
    if (themes.length <= 1) { showConfirm("最後のテーマは削除できません", () => {}); return; }
    showConfirm("このテーマを削除しますか？", () => {
      const next = themes.filter(t => t.theme.id !== id);
      setThemesRaw(next);
      saveThemes(next);
      if (activeThemeId === id) setActiveThemeId(next[0].theme.id);
    });
  };

  const getCell = useCallback((partId, ci) => matrix[(partId) + "_" + (ci)] || { suppliers: [], selected: null }, [matrix]);
  const setCell = (partId, ci, data) => {
    const next = themes.map(t => {
      t.theme.id === activeThemeId ? { ...t, matrix: { ...t.matrix, [(partId) + "_" + (ci)]: data } } : t;
    }
    );
    setThemesRaw(next);
    saveThemes(next);
  };

  const setMatrix = (newMatrix) => {
    updateActiveData({ matrix: newMatrix });
  };

  const handleExportBackup = () => {
    exportBackup(theme, categories, parts, processes, matrix, archive);
  };

  const handleImportBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("");
    importBackup(file, (data) => {
      const c = data.current;
      const restored = [{ theme: c.theme, categories: c.categories, parts: c.parts, processes: c.processes, matrix: c.matrix }];
      setThemesRaw(restored);
      saveThemes(restored);
      setActiveThemeId(c.theme.id);
      if (data.archive) {
        localStorage.setItem(ARCHIVE_KEY, JSON.stringify(data.archive));
        setArchive(data.archive);
      }
      setView("matrix");
    }, (err) => setImportError(err));
    e.target.value = "";
  };

  // 完了してアーカイブへ
  const completeAndArchive = () => { showConfirm("「" + (theme.name) + "」をアーカイブに保存して新規テーマを開始しますか？", _doComplete); };
  const _doComplete = () => {
    const completedCellsNow = parts.reduce((cnt, part) => {
      cnt + processes.filter((_, ci) => getCell(part.id, ci).selected != null).length, 0);
    }
    const totalCellsNow = parts.length * processes.length;
    const totalCostNow = parts.reduce((sum, part) => {
      sum + processes.reduce((s2, _, ci) => { const cell = getCell(part.id, ci); const sel = cell.suppliers.find(s => s.id === cell.selected); return sel.cost ? s2 + parseFloat(sel.cost) : s2; }, 0), 0);
    }
    const snapshot = {
      id: newId(),
      archivedAt: new Date().toISOString(),
      theme, categories, parts, processes, matrix,
      completedCells: completedCellsNow, totalCells: totalCellsNow, totalCost: totalCostNow,
    };
    saveToArchive(snapshot);
    setArchive(loadArchive());
    // このテーマをリセット（削除ではなくクリア）
    const blankData = makeBlankThemeData();
    updateActiveData({ ...blankData, theme: { ...blankData.theme, name: "新規開発テーマ" }, originArchiveId: null });
    setView("archive");
  };

  const deleteArchiveItem = (id) => {
    deleteFromArchive(id);
    setArchive(loadArchive());
  };

  const restoreArchiveItem = (snap) => {
    showConfirm("現在の作業を破棄してこのアーカイブを復元しますか？", () => {
      updateActiveData({ theme: snap.theme, categories: snap.categories, parts: snap.parts, processes: snap.processes, matrix: snap.matrix });
      setView("matrix");
    });
  };

  // アーカイブから新規テーマとして再編集
  const editFromArchive = (snap) => {
    const newTheme = { ...snap.theme, id: newId(), name: snap.theme.name + " (再編集)" };
    const newEntry = {
      theme: newTheme,
      categories: snap.categories,
      parts: snap.parts,
      processes: snap.processes,
      matrix: snap.matrix,
      originArchiveId: snap.id,   // 元のアーカイブIDを記録
    };
    const next = [...themes, newEntry];
    setThemesRaw(next);
    saveThemes(next);
    setActiveThemeId(newTheme.id);
    setView("flow");
  };

  // 再編集テーマをアーカイブに保存（上書き or 別名）
  const saveEditedToArchive = (overwrite) => {
    const activeEntry = themes.find(t => t.theme.id === activeThemeId);
    const origId = activeEntry.originArchiveId;

    const completedCellsNow = parts.reduce((cnt, part) => {
      cnt + processes.filter((_, ci) => getCell(part.id, ci).selected != null).length, 0);
    }
    const totalCellsNow = parts.length * processes.length;
    const totalCostNow = parts.reduce((sum, part) => {
      sum + processes.reduce((s2, _, ci) => { const cell = getCell(part.id, ci); const sel = cell.suppliers.find(s => s.id === cell.selected); return sel.cost ? s2 + parseFloat(sel.cost) : s2; }, 0), 0);
    }

    const snapshot = {
      id: (overwrite && origId) ? origId : newId(),
      archivedAt: new Date().toISOString(),
      theme, categories, parts, processes, matrix,
      completedCells: completedCellsNow,
      totalCells: totalCellsNow,
      totalCost: totalCostNow,
    };

    if (overwrite && origId) {
      // 元のアーカイブを上書き
      const list = loadArchive().map(s => s.id === origId ? snapshot : s);
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list));
    } else {
      // 新規追加
      saveToArchive(snapshot);
    }
    setArchive(loadArchive());

    // originArchiveId を更新して次回も上書き可能にする
    updateActiveData({ originArchiveId: snapshot.id });

    setView("archive");
  };

  const [pdfMode, setPdfMode] = useState("all"); // "all" | "each"

  const handleExportPdf = () => {
    var targetParts;
    if (!flowPartId || flowPartId === "__all__") {
      targetParts = parts;
    } else if (flowPartId.indexOf("cat:") === 0) {
      var catId = flowPartId.slice(4);
      targetParts = parts.filter(p => p.categoryId === catId);
    } else {
      targetParts = parts.filter(p => p.id === flowPartId);
    }
    if (!targetParts.length) return;
    exportPDF(pdfMode, theme.name, targetParts, categories, processes, getCell);
  };

  const partDrag = useDragSort(parts, setParts);
  const procDrag = useDragSort(processes, setProcesses);

  const addPart = () => {
    const name = newPartName.trim();
    const catId = newPartCatId || categories[0].id;
    if (!name || !catId) return;
    // 同一名・同一大分類の重複防止
    const exists = parts.some(p => p.name === name && p.categoryId === catId);
    if (exists) {
      showConfirm('「' + name + '」は既に存在します。それでも追加しますか？', () => {
        const next = [...parts, { id: newId(), categoryId: catId, name }];
        setParts(next);
        setNewPartName("");
      });
      return;
    }
    setParts([...parts, { id: newId(), categoryId: catId, name }]);
    setNewPartName("");
  };
  const removePart = (id) => setParts(parts.filter(p => p.id !== id));

  const addProcess = () => {
    const name = newProcName.trim() || "工程" + (processes.length + 1);
    setProcesses([...processes, { id: newId(), name }]);
    setNewProcName("");
  };
  const removeProcess = (id) => setProcesses(processes.filter(p => p.id !== id));

  // 集計
  const totalCost = parts.reduce((sum, part) => {
    sum + processes.reduce((s2, _, ci) => { const cell = getCell(part.id, ci); const sel = cell.suppliers.find(s => s.id === cell.selected); return sel.cost ? s2 + parseFloat(sel.cost) : s2; }, 0), 0);
  }
  const completedCells = parts.reduce((cnt, part) => {
    cnt + processes.filter((_, ci) => getCell(part.id, ci).selected != null).length, 0);
  }
  const totalCells = parts.length * processes.length;

  const displayParts = filterCatId ? parts.filter(p => p.categoryId === filterCatId) : parts;
  const currentFlowPart = parts.find(p => p.id === flowPartId) || parts[0];
  const getCatById = (id) => categories.find(c => c.id === id);

  return (
    <div style={{ minHeight: "100vh", background: "#020817", color: "#e2e8f0", fontFamily: "'Inter','Noto Sans JP',sans-serif" }}>
      {/* - ヘッダー - */}
      <div style={{ borderBottom: "1px solid #1e293b", padding: "9px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: "rgba(2,8,23,0.97)", backdropFilter: "blur(8px)", zIndex: 100, gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
          <div style={{ width: 24, height: 24, background: "linear-gradient(135deg,#6366f1,#0ea5e9)", borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>⛓</div>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 9, color: "#475569", letterSpacing: "0.08em" }}>作業中テーマ</div>
            <div style={{ fontSize: 13, fontWeight: 800, color: "#f1f5f9", maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{theme.name}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" }}>
          {[["themes","📋 テーマ一覧"], ["theme","⚙ 設定"], ["flow","フロー図"], ["summary","サマリー"], ["archive","📁 アーカイブ"]].map(([v, label]) => (
            <button key={v} onClick={() => setView(v)}
              style={{ background: view === v ? "linear-gradient(135deg,#6366f1,#0ea5e9)" : "#1e293b", border: "none", borderRadius: 7, color: view === v ? "#fff" : "#64748b", padding: "6px 11px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              {label}
            </button>
          ))}
          <div style={{ width: 1, height: 24, background: "#1e293b", margin: "0 4px" }} />
          {/* Export buttons */}
          <button onClick={() => exportExcel(theme, categories, parts, processes, getCell)}
            style={{ background: "#14532d", border: "1px solid #22c55e33", borderRadius: 7, color: "#22c55e", padding: "6px 11px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
            📊 Excel
          </button>
          {view === "flow" && (
            <>
              <select value={pdfMode} onChange={e => setPdfMode(e.target.value)}
                style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 8px", fontSize: 11, outline: "none", cursor: "pointer" }}>
                <option value="all">全部品まとめて</option>
                <option value="each">部品ごとに改ページ</option>
              </select>
              <button onClick={handleExportPdf}
                style={{ background: "#450a0a", border: "1px solid #ef444433", borderRadius: 7, color: "#ef4444", padding: "6px 11px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                📄 PDF出力
              </button>
            </>
          )}
          {/* 再編集テーマの場合: 上書き・別名保存ボタン */}
          {themes.find(t => t.theme.id === activeThemeId).originArchiveId && (
            <>
              <button onClick={() => showConfirm("元のアーカイブを上書き保存しますか？", () => saveEditedToArchive(true))}
                style={{ background: "#0f2a1a", border: "1px solid #22c55e55", borderRadius: 7, color: "#22c55e", padding: "6px 11px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                💾 上書き保存
              </button>
              <button onClick={() => showConfirm("新しいアーカイブとして別名保存しますか？", () => saveEditedToArchive(false))}
                style={{ background: "#0c2040", border: "1px solid #0ea5e955", borderRadius: 7, color: "#0ea5e9", padding: "6px 11px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                💾 別名保存
              </button>
            </>
          )}
          <button onClick={() => completeAndArchive()}
            style={{ background: "#1c1c3a", border: "1px solid #6366f133", borderRadius: 7, color: "#a5b4fc", padding: "6px 11px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
            ✅ 完了
          </button>
          <div style={{ marginLeft: 4, textAlign: "right", borderLeft: "1px solid #1e293b", paddingLeft: 10 }}>
            <div style={{ fontSize: 9, color: "#475569" }}>確定 / 全セル</div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#22c55e" }}>{completedCells} / {totalCells}</div>
          </div>
          {totalCost > 0 && (
            <div style={{ borderLeft: "1px solid #1e293b", paddingLeft: 10, textAlign: "right" }}>
              <div style={{ fontSize: 9, color: "#475569" }}>累計コスト</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#0ea5e9" }}>¥{totalCost.toLocaleString()}</div>
            </div>
          )}
        </div>
      </div>

      <div style={{ padding: "24px 22px 48px" }}>

        {/* - テーマ一覧 - */}
        {view === "themes" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div>
                <h2 style={{ color: "#f1f5f9", fontSize: 18, fontWeight: 800, margin: "0 0 4px" }}>📋 開発テーマ一覧</h2>
                <p style={{ color: "#475569", fontSize: 12, margin: 0 }}>テーマを選んで作業を切り替えます。新しいテーマを追加することもできます。</p>
              </div>
              <button onClick={addTheme}
                style={{ background: "linear-gradient(135deg,#6366f1,#0ea5e9)", border: "none", borderRadius: 10, color: "#fff", padding: "10px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                ＋ テーマを追加
              </button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
              {themes.map(t => {
                const tParts = t.parts || [];
                const tProcs = t.processes || [];
                const tCats = t.categories || [];
                const tMatrix = t.matrix || {};
                const tCompleted = tParts.reduce((cnt, part) => {
                  cnt + tProcs.filter((_, ci) => (tMatrix[(part.id) + "_" + (ci)].selected != null)).length, 0);
                }
                const tTotal = tParts.length * tProcs.length;
                const tCost = tParts.reduce((sum, part) => {
                  sum + tProcs.reduce((s2, _, ci) => { const cell = tMatrix[(part.id) + "_" + (ci)]; const sel = cell.suppliers.find(s => s.id === cell.selected); return sel.cost ? s2 + parseFloat(sel.cost) : s2; }, 0), 0);
                }
                const isActive = t.theme.id === activeThemeId;
                const prog = tTotal > 0 ? Math.round(tCompleted / tTotal * 100) : 0;
                return (
                  <div key={t.theme.id}
                    onClick={() => { setActiveThemeId(t.theme.id); setView("matrix"); }}
                    style={{ background: isActive ? "linear-gradient(135deg,#0c1a3a,#0a2a1a)" : "#0f172a", border: "2px solid " + (isActive ? "#6366f1" : "#1e293b"), borderRadius: 14, padding: "18px 20px", cursor: "pointer", transition: "border-color 0.2s", position: "relative" }}>
                    {isActive && (
                      <div style={{ position: "absolute", top: -10, left: 14, background: "linear-gradient(135deg,#6366f1,#0ea5e9)", color: "#fff", fontSize: 9, fontWeight: 800, padding: "2px 10px", borderRadius: 20 }}>作業中</div>
                    )}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                      <div style={{ fontSize: 14, fontWeight: 800, color: "#f1f5f9", flex: 1, marginRight: 8 }}>{t.theme.name}</div>
                      {themes.length > 1 && (
                        <button onClick={e => { e.stopPropagation(); deleteTheme(t.theme.id); }}
                          style={{ background: "none", border: "1px solid #334155", borderRadius: 6, color: "#475569", width: 22, height: 22, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>×</button>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, color: "#64748b" }}>📦 {tParts.length}部品</span>
                      <span style={{ fontSize: 11, color: "#64748b" }}>🗂 {tCats.length}大分類</span>
                      {tCost > 0 && <span style={{ fontSize: 11, color: "#0ea5e9", fontWeight: 600 }}>¥{tCost.toLocaleString()}</span>}
                    </div>
                    {/* 大分類チップ */}
                    {tCats.length > 0 && (
                      <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 12 }}>
                        {tCats.map(cat => (
                          <span key={cat.id} style={{ fontSize: 10, background: (cat.color || "#6366f1") + "22", color: cat.color || "#6366f1", border: "1px solid " + ((cat.color || "#6366f1")) + "44", borderRadius: 20, padding: "1px 8px" }}>{cat.name}</span>
                        ))}
                      </div>
                    )}
                    {/* 進捗バー */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 4, background: "#1e293b", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ width: prog + "%", height: "100%", background: prog === 100 ? "#22c55e" : "#6366f1", borderRadius: 2, transition: "width 0.4s" }} />
                      </div>
                      <span style={{ fontSize: 10, color: prog === 100 ? "#22c55e" : "#475569", minWidth: 40 }}>{tCompleted}/{tTotal}</span>
                    </div>
                    <div style={{ marginTop: 12, fontSize: 11, color: isActive ? "#6366f1" : "#334155", fontWeight: isActive ? 600 : 400 }}>
                      {isActive ? "← 現在作業中" : "クリックして切り替え →"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* - テーマ設定 - */}
        {view === "theme" && (
          <ThemePanel theme={theme} setTheme={setTheme} categories={categories} setCategories={setCategories} parts={parts} setParts={setParts} showConfirm={showConfirm} />
        )}

        {/* - マトリクス - */}
        {view === "matrix" && (
          <div>
            {/* ツールバー */}
            <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <select
                  value={newPartCatId || categories[0].id || ""}
                  onChange={e => setNewPartCatId(e.target.value)}
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#94a3b8", padding: "5px 8px", fontSize: 12, outline: "none" }}
                >
                  {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <input value={newPartName} onChange={e => setNewPartName(e.target.value)} onKeyDown={e => e.key === "Enter" && addPart()} placeholder="部品名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 110 }} />
                <button onClick={addPart} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 部品</button>
              </div>
              <div style={{ width: 1, height: 24, background: "#1e293b" }} />
              <div style={{ display: "flex", gap: 6 }}>
                <input value={newProcName} onChange={e => setNewProcName(e.target.value)} onKeyDown={e => e.key === "Enter" && addProcess()} placeholder="工程名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 110 }} />
                <button onClick={addProcess} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 工程</button>
              </div>
            </div>

            {/* 大分類フィルタ */}
            <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
              <button onClick={() => setFilterCatId(null)}
                style={{ background: filterCatId === null ? "#1e293b" : "transparent", border: "1px solid " + (filterCatId === null ? "#475569" : "#1e293b"), borderRadius: 20, color: filterCatId === null ? "#e2e8f0" : "#475569", padding: "4px 12px", fontSize: 11, cursor: "pointer" }}>
                すべて
              </button>
              {categories.map(cat => (
                <button key={cat.id} onClick={() => setFilterCatId(filterCatId === cat.id ? null : cat.id)}
                  style={{ background: filterCatId === cat.id ? cat.color + "22" : "transparent", border: "1px solid " + (filterCatId === cat.id ? cat.color : "#1e293b"), borderRadius: 20, color: filterCatId === cat.id ? cat.color : "#475569", padding: "4px 12px", fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: cat.color, display: "inline-block" }} />
                  {cat.name}
                </button>
              ))}
            </div>

            {/* テーブル */}
            <div style={{ overflowX: "auto" }}>
              <table style={{ borderCollapse: "separate", borderSpacing: 0, minWidth: 600 }}>
                <thead>
                  <tr>
                    {/* 大分類列 */}
                    <th style={{ width: 10, padding: 0 }} />
                    <th style={{ width: 110, minWidth: 90 }} />
                    {processes.map((proc, ci) => (
                      <th key={proc.id} draggable onDragStart={() => procDrag.onDragStart(ci)} onDragOver={e => procDrag.onDragOver(e, ci)} onDragEnd={procDrag.onDragEnd}
                        style={{ padding: "0 5px 8px", minWidth: 140, cursor: "grab" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "7px 10px" }}>
                          <span style={{ color: "#334155", fontSize: 12, marginRight: 4, flexShrink: 0 }}>⠿</span>
                          <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", flex: 1, textAlign: "center" }}>{proc.name}</span>
                          <button onClick={() => showConfirm("「" + (proc.name) + "」を削除しますか？", () => removeProcess(proc.id))} style={{ background: "none", border: "none", color: "#334155", cursor: "pointer", fontSize: 13, padding: 0, lineHeight: 1 }}>×</button>
                        </div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {/* 大分類ごとにグループ化して表示 */}
                  {categories.map(cat => {
                    const catParts = displayParts.filter(p => p.categoryId === cat.id);
                    if (catParts.length === 0) return null;
                    return catParts.map((part, pi) => (
                      <tr key={part.id} draggable onDragStart={() => partDrag.onDragStart(parts.indexOf(part))} onDragOver={e => partDrag.onDragOver(e, parts.indexOf(part))} onDragEnd={partDrag.onDragEnd}>
                        {/* 大分類カラーバー（グループの先頭行のみラベル） */}
                        <td style={{ padding: "0 0 7px 0", verticalAlign: "top" }}>
                          <div style={{ width: 4, height: "100%", minHeight: 64, background: pi === 0 ? cat.color : cat.color + "44", borderRadius: 4, marginRight: 4 }} />
                        </td>
                        {/* 部品名 */}
                        <td style={{ padding: "0 8px 7px 4px", verticalAlign: "top", cursor: "grab" }}>
                          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "8px 10px" }}>
                            {pi === 0 && (
                              <div style={{ fontSize: 9, color: cat.color, fontWeight: 700, marginBottom: 4, letterSpacing: "0.05em" }}>{cat.name}</div>
                            )}
                            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                              <span style={{ color: "#334155", fontSize: 13 }}>⠿</span>
                              <span style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0", flex: 1 }}>{part.name}</span>
                              <button onClick={() => showConfirm("「" + (part.name) + "」を削除しますか？", () => removePart(part.id))} style={{ background: "none", border: "none", color: "#334155", cursor: "pointer", fontSize: 13, padding: 0, lineHeight: 1 }}>×</button>
                            </div>
                          </div>
                        </td>
                        {processes.map((_, ci) => (
                          <td key={ci} style={{ padding: "0 5px 7px" }}>
                            <MatrixCell cellData={getCell(part.id, ci)} onClick={() => setModal({ partId: part.id, partName: part.name, processIdx: ci })} />
                          </td>
                        ))}
                      </tr>
                    ));
                  })}
                </tbody>
              </table>
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 14, fontSize: 10, color: "#475569" }}>
              {[{ color: "#22c55e", label: "採用確定" }, { color: "#f59e0b", label: "検討中" }, { color: "#1e293b", label: "未着手" }].map(l => (
                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: l.color }} />{l.label}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* - フロービュー（マトリクス統合） - */}
        {view === "flow" && (
          <div>
            {/* - ツールバー：部品・工程追加 - */}
            <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <select value={newPartCatId || categories[0].id || ""} onChange={e => setNewPartCatId(e.target.value)}
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#94a3b8", padding: "5px 8px", fontSize: 12, outline: "none" }}>
                  {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <input id="new-part-input" value={newPartName} onChange={e => setNewPartName(e.target.value)} onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addPart(); } }} placeholder="部品名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 100 }} />
                <button onClick={addPart} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 部品</button>
              </div>
              <div style={{ width: 1, height: 20, background: "#1e293b" }} />
              <div style={{ display: "flex", gap: 6 }}>
                <input value={newProcName} onChange={e => setNewProcName(e.target.value)} onKeyDown={e => e.key === "Enter" && addProcess()} placeholder="工程名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 100 }} />
                <button onClick={addProcess} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 工程</button>
              </div>
            </div>

            {/* - 大分類タブ - */}
            <div style={{ borderBottom: "2px solid #1e293b", marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 0, overflowX: "auto" }}>
                {/* すべてタブ */}
                <button onClick={() => setFlowPartId("__all__")}
                  style={{ background: "none", border: "none", borderBottom: "3px solid " + ((!flowPartId || flowPartId === "__all__") ? "#6366f1" : "transparent"), color: (!flowPartId || flowPartId === "__all__") ? "#e2e8f0" : "#475569", padding: "8px 16px", fontSize: 12, fontWeight: (!flowPartId || flowPartId === "__all__") ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap", marginBottom: -2 }}>
                  すべて
                </button>
                {/* 大分類タブ */}
                {categories.map(cat => {
                  const catParts = parts.filter(p => p.categoryId === cat.id);
                  if (!catParts.length) return null;
                  const isActive = flowPartId === "cat:" + cat.id || catParts.some(p => p.id === flowPartId);
                  return (
                    <button key={cat.id} onClick={() => setFlowPartId("cat:" + cat.id)}
                      style={{ background: "none", border: "none", borderBottom: "3px solid " + (isActive ? cat.color : "transparent"), color: isActive ? cat.color : "#475569", padding: "8px 16px", fontSize: 12, fontWeight: isActive ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap", marginBottom: -2, display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: cat.color, flexShrink: 0 }}/>
                      {cat.name}
                    </button>
                  );
                })}
              </div>
              {/* 選択中の大分類内の部品タブ（2段目） */}
              {flowPartId && flowPartId !== "__all__" && (() => {
                const activeCatId = flowPartId.startsWith("cat:") ? flowPartId.slice(4)
                  : parts.find(p => p.id === flowPartId).categoryId;
                const activeCat = categories.find(c => c.id === activeCatId);
                const catParts = parts.filter(p => p.categoryId === activeCatId);
                if (!catParts.length || !activeCat) return null;
                return (
                  <div style={{ display: "flex", gap: 0, paddingLeft: 8, overflowX: "auto", borderTop: "1px solid #1e293b" }}>
                    {catParts.map(part => (
                      <button key={part.id} onClick={() => setFlowPartId(part.id)}
                        style={{ background: "none", border: "none", borderBottom: "2px solid " + (flowPartId === part.id ? activeCat.color : "transparent"), color: flowPartId === part.id ? activeCat.color : "#64748b", padding: "5px 12px", fontSize: 11, fontWeight: flowPartId === part.id ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap", marginBottom: -1 }}>
                        {part.name}
                      </button>
                    ))}
                    <button onClick={() => { setNewPartCatId(activeCatId); setNewPartName(""); document.querySelector('#new-part-input').focus(); }}
                      style={{ background: "none", border: "none", color: "#334155", padding: "5px 8px", fontSize: 14, cursor: "pointer" }}>＋</button>
                  </div>
                );
              })()}
            </div>

            {/* - 工程管理バー（フロー図直上） - */}
            <div style={{ background: "#080f1a", border: "1px solid #1e293b", borderRadius: 10, padding: "10px 14px", marginBottom: 10, overflowX: "auto" }}>
              <div style={{ fontSize: 10, color: "#475569", marginBottom: 7 }}>工程の順番・削除</div>
              <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "nowrap" }}>
                {processes.map(function(proc, ci) {
                  function swapProc(fromIdx, toIdx) {
                    // processes と matrix を同時に updateActiveData で更新
                    var nextProcs = processes.slice();
                    var tmp = nextProcs[fromIdx]; nextProcs[fromIdx] = nextProcs[toIdx]; nextProcs[toIdx] = tmp;
                    var nextMatrix = Object.assign({}, matrix);
                    parts.forEach(function(part) {
                      var keyA = part.id + "_" + fromIdx;
                      var keyB = part.id + "_" + toIdx;
                      var cellA = matrix[keyA];
                      var cellB = matrix[keyB];
                      if (cellA) { nextMatrix[keyB] = cellA; } else { delete nextMatrix[keyB]; }
                      if (cellB) { nextMatrix[keyA] = cellB; } else { delete nextMatrix[keyA]; }
                    });
                    updateActiveData({ processes: nextProcs, matrix: nextMatrix });
                  }
                  function moveLeft() { if (ci > 0) swapProc(ci, ci - 1); }
                  function moveRight() { if (ci < processes.length - 1) swapProc(ci, ci + 1); }
                  function delProc() {
                    showConfirm("「" + proc.name + "」を削除しますか？", function() { removeProcess(proc.id); });
                  }
                  return (
                    <div key={proc.id} style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                      <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "5px 8px", display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, whiteSpace: "nowrap" }}>{proc.name}</span>
                        <button onClick={moveLeft} style={{ background: ci === 0 ? "none" : "#1e293b", border: "1px solid #334155", borderRadius: 4, color: ci === 0 ? "#1e293b" : "#64748b", cursor: ci === 0 ? "default" : "pointer", fontSize: 13, padding: "1px 7px", lineHeight: 1 }}>←</button>
                        <button onClick={moveRight} style={{ background: ci === processes.length - 1 ? "none" : "#1e293b", border: "1px solid #334155", borderRadius: 4, color: ci === processes.length - 1 ? "#1e293b" : "#64748b", cursor: ci === processes.length - 1 ? "default" : "pointer", fontSize: 13, padding: "1px 7px", lineHeight: 1 }}>→</button>
                        <button onClick={delProc} style={{ background: "#1e293b", border: "1px solid #ef444433", borderRadius: 4, color: "#ef4444", cursor: "pointer", fontSize: 13, padding: "1px 7px", lineHeight: 1 }}>×</button>
                      </div>
                      {ci < processes.length - 1 && <span style={{ color: "#334155", fontSize: 14, flexShrink: 0 }}>›</span>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* - フロー図本体 - */}
            {(() => {
              var flowPartIds;
              if (!flowPartId || flowPartId === "__all__") {
                flowPartIds = "__all__";
              } else if (flowPartId.indexOf("cat:") === 0) {
                var catId = flowPartId.slice(4);
                flowPartIds = parts.filter(function(p) { return p.categoryId === catId; }).map(function(p) { return p.id; });
              } else {
                flowPartIds = [flowPartId];
              }
              return (
                <div className="flow-container" style={{ background: "#080f1a", border: "1px solid #1e293b", borderRadius: 12, padding: 20, position: "relative" }}>
                  <FlowView partIds={flowPartIds} parts={parts} categories={categories} processes={processes.map(p => p.name)} getCell={(pid, ci) => getCell(pid, ci)} setCell={(pid, ci, data) => setCell(pid, ci, data)} targetCostMap={targetCostMap} setTargetCostMap={setTargetCostMap} onOpenModal={(partId, partName, ci) => setModal({ partId, partName, processIdx: ci })}
                  themeId={activeThemeId}
                  setParts={setParts}
                  removePart={removePart}
                  showConfirm={showConfirm}
                  />
                </div>
              );
            })()}

            {/* - 凡例 - */}
            <div style={{ display: "flex", gap: 16, marginTop: 14, fontSize: 10, color: "#475569" }}>
              {[{ color: "#22c55e", label: "採用確定" }, { color: "#f59e0b", label: "検討中" }, { color: "#1e293b", label: "未着手" }].map(l => (
                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: l.color }} />{l.label}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* - サマリー - */}
        {view === "summary" && (
          <div>
            <h2 style={{ color: "#f1f5f9", fontSize: 18, marginBottom: 4, fontWeight: 800 }}>{theme.name}</h2>
            <p style={{ color: "#475569", fontSize: 12, marginBottom: 20 }}>商流サマリー — 大分類別採用状況</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 24 }}>
              {[
                { label: "累計コスト", value: totalCost ? "¥" + (totalCost.toLocaleString()) : "—", color: "#0ea5e9" },
                { label: "採用確定セル", value: (completedCells) + " / " + (totalCells), color: "#22c55e" },
                { label: "大分類 / 部品数", value: (categories.length) + "分類 / " + (parts.length) + "部品", color: "#a78bfa" },
              ].map(k => (
                <div key={k.label} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "14px 18px" }}>
                  <div style={{ fontSize: 10, color: "#64748b", marginBottom: 5 }}>{k.label}</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: k.color }}>{k.value}</div>
                </div>
              ))}
            </div>

            {/* 大分類ごとのテーブル */}
            {categories.map(cat => {
              const catParts = parts.filter(p => p.categoryId === cat.id);
              if (catParts.length === 0) return null;
              const catCost = catParts.reduce((s, part) => {
                s + processes.reduce((s2, _, ci) => { const cell = getCell(part.id, ci); const sel = cell.suppliers.find(s => s.id === cell.selected); return sel.cost ? s2 + parseFloat(sel.cost) : s2; }, 0), 0);
              }
              return (
                <div key={cat.id} style={{ marginBottom: 24 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: cat.color }} />
                    <span style={{ fontSize: 14, fontWeight: 700, color: cat.color }}>{cat.name}</span>
                    {catCost > 0 && <span style={{ fontSize: 12, color: "#475569" }}>小計 ¥{catCost.toLocaleString()}</span>}
                  </div>
                  <div style={{ overflowX: "auto", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, overflow: "hidden" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}>
                      <thead>
                        <tr style={{ borderBottom: "1px solid #1e293b" }}>
                          <th style={{ padding: "8px 12px", textAlign: "left", fontSize: 10, color: "#475569", minWidth: 100 }}>部品</th>
                          {processes.map(p => <th key={p.id} style={{ padding: "8px 12px", textAlign: "left", fontSize: 10, color: "#475569", minWidth: 110 }}>{p.name}</th>)}
                          <th style={{ padding: "8px 12px", textAlign: "right", fontSize: 10, color: "#475569" }}>小計</th>
                        </tr>
                      </thead>
                      <tbody>
                        {catParts.map(part => {
                          const partTotal = processes.reduce((s, _, ci) => {
                            const cell = getCell(part.id, ci);
                            const sel = cell.suppliers.find(s => s.id === cell.selected);
                            return sel.cost ? s + parseFloat(sel.cost) : s;
                          }, 0);
                          return (
                            <tr key={part.id} style={{ borderBottom: "1px solid #0f172a" }}>
                              <td style={{ padding: "10px 12px", fontSize: 12, fontWeight: 600, color: "#94a3b8" }}>{part.name}</td>
                              {processes.map((_, ci) => {
                                const cell = getCell(part.id, ci);
                                const s = cell.suppliers.find(sup => sup.id === cell.selected);
                                return (
                                  <td key={ci} style={{ padding: "10px 12px" }}>
                                    {s ? (
                                      <div>
                                        <div style={{ fontSize: 11, fontWeight: 700, color: "#f1f5f9" }}>{s.name || "未入力"}</div>
                                        {s.cost && <div style={{ fontSize: 10, color: "#0ea5e9" }}>¥{parseFloat(s.cost).toLocaleString()}</div>}
                                        {s.leadTime && <div style={{ fontSize: 9, color: "#64748b" }}>LT:{s.leadTime}日</div>}
                                      </div>
                                    ) : <span style={{ fontSize: 10, color: "#334155" }}>未選択</span>}
                                  </td>
                                );
                              })}
                              <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, fontWeight: 700, color: partTotal ? "#0ea5e9" : "#334155" }}>
                                {partTotal ? "¥" + (partTotal.toLocaleString()) : "—"}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* - アーカイブ - */}
        {view === "archive" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
              <div>
                <h2 style={{ color: "#f1f5f9", fontSize: 18, fontWeight: 800, margin: "0 0 4px" }}>📁 アーカイブ</h2>
                <p style={{ color: "#475569", fontSize: 12, margin: 0 }}>完了した開発テーマの記録。復元・Excel出力・削除ができます。</p>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 12, color: "#475569" }}>{archive.length} 件</span>
                <div style={{ width: 1, height: 20, background: "#1e293b" }} />
                {/* バックアップ */}
                <button onClick={handleExportBackup}
                  style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#94a3b8", padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  ⬇ バックアップ保存
                </button>
                <button onClick={() => importFileRef.current.click()}
                  style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#94a3b8", padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  ⬆ バックアップ復元
                </button>
                <input ref={importFileRef} type="file" accept=".json" onChange={handleImportBackup} style={{ display: "none" }} />
              </div>
            </div>
            {importError && (
              <div style={{ background: "#450a0a", border: "1px solid #ef4444", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 12, color: "#ef4444" }}>
                ⚠ {importError}
              </div>
            )}
            {archive.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 20px", color: "#334155", border: "2px dashed #1e293b", borderRadius: 12 }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📂</div>
                <p style={{ margin: 0 }}>まだアーカイブはありません。<br/>ヘッダーの「✅ 完了」でテーマを保存すると表示されます。</p>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {archive.map(snap => {
                  const d = new Date(snap.archivedAt);
                  const dateStr = (d.getFullYear()) + "/" + (d.getMonth()+1) + "/" + (d.getDate()) + " " + (d.getHours()) + ":" + (String(d.getMinutes()).padStart(2,'0'));
                  const prog = snap.totalCells > 0 ? Math.round(snap.completedCells / snap.totalCells * 100) : 0;
                  return (
                    <div key={snap.id} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "18px 20px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 15, fontWeight: 800, color: "#f1f5f9", marginBottom: 6 }}>{snap.theme.name || "無題"}</div>
                          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 10 }}>
                            <span style={{ fontSize: 11, color: "#475569" }}>🕐 {dateStr}</span>
                            <span style={{ fontSize: 11, color: "#64748b" }}>📦 {(snap.parts||[]).length}部品 / {(snap.categories||[]).length}大分類</span>
                            <span style={{ fontSize: 11, color: "#64748b" }}>⚙️ {(snap.processes||[]).length}工程</span>
                            {snap.totalCost > 0 && <span style={{ fontSize: 11, color: "#0ea5e9", fontWeight: 600 }}>¥{snap.totalCost.toLocaleString()}</span>}
                          </div>
                          {/* Progress bar */}
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ flex: 1, height: 5, background: "#1e293b", borderRadius: 3, overflow: "hidden" }}>
                              <div style={{ width: prog + "%", height: "100%", background: prog === 100 ? "#22c55e" : "#0ea5e9", borderRadius: 3 }} />
                            </div>
                            <span style={{ fontSize: 10, color: prog === 100 ? "#22c55e" : "#64748b", minWidth: 50 }}>{snap.completedCells}/{snap.totalCells} 確定 ({prog}%)</span>
                          </div>
                          {/* Category chips */}
                          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                            {(snap.categories||[]).map(cat => (
                              <span key={cat.id} style={{ fontSize: 10, background: cat.color + "22", color: cat.color, border: "1px solid " + (cat.color) + "44", borderRadius: 20, padding: "2px 8px" }}>{cat.name}</span>
                            ))}
                          </div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6, flexShrink: 0 }}>
                          <button onClick={() => editFromArchive(snap)}
                            style={{ background: "linear-gradient(135deg,#6366f1,#0ea5e9)", border: "none", borderRadius: 7, color: "#fff", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            ✏ 再編集
                          </button>
                          <div style={{ fontSize: 9, color: "#475569", textAlign: "center", marginTop: 2 }}>編集後に上書き/別名保存</div>
                          <button onClick={() => restoreArchiveItem(snap)}
                            style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            🔄 上書き復元
                          </button>
                          <button onClick={() => exportExcel(snap.theme, snap.categories, snap.parts, snap.processes, (partId, ci) => snap.matrix.[(partId) + "_" + (ci)] || { suppliers: [], selected: null })}
                            style={{ background: "#14532d", border: "1px solid #22c55e33", borderRadius: 7, color: "#22c55e", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            📊 Excel
                          </button>
                          <button onClick={() => showConfirm("「" + (snap.theme.name) + "」を削除しますか？", () => deleteArchiveItem(snap.id))}
                            style={{ background: "none", border: "1px solid #334155", borderRadius: 7, color: "#475569", padding: "6px 12px", fontSize: 11, cursor: "pointer" }}>
                            🗑 削除
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>

      {modal && (
        <CellModal
          partName={modal.partName}
          processName={processes[modal.processIdx].name}
          cellData={getCell(modal.partId, modal.processIdx)}
          onUpdate={data => setCell(modal.partId, modal.processIdx, data)}
          onClose={() => setModal(null)}
          showConfirm={showConfirm}
        />
      )}

      {/* 確認モーダル（window.confirm の代替） */}
      {confirmModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000, backdropFilter: "blur(4px)", padding: 20 }}>
          <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 16, padding: "28px 24px", maxWidth: 360, width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: 14, color: "#e2e8f0", marginBottom: 24, lineHeight: 1.6 }}>{confirmModal.message}</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button onClick={() => { setConfirmModal(null); }}
                style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#94a3b8", padding: "10px 24px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                キャンセル
              </button>
              <button onClick={() => { const fn = confirmModal.onOk; setConfirmModal(null); fn(); }}
                style={{ background: "linear-gradient(135deg,#6366f1,#0ea5e9)", border: "none", borderRadius: 8, color: "#fff", padding: "10px 24px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                OK
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body></html>
