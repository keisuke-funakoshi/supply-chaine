const {useState,useRef,useCallback,useEffect,useMemo}=React;
// --- ユーティリティ ---------------------------------------------------
const SCORE_WEIGHTS = { cost: 0.35, leadTime: 0.25, quality: 0.25, moq: 0.15 };
let uid = 300;
const newId = () => `id${uid++}`;

function scoreSupplier(supplier, allSuppliers) {
  const parse = (v) => parseFloat(v) || 0;
  const vals = (key) => allSuppliers.map((s) => parse(s[key])).filter(Boolean);
  const norm = (val, arr, inv = false) => {
    if (!arr.length || !val) return 0;
    const [mn, mx] = [Math.min(...arr), Math.max(...arr)];
    if (mx === mn) return 100;
    const n = ((val - mn) / (mx - mn)) * 100;
    return Math.round(inv ? 100 - n : n);
  };
  const p = (k) => parse(supplier[k]);
  return Math.round(
    norm(p("cost"), vals("cost"), true) * SCORE_WEIGHTS.cost +
    norm(p("leadTime"), vals("leadTime"), true) * SCORE_WEIGHTS.leadTime +
    norm(p("quality"), vals("quality")) * SCORE_WEIGHTS.quality +
    norm(p("moq"), vals("moq"), true) * SCORE_WEIGHTS.moq
  );
}

function useDragSort(items, setItems) {
  const dragIdx = useRef(null);
  return {
    onDragStart: (i) => { dragIdx.current = i; },
    onDragOver: (e, i) => {
      e.preventDefault();
      if (dragIdx.current === null || dragIdx.current === i) return;
      const next = [...items];
      const [m] = next.splice(dragIdx.current, 1);
      next.splice(i, 0, m);
      dragIdx.current = i;
      setItems(next);
    },
    onDragEnd: () => { dragIdx.current = null; },
  };
}

// --- アーカイブ (localStorage) ----------------------------------------
const ARCHIVE_KEY = "shoury_archive_v1";
function loadArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]"); } catch { return []; }
}
function saveToArchive(snapshot) {
  const list = loadArchive();
  list.unshift(snapshot);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list.slice(0, 50)));
}
function deleteFromArchive(id) {
  const list = loadArchive().filter(s => s.id !== id);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list));
}

// --- バックアップ（JSONエクスポート/インポート） -----------------------
function exportBackup(theme, categories, parts, processes, matrix, archive) {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    current: { theme, categories, parts, processes, matrix },
    archive,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `shoury_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !data.current) throw new Error("形式が不正です");
      onSuccess(data);
    } catch (err) {
      onError("読み込みに失敗しました: " + err.message);
    }
  };
  reader.readAsText(file);
}

// --- Excel出力（図形矢印付き） -----------------------------------------
async function exportExcel(theme, categories, parts, processes, getCell) {
  const XLSX = { utils: window.XLSX.utils, writeFile: window.XLSX.writeFile };

  // openpyxl は使えないのでSheetJSで矢印なし版 + 別途SVG矢印をBase64画像で埋め込む
  // SheetJSはコネクタ線に対応しないため、矢印はセル内テキスト "→" で表現し
  // Anthropic API経由でpython生成する代わりにクライアントサイドで実現可能な範囲で実装
  const wb = XLSX.utils.book_new();

  categories.forEach(cat => {
    const catParts = parts.filter(p => p.categoryId === cat.id);
    if (!catParts.length) return;

    const sheetName = cat.name.slice(0, 31);
    const aoa = [];

    // Header row 1: theme
    aoa.push([theme.name]);
    // Header row 2: category
    aoa.push([`【${cat.name}】`]);
    aoa.push([]);

    // Process header row with arrows
    const procHeader = ["部品名"];
    processes.forEach((proc, pi) => {
      procHeader.push(proc.name);
      if (pi < processes.length - 1) procHeader.push("→");
    });
    aoa.push(procHeader);

    // Each part row
    catParts.forEach(part => {
      const row = [part.name];
      processes.forEach((_, ci) => {
        const cell = getCell(part.id, ci);
        const sel = cell.suppliers?.find(s => s.id === cell.selected);
        if (sel) {
          row.push(sel.name + "\n¥" + parseFloat(sel.cost || 0).toLocaleString() + "  LT:" + (sel.leadTime || "?") + "日");
        } else {
          const count = cell.suppliers?.length || 0;
          row.push(count > 0 ? `(${count}社検討中)` : "");
        }
        if (ci < processes.length - 1) row.push("→");
      });
      aoa.push(row);

      // Candidate rows (non-selected)
      const maxCandidates = Math.max(...processes.map((_, ci) => {
        const cell = getCell(part.id, ci);
        return (cell.suppliers || []).filter(s => s.id !== cell.selected).length;
      }), 0);

      for (let ri = 0; ri < maxCandidates; ri++) {
        const candRow = [""];
        processes.forEach((_, ci) => {
          const cell = getCell(part.id, ci);
          const others = (cell.suppliers || []).filter(s => s.id !== cell.selected);
          const s = others[ri];
          if (s) {
            candRow.push(`  候補: ${s.name}  ¥${parseFloat(s.cost || 0).toLocaleString()}`);
          } else {
            candRow.push("");
          }
          if (ci < processes.length - 1) candRow.push("");
        });
        aoa.push(candRow);
      }
      aoa.push([]);
    });

    // Summary section
    aoa.push([]);
    aoa.push(["-- コスト集計 --"]);
    const summaryHeader = ["部品名", ...processes.map(p => p.name), "合計"];
    aoa.push(summaryHeader);
    catParts.forEach(part => {
      let total = 0;
      const row = [part.name];
      processes.forEach((_, ci) => {
        const cell = getCell(part.id, ci);
        const sel = cell.suppliers?.find(s => s.id === cell.selected);
        const cost = sel?.cost ? parseFloat(sel.cost) : 0;
        total += cost;
        row.push(cost ? cost : "");
      });
      row.push(total || "");
      aoa.push(row);
    });

    const ws = XLSX.utils.aoa_to_sheet(aoa);

    // Column widths
    const colWidths = [{ wch: 14 }];
    processes.forEach(() => {
      colWidths.push({ wch: 24 });
      colWidths.push({ wch: 4 });
    });
    ws["!cols"] = colWidths;

    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  // サマリーシート
  const summaryAoa = [];
  summaryAoa.push([theme.name, "", "商流サマリー"]);
  summaryAoa.push([]);
  summaryAoa.push(["大分類", "部品名", ...processes.map(p => p.name), "部品合計"]);
  categories.forEach(cat => {
    parts.filter(p => p.categoryId === cat.id).forEach((part, pi) => {
      let total = 0;
      const row = [pi === 0 ? cat.name : "", part.name];
      processes.forEach((_, ci) => {
        const cell = getCell(part.id, ci);
        const sel = cell.suppliers?.find(s => s.id === cell.selected);
        const cost = sel ? `${sel.name} ¥${parseFloat(sel.cost || 0).toLocaleString()}` : "";
        const c = sel?.cost ? parseFloat(sel.cost) : 0;
        total += c;
        row.push(cost);
      });
      row.push(total || "");
      summaryAoa.push(row);
    });
    summaryAoa.push([]);
  });
  const summaryWs = XLSX.utils.aoa_to_sheet(summaryAoa);
  summaryWs["!cols"] = [{ wch: 14 }, { wch: 14 }, ...processes.map(() => ({ wch: 26 })), { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, summaryWs, "サマリー");

  XLSX.writeFile(wb, `${theme.name}_商流検討.xlsx`);
}

// --- PDF出力（フロー図SVGをPDF化） ------------------------------------
// --- PDF出力（白背景・全部品/部品ごと） -----------------------------
function buildAllPartsSVG(themeName, targetParts, categories, subCategories, processes, getCell, crossLinks) {
  var procNames = processes.map(function(p){return p.name;});
  var CAT_W=36, NW=260, NH=130, NGAP=6, CGAP=44, LW=180, SC_W=20, HDRH=48, PAD=16, ROW_GAP=14;
  var FS_PROC=17, FS_NAME=19, FS_INFO=14, FS_BADGE=11, FS_PART=16, FS_CAT=13, FS_SC=11;

  // 大分類でグループ化
  var catMap={}, catOrder=[];
  targetParts.forEach(function(part){
    if(!catMap[part.categoryId]){catMap[part.categoryId]=[];catOrder.push(part.categoryId);}
    catMap[part.categoryId].push(part);
  });

  // 各部品の行高さ
  function partRowH(part){
    var maxRows=1;
    procNames.forEach(function(proc,ci){
      var cell=getCell(part.id,ci);
      var cnt=cell&&cell.suppliers?cell.suppliers.length:0;
      if(cnt>maxRows)maxRows=cnt;
    });
    return maxRows*(NH+NGAP)-NGAP;
  }

  // 中分類でサブグループ化
  function groupBySubCat(parts2){
    var map={},order=[];
    parts2.forEach(function(p){
      var k=p.subCategoryId||'__none__';
      if(!map[k]){map[k]=[];order.push(k);}
      map[k].push(p);
    });
    return {map:map,order:order};
  }

  // LEFT = PAD + CAT_W + 8 + SC_W + 8 + LW + 8
  var LEFT = PAD+CAT_W+8+SC_W+8+LW+8;
  var svgW = LEFT+procNames.length*NW+(procNames.length-1)*CGAP+PAD;

  // 総高さ計算
  var totalH=PAD+28;
  catOrder.forEach(function(catId){
    totalH+=HDRH+10;
    var sg=groupBySubCat(catMap[catId]);
    sg.order.forEach(function(scId){
      if(scId!=='__none__')totalH+=18;
      sg.map[scId].forEach(function(p){totalH+=partRowH(p)+ROW_GAP;});
      totalH+=6;
    });
    totalH+=8;
  });

  var out=[];
  out.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+svgW+' '+totalH+'" preserveAspectRatio="xMinYMin meet" style="background:#fff;font-family:Arial,sans-serif;max-width:100%;height:auto;display:block">');
  out.push('<rect width="'+svgW+'" height="'+totalH+'" fill="#fff"/>');
  out.push('<defs>'+
    '<marker id="ga" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker>'+
    '<marker id="gb" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#6366f1"/></marker>'+
    '<marker id="gy" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>'+
    '</defs>');
  out.push('<text x="'+PAD+'" y="'+(PAD+18)+'" font-size="18" font-weight="bold" fill="#1e293b">'+(themeName||'').replace(/&/g,'&amp;')+'</text>');

  var curY=PAD+28;
  var partYMap={};

  catOrder.forEach(function(catId){
    var cat=categories.find(function(c){return c.id===catId;});
    var catParts=catMap[catId];
    var catColor=(cat&&cat.color)?cat.color:'#334155';
    var catName=cat?cat.name:'';

    // 工程ヘッダー
    procNames.forEach(function(proc,ci){
      var hx=LEFT+ci*(NW+CGAP);
      out.push('<rect x="'+hx+'" y="'+curY+'" width="'+NW+'" height="'+HDRH+'" rx="8" fill="#1e293b"/>');
      out.push('<text x="'+(hx+NW/2)+'" y="'+(curY+HDRH/2+FS_PROC*0.35)+'" text-anchor="middle" font-size="'+FS_PROC+'" font-weight="bold" fill="#fff">'+proc.replace(/&/g,'&amp;')+'</text>');
      if(ci<procNames.length-1){
        var lx1=hx+NW+8,lx2=hx+NW+CGAP-8,ly=curY+HDRH/2;
        out.push('<line x1="'+lx1+'" y1="'+ly+'" x2="'+lx2+'" y2="'+ly+'" stroke="#64748b" stroke-width="2"/>');
        out.push('<polygon points="'+lx2+','+(ly-4)+' '+(lx2+8)+','+ly+' '+lx2+','+(ly+4)+'" fill="#64748b"/>');
      }
    });
    curY+=HDRH+10;

    // 大分類ブロック高さ計算
    var sg=groupBySubCat(catParts);
    var catBlockH=0;
    sg.order.forEach(function(scId){
      if(scId!=='__none__')catBlockH+=18;
      sg.map[scId].forEach(function(p){catBlockH+=partRowH(p)+ROW_GAP;});
      catBlockH+=6;
    });

    // 大分類ボックス
    out.push('<rect x="'+PAD+'" y="'+curY+'" width="'+CAT_W+'" height="'+catBlockH+'" rx="6" fill="'+catColor+'22" stroke="'+catColor+'" stroke-width="2.5"/>');
    var chars=catName.split('');
    var charH=FS_CAT+4;
    var startY=curY+catBlockH/2-(chars.length*charH)/2+FS_CAT;
    chars.forEach(function(ch,ci2){
      out.push('<text x="'+(PAD+CAT_W/2)+'" y="'+(startY+ci2*charH)+'" text-anchor="middle" font-size="'+FS_CAT+'" font-weight="bold" fill="'+catColor+'">'+ch.replace(/&/g,'&amp;')+'</text>');
    });

    var scBlockY=curY;
    sg.order.forEach(function(scId){
      var sc=scId!=='__none__'?(subCategories||[]).find(function(s){return s.id===scId;}):null;

      // 中分類ブロック高さ
      var scBlockH=0;
      sg.map[scId].forEach(function(p){scBlockH+=partRowH(p)+ROW_GAP;});
      scBlockH-=ROW_GAP;
      if(sc){scBlockH+=18+ROW_GAP;}

      // 中分類ボックス（枠線）
      if(sc){
        var scX=PAD+CAT_W+8;
        out.push('<rect x="'+scX+'" y="'+curY+'" width="'+(svgW-PAD-scX)+'" height="'+(scBlockH+6)+'" rx="6" fill="none" stroke="'+catColor+'55" stroke-width="1.5" stroke-dasharray="4,3"/>');
        out.push('<rect x="'+(scX+4)+'" y="'+(curY-8)+'" width="'+(sc.name.length*FS_SC*0.65+12)+'" height="16" rx="4" fill="'+catColor+'"/>');
        out.push('<text x="'+(scX+10)+'" y="'+(curY+2)+'" font-size="'+FS_SC+'" font-weight="bold" fill="#fff">'+sc.name.replace(/&/g,'&amp;')+'</text>');
        curY+=18;
      }

      sg.map[scId].forEach(function(part){
        var rh=partRowH(part);
        partYMap[part.id]={};

        // 部品ラベル
        var labelX=PAD+CAT_W+8+SC_W+8;
        out.push('<rect x="'+labelX+'" y="'+curY+'" width="'+LW+'" height="'+rh+'" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>');
        out.push('<text x="'+(labelX+LW/2)+'" y="'+(curY+rh/2+FS_PART*0.35)+'" text-anchor="middle" font-size="'+FS_PART+'" font-weight="bold" fill="#334155">'+(part.name||'').replace(/&/g,'&amp;')+'</text>');

        // 各工程
        procNames.forEach(function(proc,ci){
          var cell=getCell(part.id,ci);
          var suppliers=cell&&cell.suppliers?cell.suppliers:[];
          var selected=cell?cell.selected:null;
          var candidates=cell&&cell.candidates?cell.candidates:[];
          var scores=suppliers.map(function(s){return scoreSupplier(s,suppliers);});
          var maxScore=scores.length?Math.max.apply(null,scores):0;
          var winnerId=maxScore>0?(suppliers[scores.indexOf(maxScore)]||{}).id:null;
          var cx=LEFT+ci*(NW+CGAP);
          var selY=null,winY=null;

          // 空セルはグレー塗り
          if(suppliers.length===0){
            out.push('<rect x="'+cx+'" y="'+curY+'" width="'+NW+'" height="'+rh+'" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>');
            out.push('<text x="'+(cx+NW/2)+'" y="'+(curY+rh/2+5)+'" text-anchor="middle" font-size="13" fill="#cbd5e1">—</text>');
          } else {
            suppliers.forEach(function(s,si){
              var ny=curY+si*(NH+NGAP);
              var isSel=s.id===selected;
              var isCand=candidates.indexOf(s.id)>=0;
              var isWin=s.id===winnerId&&!isSel;
              var bg=isSel?'#dbeafe':isCand?'#e0f2fe':'#f8fafc';
              var strokeC=isSel?'#2563eb':isCand?'#93c5fd':'#e2e8f0';
              out.push('<rect x="'+cx+'" y="'+ny+'" width="'+NW+'" height="'+NH+'" rx="8" fill="'+bg+'" stroke="'+strokeC+'" stroke-width="'+(isSel?3:1.5)+'"/>');
              if(isSel){
                out.push('<rect x="'+(cx+5)+'" y="'+(ny-9)+'" width="48" height="16" rx="8" fill="#2563eb"/>');
                out.push('<text x="'+(cx+29)+'" y="'+(ny+3)+'" text-anchor="middle" font-size="'+FS_BADGE+'" font-weight="bold" fill="#fff">&#x2713;採用</text>');
                selY=ny+NH/2;
              } else if(isWin){
                out.push('<rect x="'+(cx+5)+'" y="'+(ny-9)+'" width="36" height="16" rx="8" fill="#f59e0b"/>');
                out.push('<text x="'+(cx+23)+'" y="'+(ny+3)+'" text-anchor="middle" font-size="'+FS_BADGE+'" fill="#fff">検討</text>');
                winY=ny+NH/2;
              } else if(isCand){
                out.push('<rect x="'+(cx+5)+'" y="'+(ny-9)+'" width="36" height="16" rx="8" fill="#475569"/>');
                out.push('<text x="'+(cx+23)+'" y="'+(ny+3)+'" text-anchor="middle" font-size="'+FS_BADGE+'" fill="#cbd5e1">候補</text>');
              }
              var name=(s.name||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
              out.push('<text x="'+(cx+10)+'" y="'+(ny+28)+'" font-size="'+FS_NAME+'" font-weight="'+(isSel?'bold':'normal')+'" fill="'+(isSel?'#1e40af':'#1e293b')+'">'+name+'</text>');
              if(s.cost)out.push('<text x="'+(cx+10)+'" y="'+(ny+50)+'" font-size="'+FS_INFO+'" fill="#2563eb">&#165;'+parseFloat(s.cost).toLocaleString()+'</text>');
              if(s.leadTime)out.push('<text x="'+(cx+10)+'" y="'+(ny+68)+'" font-size="'+FS_INFO+'" fill="#64748b">LT:'+s.leadTime+'日</text>');
              var score=scores[si]||0;
              var sc2=score>=70?'#22c55e':score>=40?'#f59e0b':'#ef4444';
              out.push('<rect x="'+(cx+10)+'" y="'+(ny+NH-16)+'" width="'+(NW-20)+'" height="6" rx="3" fill="#e2e8f0"/>');
              out.push('<rect x="'+(cx+10)+'" y="'+(ny+NH-16)+'" width="'+Math.round((NW-20)*score/100)+'" height="6" rx="3" fill="'+sc2+'"/>');
            });
          }

          // 採用矢印（緑）
          if(ci>0&&partYMap[part.id][ci-1]&&partYMap[part.id][ci-1].selY!==null&&selY!==null){
            var px=LEFT+(ci-1)*(NW+CGAP)+NW;
            out.push('<line x1="'+px+'" y1="'+partYMap[part.id][ci-1].selY+'" x2="'+(cx-6)+'" y2="'+selY+'" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ga)"/>');
          }
          // 検討矢印（黄色点線）
          if(ci>0&&partYMap[part.id][ci-1]&&partYMap[part.id][ci-1].winY!==null&&winY!==null){
            var px=LEFT+(ci-1)*(NW+CGAP)+NW;
            out.push('<line x1="'+px+'" y1="'+partYMap[part.id][ci-1].winY+'" x2="'+(cx-6)+'" y2="'+winY+'" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#gy)" opacity="0.8"/>');
          }

          partYMap[part.id][ci]={selY:selY,winY:winY,x:cx};
        });

        curY+=rh+ROW_GAP;
      });
      curY+=6;
    });
    curY+=8;
  });

  // 部品間合流線（青）
  if(crossLinks&&crossLinks.length){
    crossLinks.forEach(function(link){
      var from=partYMap[link.fromPartId]&&partYMap[link.fromPartId][link.fromProcIdx];
      var to=partYMap[link.toPartId]&&partYMap[link.toPartId][link.toProcIdx];
      if(!from||!to)return;
      var x1=from.x+NW,y1=from.selY,x2=to.x,y2=to.selY;
      if(y1===null||y1===undefined||y2===null||y2===undefined)return;
      out.push('<path d="M'+x1+','+y1+' C'+(x1+80)+','+y1+' '+(x2-80)+','+y2+' '+x2+','+y2+'" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#gb)" opacity="0.9"/>');
    });
  }

  out.push('<\/svg>');
  return out.join('');
}


function buildPartSVG(themeName, partName, catName, procNames, getCell, partId) {
  var NW=190, NH=72, NGAP=8, CGAP=48, LW=130, HDRH=36, PAD=16;
  var cols = procNames.map(function(proc, ci) {
    var cell = getCell(partId, ci);
    return { proc: proc, suppliers: cell&&cell.suppliers?cell.suppliers:[], selected: cell?cell.selected:null, candidates: cell&&cell.candidates?cell.candidates:[] };
  });
  var maxRows = Math.max.apply(null, cols.map(function(c){return c.suppliers.length;}).concat([1]));
  var svgW = PAD + LW + procNames.length*NW + (procNames.length-1)*CGAP + PAD;
  var svgH = PAD + 20 + HDRH + maxRows*(NH+NGAP) + PAD;
  var out = [];
  out.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+svgW+' '+svgH+'" preserveAspectRatio="xMinYMin meet" style="background:#fff;font-family:Arial,sans-serif;max-width:100%;height:auto;display:block">');
  out.push('<rect width="'+svgW+'" height="'+svgH+'" fill="#fff"/>');
  var titleY = PAD+14;
  out.push('<text x="'+PAD+'" y="'+titleY+'" font-size="14" font-weight="bold" fill="#1e293b">'+(catName?catName+' / ':'')+partName+'</text>');
  out.push('<text x="'+(svgW-PAD)+'" y="'+titleY+'" font-size="14" fill="#94a3b8" text-anchor="end">'+themeName+'</text>');
  var baseY = PAD+20;
  out.push('<rect x="'+PAD+'" y="'+(baseY+HDRH)+'" width="'+LW+'" height="'+(maxRows*(NH+NGAP))+'" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>');
  out.push('<text x="'+(PAD+LW/2)+'" y="'+(baseY+HDRH+maxRows*(NH+NGAP)/2+5)+'" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">'+partName+'</text>');
  out.push('<defs>'+
    '<marker id="ga" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#16a34a"/></marker>'+
    '<marker id="gy" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#f59e0b"/></marker>'+
    '</defs>');
  // 各工程のwinnerIdを計算
  var winnerIds = cols.map(function(col) {
    if (!col.suppliers.length) return null;
    var scores = col.suppliers.map(function(s) { return scoreSupplier(s, col.suppliers); });
    var maxScore = Math.max.apply(null, scores);
    if (maxScore <= 0) return null;
    return col.suppliers[scores.indexOf(maxScore)].id;
  });
  cols.forEach(function(col, ci) {
    var x = PAD+LW+ci*(NW+CGAP);
    out.push('<rect x="'+x+'" y="'+baseY+'" width="'+NW+'" height="'+HDRH+'" rx="6" fill="#334155"/>');
    out.push('<text x="'+(x+NW/2)+'" y="'+(baseY+HDRH/2+5)+'" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">'+col.proc+'</text>');
    if (ci < cols.length-1) {
      var ay = baseY+HDRH/2;
      out.push('<line x1="'+(x+NW)+'" y1="'+ay+'" x2="'+(x+NW+CGAP-8)+'" y2="'+ay+'" stroke="#94a3b8" stroke-width="1.5"/>');
      out.push('<polygon points="'+(x+NW+CGAP-8)+','+(ay-4)+' '+(x+NW+CGAP)+','+ay+' '+(x+NW+CGAP-8)+','+(ay+4)+'" fill="#94a3b8"/>');
    }
    col.suppliers.forEach(function(s, si) {
      var ny = baseY+HDRH+si*(NH+NGAP);
      var isSel = s.id===col.selected;
      var isCand = col.candidates.indexOf(s.id)>=0;
      var bg = isSel?'#eff6ff':isCand?'#f8fafc':'#fff';
      var stroke = isSel?'#2563eb':'#e2e8f0';
      var sw2 = isSel?2:1;
      out.push('<rect x="'+x+'" y="'+ny+'" width="'+NW+'" height="'+NH+'" rx="7" fill="'+bg+'" stroke="'+stroke+'" stroke-width="'+sw2+'"/>');
      if (isSel) {
        out.push('<rect x="'+(x+4)+'" y="'+(ny-7)+'" width="30" height="12" rx="6" fill="#2563eb"/>');
        out.push('<text x="'+(x+19)+'" y="'+(ny+1)+'" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">&#x2713;採用</text>');
      } else if (isCand) {
        out.push('<rect x="'+(x+4)+'" y="'+(ny-7)+'" width="24" height="12" rx="6" fill="#64748b"/>');
        out.push('<text x="'+(x+16)+'" y="'+(ny+1)+'" text-anchor="middle" font-size="7" fill="#fff">候補</text>');
      }
      out.push('<text x="'+(x+8)+'" y="'+(ny+18)+'" font-size="14" font-weight="'+(isSel?'bold':'normal')+'" fill="'+(isSel?'#1e3a8a':'#374151')+'">'+((s.name||'未入力').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))+'</text>');
      if (s.cost) out.push('<text x="'+(x+8)+'" y="'+(ny+34)+'" font-size="12" fill="#2563eb">&#165;'+parseFloat(s.cost).toLocaleString()+'</text>');
      if (s.leadTime) out.push('<text x="'+(x+8)+'" y="'+(ny+48)+'" font-size="12" fill="#64748b">LT:'+s.leadTime+'&#26085;</text>');
    });
    // 採用ルート矢印（緑）
    if (ci>0) {
      var prev = cols[ci-1];
      if (prev.selected && col.selected) {
        var psi = prev.suppliers.findIndex(function(s){return s.id===prev.selected;});
        var csi2 = col.suppliers.findIndex(function(s){return s.id===col.selected;});
        if (psi>=0 && csi2>=0) {
          var px2 = PAD+LW+(ci-1)*(NW+CGAP)+NW;
          var py2 = baseY+HDRH+psi*(NH+NGAP)+NH/2;
          var cx3 = PAD+LW+ci*(NW+CGAP);
          var cy3 = baseY+HDRH+csi2*(NH+NGAP)+NH/2;
          out.push('<line x1="'+px2+'" y1="'+py2+'" x2="'+(cx3-6)+'" y2="'+cy3+'" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ga)"/>');
        }
      }
      // 検討ルート矢印（黄色点線）: winnerId同士
      var prevWin = winnerIds[ci-1];
      var curWin = winnerIds[ci];
      if (prevWin && curWin && prevWin !== prev.selected && curWin !== col.selected) {
        var pwi = prev.suppliers.findIndex(function(s){return s.id===prevWin;});
        var cwi = col.suppliers.findIndex(function(s){return s.id===curWin;});
        if (pwi>=0 && cwi>=0) {
          var wx1 = PAD+LW+(ci-1)*(NW+CGAP)+NW;
          var wy1 = baseY+HDRH+pwi*(NH+NGAP)+NH/2;
          var wx2 = PAD+LW+ci*(NW+CGAP);
          var wy2 = baseY+HDRH+cwi*(NH+NGAP)+NH/2;
          out.push('<line x1="'+wx1+'" y1="'+wy1+'" x2="'+(wx2-6)+'" y2="'+wy2+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#gy)" opacity="0.8"/>');
        }
      }
      // 候補ルート矢印（グレー点線）: candidates先頭同士
      var prevCand = prev.candidates.find(function(id){ return id !== prev.selected; });
      var curCand = col.candidates.find(function(id){ return id !== col.selected; });
      if (prevCand && curCand) {
        var pci2 = prev.suppliers.findIndex(function(s){return s.id===prevCand;});
        var cci2 = col.suppliers.findIndex(function(s){return s.id===curCand;});
        if (pci2>=0 && cci2>=0) {
          var bx1 = PAD+LW+(ci-1)*(NW+CGAP)+NW;
          var by1 = baseY+HDRH+pci2*(NH+NGAP)+NH/2;
          var bx2 = PAD+LW+ci*(NW+CGAP);
          var by2 = baseY+HDRH+cci2*(NH+NGAP)+NH/2;
          out.push('<line x1="'+bx1+'" y1="'+by1+'" x2="'+(bx2-6)+'" y2="'+by2+'" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>');
        }
      }
    }
  });
  out.push('</svg>');
  return out.join('');
}

function exportPDF(mode, themeName, targetParts, categories, subCategories, processes, getCell, allParts, crossLinks) {
  var pages = [];
  if (mode==="all") {
    // 全部品をまとめた大きなSVGを作る（合流線を描くため）
    pages.push('<div>'+buildAllPartsSVG(themeName, targetParts, categories, subCategories||[], processes, getCell, crossLinks || [])+'</div>');
  } else {
    targetParts.forEach(function(part, i) {
      var cat = categories.find(function(c){return c.id===part.categoryId;});
      var svg = buildPartSVG(themeName, part.name, cat?cat.name:'', processes.map(function(p){return p.name;}), getCell, part.id);
      pages.push('<div style="page-break-after:'+(i<targetParts.length-1?'always':'avoid')+'">'+svg+'</div>');
    });
  }
  var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>&#21830;&#27969;&#12501;&#12525;&#12540;&#22259;</title>'
    +'<style>body{margin:0;padding:8px;background:#fff}svg{max-width:100%;height:auto}@media print{body{margin:0;padding:0}@page{size:landscape;margin:8mm}svg{max-width:100%;height:auto}}</style>'
    +'</head><body>'+pages.join('')
    +'<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},600);};<\/scr'+'ipt>'
    +'</body></html>';
  var win = window.open('','_blank');
  if (win){win.document.write(html);win.document.close();}
}

function ScoreBar({ value }) {
  const color = value >= 70 ? "#22c55e" : value >= 40 ? "#f59e0b" : "#ef4444";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
      <div style={{ flex: 1, height: 4, background: "#1e293b", borderRadius: 2, overflow: "hidden" }}>

      </div>
      <span style={{ fontSize: 10, fontWeight: 700, color, minWidth: 24 }}>{value}</span>
    </div>
  );
}

function ThemePanel({ theme, setTheme, categories, setCategories, subCategories, setSubCategories, parts, setParts, showConfirm }) {
  const [newCatName, setNewCatName] = useState("");
  const drag = useDragSort(categories, setCategories);

  const addCategory = () => {
    const name = newCatName.trim();
    if (!name) return;
    const color = CAT_COLORS[categories.length % CAT_COLORS.length];
    setCategories([...categories, { id: newId(), name, color }]);
    setNewCatName("");
  };

  const removeCategory = (catId) => {
    setCategories(categories.filter(c => c.id !== catId));
    setParts(parts.filter(p => p.categoryId !== catId));
  };

  const updateCategoryName = (catId, name) =>
    setCategories(categories.map(c => c.id === catId ? { ...c, name } : c));

  return (
    <div style={{ maxWidth: 680, margin: "0 auto" }}>
      {/* テーマ名 */}

                        setParts(parts.map(function(p){ return p.subCategoryId===sc.id ? Object.assign({},p,{subCategoryId:null}) : p; }));
                      })}
                      style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 12, padding: 0 }}>×</button>
                  </div>
                ))}
                <div style={{ display: "flex", gap: 5, marginTop: 4 }}>
                  <input id={"new-subcat-" + cat.id} placeholder="中分類名を入力"
                    style={{ flex: 1, background: "#1e293b", border: "1px solid #334155", borderRadius: 5, color: "#e2e8f0", padding: "3px 7px", fontSize: 11, outline: "none" }}
                    onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); var v = e.target.value.trim(); if (v) { setSubCategories(subCategories.concat([{ id: newId(), categoryId: cat.id, name: v }])); e.target.value = ""; } }}} />
                  <button onClick={() => { var inp = document.getElementById("new-subcat-" + cat.id); if (inp && inp.value.trim()) { setSubCategories(subCategories.concat([{ id: newId(), categoryId: cat.id, name: inp.value.trim() }])); inp.value = ""; }}}
                    style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 5, color: "#94a3b8", padding: "3px 10px", fontSize: 11, cursor: "pointer" }}>＋</button>
                </div>
              </div>
              </div>
            );
          })}
        </div>

        {/* 追加フォーム */}
        <div style={{ display: "flex", gap: 8 }}>
          <input
            value={newCatName}
            onChange={e => setNewCatName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addCategory()}
            placeholder="大分類名を入力（例: 光学部品）"
            style={{ flex: 1, background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#e2e8f0", padding: "8px 12px", fontSize: 13, outline: "none" }}
          />
          <button
            onClick={addCategory}
            style={{ background: "linear-gradient(135deg,#6366f1,#0ea5e9)", border: "none", borderRadius: 8, color: "#fff", padding: "8px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}
          >＋ 追加</button>
        </div>
      </div>
    </div>
  );
}

// --- セル詳細モーダル -------------------------------------------------
function CellModal({ partName, processName, cellData, onUpdate, onClose, showConfirm }) {
  const suppliers = cellData?.suppliers || [];
  const selected = cellData?.selected ?? null;

  const addSupplier = () =>
    onUpdate({ ...cellData, suppliers: [...suppliers, { id: newId(), name: "", cost: "", leadTime: "", quality: "", moq: "", notes: "" }] });
  const moveSupplier = (id, dir) => {
    var idx = suppliers.findIndex(function(s) { return s.id === id; });
    var target = idx + dir;
    if (target < 0 || target >= suppliers.length) return;
    var next = suppliers.slice();
    var tmp = next[idx]; next[idx] = next[target]; next[target] = tmp;
    onUpdate({ ...cellData, suppliers: next });
  };
  const removeSupplier = (id) =>
    onUpdate({ ...cellData, suppliers: suppliers.filter(s => s.id !== id), selected: selected === id ? null : selected });
  const changeSupplier = (id, key, val) =>
    onUpdate({ ...cellData, suppliers: suppliers.map(s => s.id === id ? { ...s, [key]: val } : s) });
  const selectSupplier = (id) =>
    onUpdate({ ...cellData, selected: selected === id ? null : id });

  const scores = Object.fromEntries(suppliers.map(s => [s.id, scoreSupplier(s, suppliers)]));
  const maxScore = Math.max(...Object.values(scores), 0);
  const winnerId = suppliers.find(s => scores[s.id] === maxScore && maxScore > 0 && suppliers.length > 1)?.id;

  const { onDragStart, onDragOver, onDragEnd } = useDragSort(suppliers, next => onUpdate({ ...cellData, suppliers: next }));
  const fields = [
    { key: "cost", label: "単価", unit: "円" },
    { key: "leadTime", label: "リードタイム", unit: "日" },
    { key: "quality", label: "品質スコア", unit: "/100" },
    { key: "moq", label: "MOQ", unit: "個" },
  ];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(4px)" }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 16, width: "min(96vw,920px)", maxHeight: "90vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 22px", borderBottom: "1px solid #1e293b" }}>
          <div>
            <div style={{ fontSize: 10, color: "#64748b" }}>{partName}</div>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 800, color: "#f1f5f9" }}>{processName}</h2>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={addSupplier} style={{ background: "linear-gradient(135deg,#0ea5e9,#6366f1)", border: "none", borderRadius: 8, color: "#fff", padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>＋ 候補を追加</button>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 22, lineHeight: 1 }}>×</button>
          </div>
        </div>
        <div style={{ overflowY: "auto", padding: 20, flex: 1 }}>
          {suppliers.length === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 20px", color: "#334155", border: "2px dashed #1e293b", borderRadius: 12 }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>🏭</div>
              <p style={{ margin: 0, fontSize: 12 }}>「＋ 候補を追加」でサプライヤーを登録して比較を始めましょう</p>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 8 }}>
              {suppliers.map((s, i) => {
                const score = scores[s.id];
                const isWinner = s.id === winnerId;
                const isSelected = selected === s.id;
                return (
                  <div key={s.id} draggable onDragStart={() => onDragStart(i)} onDragOver={e => onDragOver(e, i)} onDragEnd={onDragEnd}
                    style={{ minWidth: 200, background: isWinner ? "linear-gradient(135deg,#0f2027,#1a3a2a)" : "#0a1628", border: `1px solid ${isSelected ? "#0ea5e9" : isWinner ? "#22c55e" : "#1e293b"}`, borderRadius: 10, padding: 14, position: "relative", cursor: "grab", flexShrink: 0 }}>
                    {isWinner && <div style={{ position: "absolute", top: -9, left: 10, background: "#22c55e", color: "#000", fontSize: 9, fontWeight: 800, padding: "2px 8px", borderRadius: 20 }}>推奨</div>}
                    <div style={{ display: "flex", alignItems: "center", marginBottom: 10, gap: 6 }}>
                      <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
                        <button onClick={() => moveSupplier(s.id, -1)} disabled={i === 0}
                          style={{ background: "none", border: "none", color: i === 0 ? "#1e293b" : "#64748b", cursor: i === 0 ? "default" : "pointer", fontSize: 11, padding: 0, lineHeight: 1 }}>▲</button>
                        <button onClick={() => moveSupplier(s.id, 1)} disabled={i === suppliers.length - 1}
                          style={{ background: "none", border: "none", color: i === suppliers.length - 1 ? "#1e293b" : "#64748b", cursor: i === suppliers.length - 1 ? "default" : "pointer", fontSize: 11, padding: 0, lineHeight: 1 }}>▼</button>
                      </div>
                      <input value={s.name} onChange={e => changeSupplier(s.id, "name", e.target.value)} placeholder={"サプライヤー " + (i + 1)}
                        style={{ flex: 1, background: "transparent", border: "none", borderBottom: "1px solid #334155", color: "#f1f5f9", fontSize: 13, fontWeight: 700, padding: "2px 0", outline: "none" }} />
                      <button onClick={() => showConfirm("「" + (s.name || "このサプライヤー") + "」を削除しますか？", () => removeSupplier(s.id))} style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 14, padding: 0 }}>×</button>
                    </div>
                    {fields.map(f => (
                      <div key={f.key} style={{ marginBottom: 7 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                          <label style={{ fontSize: 10, color: "#64748b" }}>{f.label}</label>
                          <span style={{ fontSize: 10, color: "#475569" }}>{f.unit}</span>
                        </div>
                        <input type="number" value={s[f.key]} onChange={e => changeSupplier(s.id, f.key, e.target.value)} placeholder="—"
                          style={{ width: "100%", background: "#1e293b", border: "1px solid #334155", borderRadius: 5, color: "#e2e8f0", padding: "5px 8px", fontSize: 12, outline: "none", boxSizing: "border-box" }} />
                      </div>
                    ))}
                    <textarea value={s.notes} onChange={e => changeSupplier(s.id, "notes", e.target.value)} rows={2} placeholder="メモ"
                      style={{ width: "100%", background: "#1e293b", border: "1px solid #334155", borderRadius: 5, color: "#94a3b8", padding: "5px 8px", fontSize: 10, outline: "none", resize: "none", boxSizing: "border-box", marginBottom: 8 }} />
                    <ScoreBar value={score} />
                    <button onClick={() => selectSupplier(s.id)}
                      style={{ width: "100%", marginTop: 8, background: isSelected ? "linear-gradient(135deg,#0ea5e9,#6366f1)" : "#1e293b", border: `1px solid ${isSelected ? "transparent" : "#334155"}`, borderRadius: 6, color: isSelected ? "#fff" : "#94a3b8", padding: "6px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                      {isSelected ? "✓ 採用中" : "採用する"}
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MatrixCell({ cellData, onClick }) {
  const suppliers = cellData?.suppliers || [];
  const selected = cellData?.selected ?? null;
  const sel = suppliers.find(s => s.id === selected);
  const hasData = suppliers.length > 0;
  return (
    <div onClick={onClick} style={{ background: sel ? "linear-gradient(135deg,#0f2027,#1a3a2a)" : hasData ? "#0f172a" : "#080f1a", border: `1px solid ${sel ? "#22c55e" : hasData ? "#1e293b" : "#0f172a"}`, borderRadius: 8, padding: "9px 11px", cursor: "pointer", minHeight: 64, transition: "all 0.15s", position: "relative", display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
      {sel ? (
        <>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#f1f5f9", marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sel.name || "未入力"}</div>
          <div style={{ display: "flex", gap: 5 }}>
            {sel.cost && <span style={{ fontSize: 10, color: "#0ea5e9" }}>¥{parseFloat(sel.cost).toLocaleString()}</span>}

          <div style={{ position: "absolute", top: 6, right: 7, width: 6, height: 6, borderRadius: "50%", background: "#22c55e" }} />
        </>
      ) : hasData ? (
        <>
