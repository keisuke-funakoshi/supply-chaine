var useState=React.useState, useCallback=React.useCallback, useRef=React.useRef;
var XL=window.XLSX;

// =============================================================
// データ構造
// theme:   { id, name, products[] }
// product: { id, name, quantity, targetCost, parts[] }
// part:    { id, name, materials[], processes[], children[] }
// material/process: { id, name, unit?, qty, suppliers[], selectedSupplierId, selectedLotId }
// supplier: { id, name, lots:[ {id, lotQty, unitCost} ] }
// =============================================================

var _seq=1000;
function uid(p){return p+'-'+(++_seq);}

function newLot(q,c){return {id:uid('L'),lotQty:Number(q)||1,unitCost:Number(c)||0};}
function newSupplier(name){return {id:uid('S'),name:name||'新規サプライヤ',lots:[newLot(100,0)]};}
function newMat(){
  var s1=newSupplier('サプライヤA'),s2=newSupplier('サプライヤB');
  return {id:uid('M'),name:'新規材料',unit:'個',qty:1,suppliers:[s1,s2],selectedSupplierId:s1.id,selectedLotId:s1.lots[0].id};
}
function newProc(){
  var s1=newSupplier('協力会社A'),s2=newSupplier('協力会社B');
  return {id:uid('P'),name:'新規工程',qty:1,suppliers:[s1,s2],selectedSupplierId:s1.id,selectedLotId:s1.lots[0].id};
}
function newPart(name){return {id:uid('PT'),name:name||'新規部品',materials:[],processes:[],children:[]};}
function newProduct(name){return {id:uid('PR'),name:name||'新規製品',quantity:1,targetCost:0,parts:[]};}
function newTheme(name){return {id:uid('TH'),name:name||'新規案件',products:[]};}

function getSelSup(row){return row.suppliers.filter(function(s){return s.id===row.selectedSupplierId;})[0]||row.suppliers[0]||null;}
function getSelLot(row){var sup=getSelSup(row);if(!sup)return null;return sup.lots.filter(function(l){return l.id===row.selectedLotId;})[0]||sup.lots[0]||null;}
function getUC(row){var l=getSelLot(row);return l?parseFloat(l.unitCost)||0:0;}
function rowCost(row){return getUC(row)*(parseFloat(row.qty)||1);}

function partCost(part){
  var mat=part.materials.reduce(function(s,m){return s+rowCost(m);},0);
  var proc=part.processes.reduce(function(s,p){return s+rowCost(p);},0);
  var sub=part.children.reduce(function(s,c){return s+partCost(c).total;},0);
  return {mat:mat,proc:proc,sub:sub,total:mat+proc+sub};
}
function productCost(prod){
  var mat=0,proc=0,sub=0;
  prod.parts.forEach(function(pt){var c=partCost(pt);mat+=c.mat;proc+=c.proc;sub+=c.sub;});
  var unit=mat+proc+sub;
  return {mat:mat,proc:proc,sub:sub,unit:unit,total:unit*prod.quantity};
}

var fmt=function(n){return '¥'+Math.round(n).toLocaleString('ja-JP');};
var fmtDate=function(iso){var d=new Date(iso);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};

// サンプルデータ

      mkM('角パイプ 50×50','m',6,[{name:'鉄鋼商事A',lots:[{q:50,c:480},{q:200,c:380}]},{name:'メタルワン',lots:[{q:50,c:460},{q:200,c:360}]}]),

    ],children:[
      {id:uid('PT'),name:'補強リブ',materials:[mkM('鋼板 t=2mm','kg',5,[{name:'鉄鋼商事A',lots:[{q:100,c:120},{q:500,c:95}]}])],
       processes:[mkP('プレス加工',2,[{name:'プレス工業㈱',lots:[{q:100,c:900},{q:500,c:760}]}])],children:[]},
    ]},
    {id:uid('PT'),name:'ブラケット',materials:[mkM('アルミ板 A5052','kg',8,[{name:'アルミ商事',lots:[{q:100,c:380},{q:500,c:320}]},{name:'軽金属㈱',lots:[{q:100,c:370},{q:500,c:310}]}])],

// ツリー操作
function updatePartAt(parts,path,fn){
  if(!path.length)return parts;
  var h=path[0],t=path.slice(1);
  return parts.map(function(pt,i){if(i!==h)return pt;if(t.length===0)return fn(pt);return Object.assign({},pt,{children:updatePartAt(pt.children,t,fn)});});
}
function removePartAt(parts,path){
  if(path.length===1)return parts.filter(function(_,i){return i!==path[0];});
  var h=path[0],t=path.slice(1);
  return parts.map(function(pt,i){return i!==h?pt:Object.assign({},pt,{children:removePartAt(pt.children,t)});});
}
function insertChildAt(parts,path){
  return updatePartAt(parts,path,function(pt){return Object.assign({},pt,{children:pt.children.concat([newPart()])});});
}

// Excel出力（製品単体）
function exportProductXL(prod){
  var wb=XL.utils.book_new();
  var c=productCost(prod);
  var rows=[
    [prod.name+' 原価明細'],['製造数量',prod.quantity,'台'],[prod.targetCost>0?'目標コスト/台':'','目標コスト/台',prod.targetCost||''],[],
    ['台あたり原価',c.unit,'ロット原価',c.total],[],
    ['階層','部品名','種別','品目名','単位','数量','サプライヤ','ロット数量','単価','金額'],
  ];
  function flat(part,depth){
    var pre=Array(depth+1).join('　'),pc=partCost(part);
    rows.push(['L'+depth,pre+part.name,'【合計】','','','','','','',pc.total]);
    part.materials.forEach(function(m){var sup=getSelSup(m),lot=getSelLot(m),uc=getUC(m);rows.push(['',pre+'  '+m.name,'材料',m.name,m.unit,m.qty,sup?sup.name:'',lot?lot.lotQty:'',uc,rowCost(m)]);});
    part.processes.forEach(function(p){var sup=getSelSup(p),lot=getSelLot(p),uc=getUC(p);rows.push(['',pre+'  '+p.name,'加工',p.name,'工程',p.qty,sup?sup.name:'',lot?lot.lotQty:'',uc,rowCost(p)]);});
    part.children.forEach(function(child){flat(child,depth+1);});
  }
  prod.parts.forEach(function(pt){flat(pt,0);});
  rows.push([],[,'【製品合計】','','','','','','','材料費',c.mat],
    ['','','','','','','','','加工費',c.proc],['','','','','','','','','台あたり原価',c.unit],
    ['','','','','','','','','ロット原価×'+prod.quantity,c.total]);
  if(prod.targetCost>0)rows.push(['','','','','','','','','目標比',c.unit-prod.targetCost]);
  var ws=XL.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:6},{wch:22},{wch:8},{wch:18},{wch:6},{wch:6},{wch:16},{wch:10},{wch:12},{wch:12}];
  XL.utils.book_append_sheet(wb,ws,prod.name.slice(0,28));
  XL.writeFile(wb,prod.name+'_原価.xlsx');
}

// サプライヤ集計（製品内・部品ごと）
function calcPartSupSummary(prod){
  // partId -> { partName, depth, suppliers:{ supName->{name,mat,proc,total,items[]} } }
  var result=[];
  function walkPart(part,depth){
    var supMap={};
    function addItem(row,type){
      var sup=getSelSup(row);if(!sup)return;
      var sn=sup.name;
      if(!supMap[sn])supMap[sn]={name:sn,mat:0,proc:0,total:0,items:[]};
      var cost=rowCost(row);
      if(type==='mat')supMap[sn].mat+=cost;else supMap[sn].proc+=cost;
      supMap[sn].total+=cost;
      supMap[sn].items.push({type:type,name:row.name,cost:cost});
    }
    part.materials.forEach(function(m){addItem(m,'mat');});
    part.processes.forEach(function(p){addItem(p,'proc');});
    var sups=Object.keys(supMap).map(function(k){return supMap[k];}).sort(function(a,b){return b.total-a.total;});
    result.push({id:part.id,name:part.name,depth:depth,suppliers:sups,partTotal:partCost(part).total});
    part.children.forEach(function(c){walkPart(c,depth+1);});
  }
  prod.parts.forEach(function(pt){walkPart(pt,0);});
  return result;
}

// バックアップ
function exportBackup(themes){
  var data={version:'1.0',exportedAt:new Date().toISOString(),themes:themes};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='BOM_backup_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importBackup(file,onSuccess){
  var reader=new FileReader();
  reader.onload=function(e){
    try{var data=JSON.parse(e.target.result);if(data.themes)onSuccess(data.themes);else alert('形式が正しくありません');}
    catch(err){alert('読み込みエラー: '+err.message);}
  };
  reader.readAsText(file);
}

// ========== NumInput ==========
function NumInput(props){
  var ls=useState(String(props.value));var local=ls[0],setLocal=ls[1];
  var prev=useRef(props.value);
  if(prev.current!==props.value){prev.current=props.value;setLocal(String(props.value));}
  function handleChange(e){var v=e.target.value;if(/^0[0-9]/.test(v))v=v.replace(/^0+/,'');if(v==='')v='0';setLocal(v);}
  function handleBlur(){var n=parseFloat(local);if(!isNaN(n)){setLocal(String(n));props.onChange(n);}else{setLocal(String(props.value));}}
  return <input type="text" inputMode="decimal" value={local} onChange={handleChange} onBlur={handleBlur} style={props.style}/>;
}

// ========== App ==========
function App(){
  var ts=useState(makeSample);var themes=ts[0],setThemes=ts[1];
  // 選択状態
  var sel=useState(function(){var s=makeSample();return {themeId:s[0].id,prodId:s[0].products[0].id};});
  var selected=sel[0],setSelected=sel[1];
  var tabS=useState('bom');var tab=tabS[0],setTab=tabS[1];
  var sbS=useState(false);var showSB=sbS[0],setShowSB=sbS[1];
  var arcS=useState([]);var archives=arcS[0],setArchives=arcS[1];
  var arcNS=useState('');var arcNote=arcNS[0],setArcNote=arcNS[1];
  var arcMS=useState(false);var showAM=arcMS[0],setShowAM=arcMS[1];
  var importRef=useRef(null);

  var selTheme=themes.filter(function(t){return t.id===selected.themeId;})[0]||null;
  var selProd=selTheme?selTheme.products.filter(function(p){return p.id===selected.prodId;})[0]||null:null;
  var c=selProd?productCost(selProd):null;

  // ===== テーマ操作 =====
  function addTheme(){var t=newTheme();setThemes(function(prev){return prev.concat([t]);});setSelected({themeId:t.id,prodId:null});}
  function renameTheme(tid,name){setThemes(function(prev){return prev.map(function(t){return t.id===tid?Object.assign({},t,{name:name}):t;});});}
  function deleteTheme(tid){
    if(!window.confirm('案件「'+themes.filter(function(t){return t.id===tid;})[0].name+'」を削除しますか？\n内部の全製品も削除されます。'))return;
    setThemes(function(prev){var next=prev.filter(function(t){return t.id!==tid;});return next;});
    if(selected.themeId===tid)setSelected({themeId:null,prodId:null});
  }

  // ===== 製品操作 =====
  function addProduct(tid){var p=newProduct();setThemes(function(prev){return prev.map(function(t){return t.id===tid?Object.assign({},t,{products:t.products.concat([p])}):t;});});setSelected({themeId:tid,prodId:p.id});setShowSB(false);}
  function deleteProduct(tid,pid){
    var prod=selTheme&&selTheme.products.filter(function(p){return p.id===pid;})[0];
    if(!prod)return;
    if(!window.confirm('製品「'+prod.name+'」を削除しますか？'))return;
    setThemes(function(prev){return prev.map(function(t){return t.id!==tid?t:Object.assign({},t,{products:t.products.filter(function(p){return p.id!==pid;});});});});
    if(selected.prodId===pid)setSelected({themeId:tid,prodId:null});
  }
  function updProd(fn){
    if(!selected.themeId||!selected.prodId)return;
    setThemes(function(prev){return prev.map(function(t){return t.id!==selected.themeId?t:Object.assign({},t,{products:t.products.map(function(p){return p.id!==selected.prodId?p:fn(p);});});});});
  }
  function setProdName(n){updProd(function(p){return Object.assign({},p,{name:n});});}
  function setQty(q){updProd(function(p){return Object.assign({},p,{quantity:Math.max(1,Number(q)||1)});});}
  function setTargetCost(v){updProd(function(p){return Object.assign({},p,{targetCost:parseFloat(v)||0});});}

  // ===== 部品ツリー操作 =====
  function updTree(path,fn){updProd(function(p){return Object.assign({},p,{parts:updatePartAt(p.parts,path,fn)});});}
  function addChild(path){updProd(function(p){return Object.assign({},p,{parts:insertChildAt(p.parts,path)});});}
  function removePart(path){updProd(function(p){return Object.assign({},p,{parts:removePartAt(p.parts,path)});});}
  function addRoot(){updProd(function(p){return Object.assign({},p,{parts:p.parts.concat([newPart()])});});}
  function renamePart(path,name){updTree(path,function(pt){return Object.assign({},pt,{name:name});});}

  // 材料
  function addMat(path){updTree(path,function(pt){return Object.assign({},pt,{materials:pt.materials.concat([newMat()])});});}
  function removeMat(path,mid){updTree(path,function(pt){return Object.assign({},pt,{materials:pt.materials.filter(function(m){return m.id!==mid;})});});}
  function updMat(path,mid,fn){updTree(path,function(pt){return Object.assign({},pt,{materials:pt.materials.map(function(m){return m.id===mid?fn(m):m;})});});}
  function setMF(path,mid,f,v){updMat(path,mid,function(m){var o=Object.assign({},m);o[f]=v;return o;});}
  function selMSup(path,mid,sid){updMat(path,mid,function(m){var sup=m.suppliers.filter(function(s){return s.id===sid;})[0];return Object.assign({},m,{selectedSupplierId:sid,selectedLotId:sup&&sup.lots[0]?sup.lots[0].id:null});});}
  function selMLot(path,mid,lid){updMat(path,mid,function(m){return Object.assign({},m,{selectedLotId:lid});});}
  function addMSup(path,mid){updMat(path,mid,function(m){var s=newSupplier();return Object.assign({},m,{suppliers:m.suppliers.concat([s]),selectedSupplierId:m.suppliers.length===0?s.id:m.selectedSupplierId,selectedLotId:m.suppliers.length===0?s.lots[0].id:m.selectedLotId});});}
  function updMSup(path,mid,sid,f,v){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){return s.id===sid?Object.assign({},s,(function(o){o[f]=v;return o;})({})):s;})});});}
  function removeMSup(path,mid,sid){updMat(path,mid,function(m){var sups=m.suppliers.filter(function(s){return s.id!==sid;});var ns=sups[0]||null;return Object.assign({},m,{suppliers:sups,selectedSupplierId:ns?ns.id:null,selectedLotId:ns&&ns.lots[0]?ns.lots[0].id:null});});}
  function addMLot(path,mid,sid){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){if(s.id!==sid)return s;var l=newLot(1,0);return Object.assign({},s,{lots:s.lots.concat([l])});})});});}
  function updMLot(path,mid,sid,lid,f,v){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){if(s.id!==sid)return s;return Object.assign({},s,{lots:s.lots.map(function(l){return l.id===lid?Object.assign({},l,(function(o){o[f]=v;return o;})({})):l;});});});});});}
  function removeMLot(path,mid,sid,lid){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){if(s.id!==sid)return s;var lots=s.lots.filter(function(l){return l.id!==lid;});return Object.assign({},s,{lots:lots});});});});}

  // 加工
  function addProc(path){updTree(path,function(pt){return Object.assign({},pt,{processes:pt.processes.concat([newProc()])});});}
  function removeProc(path,pid){updTree(path,function(pt){return Object.assign({},pt,{processes:pt.processes.filter(function(p){return p.id!==pid;})});});}
  function updProc(path,pid,fn){updTree(path,function(pt){return Object.assign({},pt,{processes:pt.processes.map(function(p){return p.id===pid?fn(p):p;})});});}
  function setPF(path,pid,f,v){updProc(path,pid,function(p){var o=Object.assign({},p);o[f]=v;return o;});}
  function selPSup(path,pid,sid){updProc(path,pid,function(p){var sup=p.suppliers.filter(function(s){return s.id===sid;})[0];return Object.assign({},p,{selectedSupplierId:sid,selectedLotId:sup&&sup.lots[0]?sup.lots[0].id:null});});}
  function selPLot(path,pid,lid){updProc(path,pid,function(p){return Object.assign({},p,{selectedLotId:lid});});}
  function addPSup(path,pid){updProc(path,pid,function(p){var s=newSupplier();return Object.assign({},p,{suppliers:p.suppliers.concat([s]),selectedSupplierId:p.suppliers.length===0?s.id:p.selectedSupplierId,selectedLotId:p.suppliers.length===0?s.lots[0].id:p.selectedLotId});});}
  function updPSup(path,pid,sid,f,v){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){return s.id===sid?Object.assign({},s,(function(o){o[f]=v;return o;})({})):s;})});});}
  function removePSup(path,pid,sid){updProc(path,pid,function(p){var sups=p.suppliers.filter(function(s){return s.id!==sid;});var ns=sups[0]||null;return Object.assign({},p,{suppliers:sups,selectedSupplierId:ns?ns.id:null,selectedLotId:ns&&ns.lots[0]?ns.lots[0].id:null});});}
  function addPLot(path,pid,sid){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){if(s.id!==sid)return s;var l=newLot(1,0);return Object.assign({},s,{lots:s.lots.concat([l])});})});});}
  function updPLot(path,pid,sid,lid,f,v){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){if(s.id!==sid)return s;return Object.assign({},s,{lots:s.lots.map(function(l){return l.id===lid?Object.assign({},l,(function(o){o[f]=v;return o;})({})):l;});});});});});}
  function removePLot(path,pid,sid,lid){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){if(s.id!==sid)return s;var lots=s.lots.filter(function(l){return l.id!==lid;});return Object.assign({},s,{lots:lots});});});});}

  function mkCb(path){return {
    onRename:function(n){renamePart(path,n);},onRemove:function(){removePart(path);},onAddChild:function(){addChild(path);},
    onAddMat:function(){addMat(path);},onRemoveMat:function(mid){removeMat(path,mid);},
    onSetMF:function(mid,f,v){setMF(path,mid,f,v);},onSelMSup:function(mid,sid){selMSup(path,mid,sid);},onSelMLot:function(mid,lid){selMLot(path,mid,lid);},
    onAddMSup:function(mid){addMSup(path,mid);},onUpdMSup:function(mid,sid,f,v){updMSup(path,mid,sid,f,v);},onRemoveMSup:function(mid,sid){removeMSup(path,mid,sid);},
    onAddMLot:function(mid,sid){addMLot(path,mid,sid);},onUpdMLot:function(mid,sid,lid,f,v){updMLot(path,mid,sid,lid,f,v);},onRemoveMLot:function(mid,sid,lid){removeMLot(path,mid,sid,lid);},
    onAddProc:function(){addProc(path);},onRemoveProc:function(pid){removeProc(path,pid);},
    onSetPF:function(pid,f,v){setPF(path,pid,f,v);},onSelPSup:function(pid,sid){selPSup(path,pid,sid);},onSelPLot:function(pid,lid){selPLot(path,pid,lid);},
    onAddPSup:function(pid){addPSup(path,pid);},onUpdPSup:function(pid,sid,f,v){updPSup(path,pid,sid,f,v);},onRemovePSup:function(pid,sid){removePSup(path,pid,sid);},
    onAddPLot:function(pid,sid){addPLot(path,pid,sid);},onUpdPLot:function(pid,sid,lid,f,v){updPLot(path,pid,sid,lid,f,v);},onRemovePLot:function(pid,sid,lid){removePLot(path,pid,sid,lid);},
  };}

  // アーカイブ
  function commitArchive(){
    setArchives(function(prev){return [{id:uid('ARC'),note:arcNote.trim()||'バージョン確定',savedAt:new Date().toISOString(),themes:JSON.parse(JSON.stringify(themes))}].concat(prev);});
    setArcNote('');setShowAM(false);
  }
  function restoreArchive(arc){
    if(!window.confirm('「'+arc.note+'」を復元しますか？現在のデータは上書きされます。'))return;
    setThemes(arc.themes);setSelected({themeId:arc.themes[0]?arc.themes[0].id:null,prodId:arc.themes[0]&&arc.themes[0].products[0]?arc.themes[0].products[0].id:null});
    setTab('bom');
  }
  function deleteArchive(id){if(!window.confirm('削除しますか？'))return;setArchives(function(prev){return prev.filter(function(a){return a.id!==id;});});}

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* ヘッダー */}
      <div style={{background:'linear-gradient(135deg,#1a1f2e,#0d1117)',borderBottom:'1px solid #2d3748',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:50,padding:'0 10px',gap:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={function(){setShowSB(function(v){return !v;});}} style={{width:32,height:32,borderRadius:7,background:'#1e2533',border:'1px solid #2d3748',color:'#94a3b8',cursor:'pointer',fontSize:15,flexShrink:0}}>☰</button>
            <div><div style={{fontWeight:700,fontSize:13,color:'#f1f5f9'}}>BOM COST</div><div style={{fontSize:9,color:'#64748b'}}>製造原価集計</div></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            {selProd&&<button onClick={function(){exportProductXL(selProd);}} style={{padding:'5px 9px',background:'#14532d',border:'1px solid #16a34a',borderRadius:7,color:'#4ade80',fontWeight:700,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📊 Excel</button>}
            <button onClick={function(){exportBackup(themes);}} style={{padding:'5px 9px',background:'#312e81',border:'1px solid #6366f1',borderRadius:7,color:'#a5b4fc',fontWeight:700,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>💾 バックアップ</button>
            <button onClick={function(){importRef.current.click();}} style={{padding:'5px 9px',background:'#1e2533',border:'1px solid #475569',borderRadius:7,color:'#94a3b8',fontWeight:700,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📂 復元</button>
            <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={function(e){var f=e.target.files[0];if(f){importBackup(f,function(data){if(!window.confirm('バックアップを読み込みます。現在のデータは上書きされます。OK？'))return;setThemes(data);var t=data[0];setSelected({themeId:t?t.id:null,prodId:t&&t.products[0]?t.products[0].id:null});});}e.target.value='';}}/>
            <button onClick={function(){setShowAM(true);}} style={{padding:'5px 9px',background:'#1e2d4a',border:'1px solid #3b82f6',borderRadius:7,color:'#60a5fa',fontWeight:700,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📦 保存</button>
          </div>
        </div>
        <div style={{display:'flex',padding:'0 10px',borderTop:'1px solid #1e2533'}}>
          {[{id:'bom',label:'BOM編集'},{id:'supplier',label:'サプライヤ集計'},{id:'archive',label:'アーカイブ('+archives.length+')'}].map(function(t){
            return <button key={t.id} onClick={function(){setTab(t.id);}} style={{padding:'8px 14px',border:'none',background:'transparent',cursor:'pointer',color:tab===t.id?'#60a5fa':'#64748b',borderBottom:tab===t.id?'2px solid #3b82f6':'2px solid transparent',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>{t.label}</button>;
          })}
        </div>
      </div>

      {/* ドロワー：テーマ→製品ツリー */}
      {showSB&&(
        <div style={{position:'fixed',inset:0,zIndex:50,display:'flex'}}>
          <div style={{background:'#1a1f2e',width:270,maxWidth:'82vw',borderRight:'1px solid #2d3748',display:'flex',flexDirection:'column',overflowY:'auto'}}>
            <div style={{padding:'10px 12px',borderBottom:'1px solid #2d3748',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>案件 / 製品</span>
              <div style={{display:'flex',gap:6}}>
                <button onClick={addTheme} style={{padding:'3px 8px',borderRadius:5,background:'#1d4ed8',border:'none',color:'#fff',cursor:'pointer',fontSize:11,fontWeight:700}}>＋案件</button>
                <button onClick={function(){setShowSB(false);}} style={{width:22,height:22,borderRadius:5,background:'#2d3748',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:12}}>✕</button>
              </div>
            </div>
            {themes.map(function(theme){
              var tsel=theme.id===selected.themeId;
              return (
                <div key={theme.id}>
                  {/* テーマ行 */}
                  <div style={{padding:'8px 10px',background:'#161b29',borderBottom:'1px solid #1e2533',display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:9,background:'#1d4ed8',color:'#bfdbfe',padding:'1px 5px',borderRadius:3,fontWeight:700,flexShrink:0}}>案件</span>
                    <input value={theme.name} onChange={function(e){renameTheme(theme.id,e.target.value);}}
                      style={{flex:1,minWidth:0,background:'transparent',border:'none',color:'#c7d2fe',fontSize:12,fontWeight:700,outline:'none'}}/>
                    <button onClick={function(){addProduct(theme.id);}} style={{width:20,height:20,borderRadius:4,background:'#1d4ed855',border:'1px solid #3b82f644',color:'#60a5fa',cursor:'pointer',fontSize:13,lineHeight:'18px',flexShrink:0}}>＋</button>
                    <button onClick={function(){deleteTheme(theme.id);}} style={{width:20,height:20,borderRadius:4,background:'transparent',border:'1px solid #7f1d1d44',color:'#f87171',cursor:'pointer',fontSize:10,flexShrink:0}}>✕</button>
                  </div>
                  {/* 製品一覧 */}
                  {theme.products.map(function(prod){
                    var pc=productCost(prod),psel=prod.id===selected.prodId;
                    var hasTarget=prod.targetCost>0,isOver=hasTarget&&pc.unit>prod.targetCost;
                    return (
                      <div key={prod.id} style={{display:'flex',alignItems:'center',borderBottom:'1px solid #0f1117',background:psel?'#1e2d4a':'transparent',borderLeft:'3px solid '+(psel?'#3b82f6':'transparent')}}>
                        <div onClick={function(){setSelected({themeId:theme.id,prodId:prod.id});setShowSB(false);setTab('bom');}} style={{flex:1,padding:'8px 10px 8px 12px',cursor:'pointer',minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{prod.name}</div>
                          <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                            <span style={{fontSize:10,color:'#64748b'}}>×{prod.quantity}台</span>
                            <span style={{fontSize:10,fontWeight:700,color:hasTarget?(isOver?'#ef4444':'#10b981'):'#8b5cf6'}}>{fmt(pc.unit)}/台</span>
                          </div>
                        </div>
                        <button onClick={function(){deleteProduct(theme.id,prod.id);}} style={{width:20,height:20,borderRadius:4,background:'transparent',border:'1px solid #7f1d1d44',color:'#f87171',cursor:'pointer',fontSize:10,flexShrink:0,marginRight:6}}>✕</button>
                      </div>
                    );
                  })}
                  {theme.products.length===0&&<div style={{padding:'8px 14px',fontSize:10,color:'#475569'}}>製品がありません</div>}
                </div>
              );
            })}
          </div>
          <div style={{flex:1,background:'rgba(0,0,0,0.5)'}} onClick={function(){setShowSB(false);}}/>
        </div>
      )}

      {/* コンテンツ */}
      <div style={{flex:1,overflowY:'auto',padding:10}}>

        {/* BOM編集 */}
        {tab==='bom'&&(
          <div>
            {!selProd?(
              <div style={{textAlign:'center',padding:'60px 20px',color:'#475569'}}>
                <div style={{fontSize:32,marginBottom:10}}>📋</div>
                <div style={{fontSize:13,color:'#64748b'}}>☰ メニューから案件・製品を選択してください</div>
                <button onClick={function(){setShowSB(true);}} style={{marginTop:14,padding:'8px 20px',background:'#1d4ed8',border:'none',borderRadius:8,color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>案件・製品を選択</button>
              </div>
            ):(
              <div>
                {/* パンくず */}
                <div style={{fontSize:10,color:'#64748b',marginBottom:8,display:'flex',alignItems:'center',gap:4}}>
                  <span style={{color:'#6366f1'}}>{selTheme?selTheme.name:''}</span>
                  <span>›</span>
                  <span style={{color:'#94a3b8'}}>{selProd.name}</span>
                </div>
                {/* 製品ヘッダー */}
                <div style={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:10,padding:12,marginBottom:12}}>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
                    <div style={{flex:'1 1 140px',minWidth:0}}>
                      <div style={{fontSize:10,color:'#64748b',marginBottom:2}}>製品名</div>
                      <input value={selProd.name} onChange={function(e){setProdName(e.target.value);}} style={{width:'100%',background:'#0f1117',border:'1px solid #2d3748',borderRadius:6,color:'#f1f5f9',fontSize:14,fontWeight:700,padding:'5px 8px',outline:'none'}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:'#64748b',marginBottom:2}}>製造数量</div>
                      <div style={{display:'flex',alignItems:'center',gap:4,background:'#0f1117',padding:'5px 8px',borderRadius:6,border:'1px solid #2d3748'}}>
                        <NumInput value={selProd.quantity} onChange={function(v){setQty(v);}} style={{width:48,background:'transparent',border:'none',color:'#60a5fa',fontWeight:700,fontSize:14,textAlign:'right',outline:'none'}}/>
                        <span style={{fontSize:10,color:'#94a3b8'}}>台</span>
                      </div>
                    </div>
                    <div>
                      <div style={{fontSize:10,color:'#64748b',marginBottom:2}}>目標コスト/台</div>
                      <div style={{display:'flex',alignItems:'center',gap:4,background:'#0f1117',padding:'5px 8px',borderRadius:6,border:'1px solid '+(selProd.targetCost>0?(c.unit<=selProd.targetCost?'#10b981':'#ef4444'):'#2d3748')}}>
                        <span style={{fontSize:10,color:'#64748b'}}>¥</span>
                        <NumInput value={selProd.targetCost||0} onChange={function(v){setTargetCost(v);}} style={{width:72,background:'transparent',border:'none',color:selProd.targetCost>0?(c.unit<=selProd.targetCost?'#10b981':'#ef4444'):'#94a3b8',fontWeight:700,fontSize:14,textAlign:'right',outline:'none'}}/>
                      </div>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:selProd.targetCost>0?8:0}}>
                    {[{l:'材料費/台',v:fmt(c.mat),col:'#10b981'},{l:'加工費/台',v:fmt(c.proc),col:'#f59e0b'},{l:'台あたり原価',v:fmt(c.unit),col:'#3b82f6'},{l:'ロット原価×'+selProd.quantity,v:fmt(c.total),col:'#8b5cf6'}].map(function(s){
                      return <div key={s.l} style={{background:'#0f1117',border:'1px solid #2d3748',borderRadius:7,padding:'7px 10px'}}><div style={{fontSize:10,color:'#64748b'}}>{s.l}</div><div style={{fontSize:14,fontWeight:700,color:s.col,marginTop:2}}>{s.v}</div></div>;
                    })}
                  </div>
                  {selProd.targetCost>0&&(function(){var diff=c.unit-selProd.targetCost,isOver=diff>0;return(
                    <div style={{paddingTop:7,borderTop:'1px solid #2d3748',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <span style={{fontSize:11,color:'#64748b'}}>目標コスト比</span>
                      <span style={{fontSize:13,fontWeight:800,color:isOver?'#ef4444':'#10b981'}}>{isOver?'▲':'▼'} {fmt(Math.abs(diff))}/台</span>
                      <span style={{fontSize:10,color:isOver?'#ef4444':'#10b981'}}>({isOver?'+':''}{Math.round(diff/selProd.targetCost*100)}%)</span>
                      <span style={{fontSize:10,color:'#64748b',marginLeft:'auto'}}>目標 {fmt(selProd.targetCost)} → 実績 {fmt(c.unit)}</span>
                    </div>
                  );})()||null}
                </div>
                {selProd.parts.map(function(pt,i){return <PartNode key={pt.id} part={pt} path={[i]} depth={0} cb={mkCb([i])} mkCb={mkCb}/>;}) }
                <button onClick={addRoot} style={{width:'100%',padding:10,background:'#161b29',border:'1px dashed #3b82f6',borderRadius:10,color:'#60a5fa',fontWeight:700,fontSize:12,cursor:'pointer',marginTop:4}}>＋ 部品を追加</button>
              </div>
            )}
          </div>
        )}

        {/* サプライヤ集計（製品内・部品ごと） */}
        {tab==='supplier'&&(
          <div>
            {!selProd?(
              <div style={{textAlign:'center',padding:'60px 20px',color:'#475569'}}><div style={{fontSize:32,marginBottom:10}}>🏭</div><div style={{fontSize:13,color:'#64748b'}}>製品を選択してください</div></div>
            ):(function(){
              var partSups=calcPartSupSummary(selProd);
              var colors=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ec4899','#06b6d4'];
              return (
                <div>
                  <div style={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:10,padding:12,marginBottom:12}}>
                    <div style={{fontSize:10,color:'#64748b',marginBottom:4}}>対象製品</div>
                    <div style={{fontWeight:700,color:'#f1f5f9',fontSize:14}}>{selProd.name}</div>
                    <div style={{fontSize:11,color:'#8b5cf6',marginTop:2}}>{fmt(c.unit)}/台 × {selProd.quantity}台 = {fmt(c.total)}</div>
                  </div>
                  {partSups.length===0?<div style={{textAlign:'center',padding:40,color:'#475569'}}>部品がありません</div>:partSups.map(function(ps){
                    if(ps.suppliers.length===0)return null;
                    var indent=Math.min(ps.depth*12,36);
                    return (
                      <div key={ps.id} style={{marginLeft:indent,marginBottom:8,background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:8,overflow:'hidden'}}>
                        <div style={{padding:'7px 12px',background:'#161b29',borderBottom:'1px solid #2d3748',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <div style={{display:'flex',alignItems:'center',gap:6}}>
                            {ps.depth>0&&<span style={{fontSize:9,color:'#475569',fontFamily:'monospace'}}>L{ps.depth}</span>}
                            <span style={{fontSize:12,fontWeight:700,color:'#e2e8f0'}}>{ps.name}</span>
                          </div>
                          <span style={{fontSize:11,color:'#8b5cf6',fontWeight:700}}>{fmt(ps.partTotal)}</span>
                        </div>
                        {ps.suppliers.map(function(sup,si){
                          var col=colors[si%colors.length];
                          return (
                            <div key={sup.name} style={{padding:'6px 12px',borderBottom:'1px solid #1e2533',display:'flex',alignItems:'flex-start',gap:8}}>
                              <div style={{width:3,alignSelf:'stretch',background:col,borderRadius:2,flexShrink:0,marginTop:2}}/>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                                  <span style={{fontSize:11,fontWeight:700,color:col}}>{sup.name}</span>
                                  <span style={{fontSize:12,fontWeight:700,color:col}}>{fmt(sup.total)}</span>
                                </div>
                                <div style={{display:'flex',gap:10,marginBottom:3}}>
                                  {sup.mat>0&&<span style={{fontSize:10,color:'#10b981'}}>材 {fmt(sup.mat)}</span>}
                                  {sup.proc>0&&<span style={{fontSize:10,color:'#f59e0b'}}>加 {fmt(sup.proc)}</span>}
                                </div>
                                {sup.items.map(function(item,ii){return(
                                  <div key={ii} style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#475569',padding:'1px 0'}}>
                                    <span>{item.type==='mat'?'▸材':'▸加'} {item.name}</span>
                                    <span>{fmt(item.cost)}</span>
                                  </div>
                                );})}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}

        {/* アーカイブ */}
        {tab==='archive'&&(
          <div>
            {archives.length===0?(
              <div style={{textAlign:'center',padding:'60px 20px',color:'#475569'}}><div style={{fontSize:36,marginBottom:12}}>📦</div><div style={{fontSize:13,fontWeight:600,color:'#64748b'}}>アーカイブがありません</div></div>
            ):archives.map(function(arc){
              var tot=arc.themes.reduce(function(s,th){return s+th.products.reduce(function(s2,p){return s2+productCost(p).total;},0);},0);
              return (
                <div key={arc.id} style={{background:'#1a1f2e',border:'1px solid #2d3748',borderRadius:10,overflow:'hidden',marginBottom:10}}>
                  <div style={{padding:'10px 12px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,color:'#f1f5f9',fontSize:13}}>{arc.note}</div>
                      <div style={{fontSize:10,color:'#64748b',marginTop:2}}>🕐 {fmtDate(arc.savedAt)}</div>
                      <div style={{fontSize:11,color:'#64748b',marginTop:2}}>{arc.themes.length}案件 / 全{arc.themes.reduce(function(s,t){return s+t.products.length;},0)}製品</div>
                      <div style={{fontSize:13,color:'#8b5cf6',fontWeight:800,marginTop:3}}>{fmt(tot)}</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      <button onClick={function(){restoreArchive(arc);}} style={{padding:'4px 10px',background:'#1e3a5f',border:'1px solid #3b82f6',borderRadius:6,color:'#60a5fa',fontWeight:700,fontSize:11,cursor:'pointer'}}>復元</button>
                      <button onClick={function(){deleteArchive(arc.id);}} style={{padding:'4px 10px',background:'#3a1a1a',border:'1px solid #7f1d1d',borderRadius:6,color:'#f87171',fontWeight:700,fontSize:11,cursor:'pointer'}}>削除</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* アーカイブモーダル */}
      {showAM&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:14}}>
          <div style={{background:'#1a1f2e',border:'1px solid #3b82f6',borderRadius:14,padding:18,width:'100%',maxWidth:400}}>
            <div style={{fontWeight:700,fontSize:14,color:'#f1f5f9',marginBottom:10}}>📦 バージョンを保存</div>
            <div style={{background:'#0f1117',borderRadius:8,padding:'10px 12px',marginBottom:12,maxHeight:200,overflowY:'auto'}}>
              {themes.map(function(th){return(
                <div key={th.id} style={{marginBottom:8}}>
                  <div style={{fontSize:10,color:'#6366f1',fontWeight:700,marginBottom:3}}>{th.name}</div>
                  {th.products.map(function(p){var pc=productCost(p);return(
                    <div key={p.id} style={{display:'flex',justifyContent:'space-between',padding:'2px 8px',borderBottom:'1px solid #1e2533'}}>
                      <span style={{fontSize:11,color:'#e2e8f0'}}>{p.name}</span>
                      <span style={{fontSize:11,color:'#8b5cf6',fontWeight:700}}>{fmt(pc.unit)}/台</span>
                    </div>
                  );})}
                </div>
              );})}
            </div>
            <input value={arcNote} onChange={function(e){setArcNote(e.target.value);}} placeholder="メモ（例：1次見積確定）" autoFocus
              onKeyDown={function(e){if(e.key==='Enter')commitArchive();}}
              style={{width:'100%',background:'#0f1117',border:'1px solid #3b82f6',borderRadius:7,color:'#e2e8f0',padding:'8px 10px',fontSize:13,outline:'none',marginBottom:12}}/>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={function(){setShowAM(false);}} style={{padding:'7px 14px',background:'#2d3748',border:'none',borderRadius:7,color:'#94a3b8',fontWeight:600,cursor:'pointer',fontSize:12}}>キャンセル</button>
              <button onClick={commitArchive} style={{padding:'7px 18px',background:'#1d4ed8',border:'none',borderRadius:7,color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>保存する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ========== PartNode ==========
function PartNode(props){
  var part=props.part,path=props.path,depth=props.depth,cb=props.cb,mkCb=props.mkCb;
  var cs=useState(false);var collapsed=cs[0],setCollapsed=cs[1];
  var cost=partCost(part);
  var colors=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981'];
  var dc=colors[depth%colors.length];
  return (
    <div style={{marginLeft:Math.min(depth*12,36),marginBottom:8}}>
      <div style={{background:'#1a1f2e',border:'1px solid #2d3748',borderLeft:'3px solid '+dc,borderRadius:10,overflow:'hidden'}}>
        <div style={{background:'#161b29',borderBottom:'1px solid #2d3748',padding:'7px 10px'}}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:5}}>
            <button onClick={function(){setCollapsed(function(v){return !v;});}} style={{width:18,height:18,borderRadius:3,background:'transparent',border:'1px solid #2d3748',color:'#64748b',cursor:'pointer',fontSize:8,flexShrink:0}}>{collapsed?'▶':'▼'}</button>
            {depth>0&&<span style={{fontSize:9,color:dc,fontFamily:'monospace',fontWeight:700,flexShrink:0}}>L{depth}</span>}
            <input value={part.name} onChange={function(e){cb.onRename(e.target.value);}} placeholder="部品名"
              style={{flex:1,minWidth:0,background:'#0f1117',border:'1px solid #2d3748',borderRadius:5,color:'#f1f5f9',fontSize:12,fontWeight:700,padding:'3px 7px',outline:'none'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'#10b981'}}>材 {fmt(cost.mat)}</span>
            <span style={{fontSize:10,color:'#f59e0b'}}>加 {fmt(cost.proc)}</span>
            {cost.sub>0&&<span style={{fontSize:10,color:'#8b5cf6'}}>子 {fmt(cost.sub)}</span>}
            <span style={{fontSize:11,color:'#e2e8f0',fontWeight:700,marginRight:'auto'}}>{fmt(cost.total)}</span>
            <button onClick={cb.onAddChild} style={{padding:'2px 7px',background:'#1e2d4a',border:'1px solid '+dc+'66',borderRadius:4,color:dc,fontSize:10,fontWeight:700,cursor:'pointer'}}>＋子</button>
            <button onClick={function(){if(window.confirm('「'+part.name+'」を削除しますか？'))cb.onRemove();}} style={{width:20,height:20,borderRadius:4,background:'#3a1a1a',border:'1px solid #7f1d1d',color:'#f87171',cursor:'pointer',fontSize:10,flexShrink:0}}>✕</button>
          </div>
        </div>
        {!collapsed&&(
          <div>
            <div style={{borderBottom:'1px solid #2d3748'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 10px'}}>
                <span style={{fontSize:9,fontWeight:700,color:'#10b981',padding:'1px 6px',borderRadius:3,background:'#064e3b'}}>材料費</span>
                <button onClick={cb.onAddMat} style={{fontSize:10,fontWeight:700,background:'transparent',border:'1px solid #10b98155',borderRadius:3,padding:'1px 7px',cursor:'pointer',color:'#10b981'}}>＋追加</button>
              </div>
              {part.materials.length===0?<div style={{padding:'8px',textAlign:'center',color:'#475569',fontSize:10}}>材料がありません</div>
                :part.materials.map(function(m){return <ItemRow key={m.id} row={m} color='#10b981' type='mat'
                  onRemoveRow={function(){if(window.confirm('「'+m.name+'」を削除しますか？'))cb.onRemoveMat(m.id);}}
                  onSetField={function(f,v){cb.onSetMF(m.id,f,v);}}
                  onSelSup={function(sid){cb.onSelMSup(m.id,sid);}} onSelLot={function(lid){cb.onSelMLot(m.id,lid);}}
                  onAddSup={function(){cb.onAddMSup(m.id);}} onUpdSup={function(sid,f,v){cb.onUpdMSup(m.id,sid,f,v);}} onRemoveSup={function(sid){cb.onRemoveMSup(m.id,sid);}}
                  onAddLot={function(sid){cb.onAddMLot(m.id,sid);}} onUpdLot={function(sid,lid,f,v){cb.onUpdMLot(m.id,sid,lid,f,v);}} onRemoveLot={function(sid,lid){cb.onRemoveMLot(m.id,sid,lid);}}/>;})
              }
            </div>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 10px'}}>
                <span style={{fontSize:9,fontWeight:700,color:'#f59e0b',padding:'1px 6px',borderRadius:3,background:'#431407'}}>加工費</span>
                <button onClick={cb.onAddProc} style={{fontSize:10,fontWeight:700,background:'transparent',border:'1px solid #f59e0b55',borderRadius:3,padding:'1px 7px',cursor:'pointer',color:'#f59e0b'}}>＋追加</button>
              </div>
              {part.processes.length===0?<div style={{padding:'8px',textAlign:'center',color:'#475569',fontSize:10}}>加工工程がありません</div>
                :part.processes.map(function(p){return <ItemRow key={p.id} row={p} color='#f59e0b' type='proc'
                  onRemoveRow={function(){if(window.confirm('「'+p.name+'」を削除しますか？'))cb.onRemoveProc(p.id);}}
                  onSetField={function(f,v){cb.onSetPF(p.id,f,v);}}
                  onSelSup={function(sid){cb.onSelPSup(p.id,sid);}} onSelLot={function(lid){cb.onSelPLot(p.id,lid);}}
                  onAddSup={function(){cb.onAddPSup(p.id);}} onUpdSup={function(sid,f,v){cb.onUpdPSup(p.id,sid,f,v);}} onRemoveSup={function(sid){cb.onRemovePSup(p.id,sid);}}
                  onAddLot={function(sid){cb.onAddPLot(p.id,sid);}} onUpdLot={function(sid,lid,f,v){cb.onUpdPLot(p.id,sid,lid,f,v);}} onRemoveLot={function(sid,lid){cb.onRemovePLot(p.id,sid,lid);}}/>;})
              }
            </div>
          </div>
        )}
      </div>
      {!collapsed&&part.children.map(function(child,ci){
        var np=depth===0?[path[0],ci]:path.concat([ci]);
        return <PartNode key={child.id} part={child} path={np} depth={depth+1} cb={mkCb(np)} mkCb={mkCb}/>;
      })}
    </div>
  );
}

// ========== ItemRow ==========
function ItemRow(props){
  var row=props.row,color=props.color,type=props.type;
  var os=useState(false);var open=os[0],setOpen=os[1];
  var selSup=getSelSup(row),selLot=getSelLot(row),uc=getUC(row),isMat=type==='mat';
  return (
    <div style={{borderBottom:'1px solid #1e2533'}}>
      <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 8px',flexWrap:'wrap'}}>
        <button onClick={props.onRemoveRow} style={{width:18,height:18,borderRadius:3,background:'transparent',border:'1px solid #3a2530',color:'#94556a',cursor:'pointer',fontSize:9,flexShrink:0}}>✕</button>
        <input value={row.name} onChange={function(e){props.onSetField('name',e.target.value);}} placeholder={isMat?'材料名':'工程名'}
          style={{flex:'1 1 80px',minWidth:60,background:'#0f1117',border:'1px solid #2d3748',borderRadius:4,color:'#e2e8f0',padding:'3px 5px',fontSize:11,outline:'none'}}/>
        <NumInput value={row.qty} onChange={function(v){props.onSetField('qty',v);}} style={{width:48,background:'#0f1117',border:'1px solid #2d3748',borderRadius:4,color:'#e2e8f0',padding:'3px 4px',fontSize:11,outline:'none',textAlign:'right'}}/>
        {isMat&&<input value={row.unit} onChange={function(e){props.onSetField('unit',e.target.value);}} style={{width:32,background:'#0f1117',border:'1px solid #2d3748',borderRadius:4,color:'#94a3b8',padding:'3px 4px',fontSize:11,outline:'none',textAlign:'center'}}/>}
        <select value={row.selectedSupplierId||(selSup?selSup.id:'')} onChange={function(e){props.onSelSup(e.target.value);}}
          style={{background:'#1a1f2e',border:'1px solid '+color+'55',borderRadius:4,color:color,padding:'2px 4px',fontSize:10,cursor:'pointer',outline:'none',maxWidth:110,minWidth:70,fontWeight:700}}>
          {row.suppliers.map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}
        </select>
        {selSup&&selSup.lots.length>0&&(
          <select value={row.selectedLotId||(selLot?selLot.id:'')} onChange={function(e){props.onSelLot(e.target.value);}}
            style={{background:'#0f1117',border:'1px solid #2d3748',borderRadius:4,color:'#94a3b8',padding:'2px 4px',fontSize:10,cursor:'pointer',outline:'none',maxWidth:110,minWidth:60}}>
            {selSup.lots.map(function(l){return <option key={l.id} value={l.id}>{l.lotQty}個 {fmt(l.unitCost)}</option>;})}
          </select>
        )}
        <span style={{fontSize:10,color:'#475569',whiteSpace:'nowrap'}}>{fmt(uc)}/{isMat?'個':'工程'}</span>
        <span style={{fontSize:11,color:color,fontWeight:700,whiteSpace:'nowrap',marginLeft:'auto'}}>{fmt(rowCost(row))}</span>
        <button onClick={function(){setOpen(function(v){return !v;});}}
          style={{padding:'2px 6px',background:open?'#1e2533':'transparent',border:'1px solid '+color+'44',borderRadius:4,color:color,fontSize:9,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
          {open?'▲':'▼'}設定
        </button>
      </div>
      {open&&(
        <div style={{background:'#090d18',borderTop:'1px solid #2d3748',padding:'10px 10px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:10,fontWeight:700,color:'#64748b'}}>サプライヤ・ロット設定</span>
            <button onClick={props.onAddSup} style={{fontSize:10,fontWeight:700,background:'transparent',border:'1px solid '+color+'55',borderRadius:4,padding:'2px 8px',cursor:'pointer',color:color}}>＋ サプライヤ追加</button>
          </div>
          {row.suppliers.map(function(sup){
            var isSel=sup.id===row.selectedSupplierId;
            return (
              <div key={sup.id} style={{marginBottom:8,border:'1px solid '+(isSel?color+'55':'#1e2533'),borderRadius:7,overflow:'hidden',background:isSel?'#0c1520':'#0f1117'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 8px',borderBottom:'1px solid #1e2533'}}>
                  <input type="radio" checked={isSel} onChange={function(){props.onSelSup(sup.id);}} style={{accentColor:color,flexShrink:0,width:14,height:14}}/>
                  <input value={sup.name} onChange={function(e){props.onUpdSup(sup.id,'name',e.target.value);}} placeholder="サプライヤ名"
                    style={{flex:1,background:'transparent',border:'none',borderBottom:'1px solid #2d3748',color:isSel?'#f1f5f9':'#94a3b8',fontWeight:isSel?700:400,fontSize:12,padding:'1px 4px',outline:'none'}}/>
                  {row.suppliers.length>1&&(
                    <button onClick={function(){if(window.confirm('「'+sup.name+'」を削除しますか？'))props.onRemoveSup(sup.id);}} style={{width:18,height:18,borderRadius:3,background:'transparent',border:'1px solid #3a2530',color:'#94556a',cursor:'pointer',fontSize:9,flexShrink:0}}>✕</button>
                  )}
                </div>
                <div style={{padding:'4px 8px 6px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <span style={{fontSize:9,color:'#475569'}}>ロット別単価</span>
                    <button onClick={function(){props.onAddLot(sup.id);}} style={{fontSize:9,fontWeight:700,background:'transparent',border:'1px solid #2d3748',borderRadius:3,padding:'1px 6px',cursor:'pointer',color:'#64748b'}}>＋ロット追加</button>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'16px 1fr 80px 80px 20px',gap:4,padding:'2px 0',marginBottom:2}}>
                    <span></span><span style={{fontSize:9,color:'#475569'}}>ロット数量</span><span style={{fontSize:9,color:'#475569',textAlign:'right'}}>単価（¥）</span><span style={{fontSize:9,color:'#475569',textAlign:'right'}}>行金額</span><span></span>
                  </div>
                  {sup.lots.map(function(lot){
                    var isSelLot=isSel&&lot.id===row.selectedLotId;
                    return (
                      <div key={lot.id} style={{display:'grid',gridTemplateColumns:'16px 1fr 80px 80px 20px',gap:4,alignItems:'center',padding:'2px 0',background:isSelLot?color+'11':'transparent',borderRadius:4}}>
                        <input type="radio" checked={isSelLot} onChange={function(){props.onSelSup(sup.id);props.onSelLot(lot.id);}} style={{accentColor:color,width:12,height:12,margin:'0 auto'}}/>
                        <div style={{display:'flex',alignItems:'center',gap:3}}>
                          <NumInput value={lot.lotQty} onChange={function(v){props.onUpdLot(sup.id,lot.id,'lotQty',v);}}
                            style={{width:'100%',background:'#0f1117',border:'1px solid '+(isSelLot?color+'55':'#2d3748'),borderRadius:3,color:'#e2e8f0',padding:'3px 5px',fontSize:11,outline:'none',textAlign:'right'}}/>
                          <span style={{fontSize:9,color:'#475569',flexShrink:0}}>個</span>
                        </div>
                        <NumInput value={lot.unitCost} onChange={function(v){props.onUpdLot(sup.id,lot.id,'unitCost',v);}}
                          style={{background:'#0f1117',border:'1px solid '+(isSelLot?color+'55':'#2d3748'),borderRadius:3,color:isSelLot?color:'#e2e8f0',fontWeight:isSelLot?700:400,padding:'3px 5px',fontSize:11,outline:'none',textAlign:'right',width:'100%'}}/>
                        <span style={{fontSize:10,color:isSelLot?color:'#475569',textAlign:'right',fontWeight:isSelLot?700:400}}>{fmt((parseFloat(lot.unitCost)||0)*(parseFloat(row.qty)||1))}</span>
                        {sup.lots.length>1&&(
                          <button onClick={function(){if(window.confirm(lot.lotQty+'個ロットを削除しますか？'))props.onRemoveLot(sup.id,lot.id);}} style={{width:16,height:16,borderRadius:3,background:'transparent',border:'1px solid #3a2530',color:'#94556a',cursor:'pointer',fontSize:8}}>✕</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
