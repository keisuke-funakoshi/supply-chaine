                ＋ テーマを追加
              </button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
              {themes.map(t => {
                const tParts = t.parts || [];
                const tProcs = t.processes || [];
                const tCats = t.categories || [];
                const tMatrix = t.matrix || {};
                const tCompleted = tParts.reduce((cnt, part) =>
                  cnt + tProcs.filter((_, ci) => (tMatrix[`${part.id}_${ci}`]?.selected != null)).length, 0);
                const tTotal = tParts.length * tProcs.length;
                const tCost = tParts.reduce((sum, part) =>
                  sum + tProcs.reduce((s2, _, ci) => {
                    const cell = tMatrix[`${part.id}_${ci}`];
                    const sel = cell?.suppliers?.find(s => s.id === cell?.selected);
                    return sel?.cost ? s2 + parseFloat(sel.cost) : s2;
                  }, 0), 0);
                const isActive = t.theme.id === activeThemeId;
                const prog = tTotal > 0 ? Math.round(tCompleted / tTotal * 100) : 0;
                return (
                  <div key={t.theme.id}
                    onClick={() => { setActiveThemeId(t.theme.id); setView("matrix"); }}
                    style={{ background: isActive ? "linear-gradient(135deg,#0c1a3a,#0a2a1a)" : "#0f172a", border: `2px solid ${isActive ? "#6366f1" : "#1e293b"}`, borderRadius: 14, padding: "18px 20px", cursor: "pointer", transition: "border-color 0.2s", position: "relative" }}>
                    {isActive && (
                      <div style={{ position: "absolute", top: -10, left: 14, background: "linear-gradient(135deg,#6366f1,#0ea5e9)", color: "#fff", fontSize: 9, fontWeight: 800, padding: "2px 10px", borderRadius: 20 }}>作業中</div>
                    )}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                      <div style={{ fontSize: 14, fontWeight: 800, color: "#f1f5f9", flex: 1, marginRight: 8 }}>{t.theme.name}</div>
                      {themes.length > 1 && (
                        <button onClick={e => { e.stopPropagation(); deleteTheme(t.theme.id); }}
                          style={{ background: "none", border: "1px solid #334155", borderRadius: 6, color: "#475569", width: 22, height: 22, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>×</button>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, color: "#64748b" }}>📦 {tParts.length}部品</span>
                      <span style={{ fontSize: 11, color: "#64748b" }}>🗂 {tCats.length}大分類</span>
                      {tCost > 0 && <span style={{ fontSize: 11, color: "#0ea5e9", fontWeight: 600 }}>¥{tCost.toLocaleString()}</span>}
                    </div>
                    {/* 大分類チップ */}
                    {tCats.length > 0 && (
                      <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 12 }}>
                        {tCats.map(cat => (
                          <span key={cat.id} style={{ fontSize: 10, background: (cat.color || "#6366f1") + "22", color: cat.color || "#6366f1", border: `1px solid ${(cat.color || "#6366f1")}44`, borderRadius: 20, padding: "1px 8px" }}>{cat.name}</span>
                        ))}
                      </div>
                    )}
                    {/* 進捗バー */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 4, background: "#1e293b", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{ width: `${prog}%`, height: "100%", background: prog === 100 ? "#22c55e" : "#6366f1", borderRadius: 2, transition: "width 0.4s" }} />
                      </div>
                      <span style={{ fontSize: 10, color: prog === 100 ? "#22c55e" : "#475569", minWidth: 40 }}>{tCompleted}/{tTotal}</span>
                    </div>
                    <div style={{ marginTop: 12, fontSize: 11, color: isActive ? "#6366f1" : "#334155", fontWeight: isActive ? 600 : 400 }}>
                      {isActive ? "← 現在作業中" : "クリックして切り替え →"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* -- テーマ設定 -- */}
        {view === "theme" && (
          <ThemePanel theme={theme} setTheme={setTheme} categories={categories} setCategories={setCategories} subCategories={subCategories} setSubCategories={setSubCategories} parts={parts} setParts={setParts} showConfirm={showConfirm} />
        )}

        {/* -- マトリクス -- */}
        {view === "matrix" && (
          <div>
            {/* ツールバー */}
            <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <select
                  value={resolvedPartCatId}
                  onChange={e => setNewPartCatId(e.target.value)}
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#94a3b8", padding: "5px 8px", fontSize: 12, outline: "none" }}
                >
                  {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <input value={newPartName} onChange={e => setNewPartName(e.target.value)} onKeyDown={e => e.key === "Enter" && addPart()} placeholder="部品名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 110 }} />
                <button onClick={addPart} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 部品</button>
              </div>
              <div style={{ width: 1, height: 24, background: "#1e293b" }} />
              <div style={{ display: "flex", gap: 6 }}>
                <input value={newProcName} onChange={e => setNewProcName(e.target.value)} onKeyDown={e => e.key === "Enter" && addProcess()} placeholder="工程名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 110 }} />
                <button onClick={addProcess} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 工程</button>
              </div>
            </div>

            {/* 大分類フィルタ */}
            <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
              <button onClick={() => setFilterCatId(null)}
                style={{ background: filterCatId === null ? "#1e293b" : "transparent", border: `1px solid ${filterCatId === null ? "#475569" : "#1e293b"}`, borderRadius: 20, color: filterCatId === null ? "#e2e8f0" : "#475569", padding: "4px 12px", fontSize: 11, cursor: "pointer" }}>
                すべて
              </button>
              {categories.map(cat => (
                <button key={cat.id} onClick={() => setFilterCatId(filterCatId === cat.id ? null : cat.id)}
                  style={{ background: filterCatId === cat.id ? cat.color + "22" : "transparent", border: `1px solid ${filterCatId === cat.id ? cat.color : "#1e293b"}`, borderRadius: 20, color: filterCatId === cat.id ? cat.color : "#475569", padding: "4px 12px", fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: cat.color, display: "inline-block" }} />
                  {cat.name}
                </button>
              ))}
            </div>

            {/* テーブル */}
            <div style={{ overflowX: "auto" }}>
              <table style={{ borderCollapse: "separate", borderSpacing: 0, minWidth: 600 }}>
                <thead>
                  <tr>
                    {/* 大分類列 */}
                    <th style={{ width: 10, padding: 0 }} />
                    <th style={{ width: 110, minWidth: 90 }} />
                    {processes.map((proc, ci) => (
                      <th key={proc.id} draggable onDragStart={() => procDrag.onDragStart(ci)} onDragOver={e => procDrag.onDragOver(e, ci)} onDragEnd={procDrag.onDragEnd}
                        style={{ padding: "0 5px 8px", minWidth: 140, cursor: "grab" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "7px 10px" }}>
                          <span style={{ color: "#334155", fontSize: 12, marginRight: 4, flexShrink: 0 }}>⠿</span>
                          <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", flex: 1, textAlign: "center" }}>{proc.name}</span>
                          <button onClick={() => showConfirm(`「${proc.name}」を削除しますか？`, () => removeProcess(proc.id))} style={{ background: "none", border: "none", color: "#334155", cursor: "pointer", fontSize: 13, padding: 0, lineHeight: 1 }}>×</button>
                        </div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {/* 大分類ごとにグループ化して表示 */}
                  {categories.map(cat => {
                    const catParts = displayParts.filter(p => p.categoryId === cat.id);
                    if (catParts.length === 0) return null;
                    return catParts.map((part, pi) => (
                      <tr key={part.id} draggable onDragStart={() => partDrag.onDragStart(parts.indexOf(part))} onDragOver={e => partDrag.onDragOver(e, parts.indexOf(part))} onDragEnd={partDrag.onDragEnd}>
                        {/* 大分類カラーバー（グループの先頭行のみラベル） */}
                        <td style={{ padding: "0 0 7px 0", verticalAlign: "top" }}>
                          <div style={{ width: 4, height: "100%", minHeight: 64, background: pi === 0 ? cat.color : cat.color + "44", borderRadius: 4, marginRight: 4 }} />
                        </td>
                        {/* 部品名 */}
                        <td style={{ padding: "0 8px 7px 4px", verticalAlign: "top", cursor: "grab" }}>
                          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "8px 10px" }}>
                            {pi === 0 && (
                              <div style={{ fontSize: 9, color: cat.color, fontWeight: 700, marginBottom: 4, letterSpacing: "0.05em" }}>{cat.name}</div>
                            )}
                            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                              <span style={{ color: "#334155", fontSize: 13 }}>⠿</span>
                              <span style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0", flex: 1 }}>{part.name}</span>
                              <button onClick={() => showConfirm(`「${part.name}」を削除しますか？`, () => removePart(part.id))} style={{ background: "none", border: "none", color: "#334155", cursor: "pointer", fontSize: 13, padding: 0, lineHeight: 1 }}>×</button>
                            </div>
                          </div>
                        </td>
                        {processes.map((_, ci) => (
                          <td key={ci} style={{ padding: "0 5px 7px" }}>
                            <MatrixCell cellData={getCell(part.id, ci)} onClick={() => setModal({ partId: part.id, partName: part.name, processIdx: ci })} />
                          </td>
                        ))}
                      </tr>
                    ));
                  })}
                </tbody>
              </table>
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 14, fontSize: 10, color: "#475569" }}>
              {[{ color: "#22c55e", label: "採用確定" }, { color: "#f59e0b", label: "検討中" }, { color: "#1e293b", label: "未着手" }].map(l => (
                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: l.color }} />{l.label}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* -- フロービュー（マトリクス統合） -- */}
        {view === "flow" && (
          <div>
            {/* -- ツールバー：部品・工程追加 -- */}
            <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <select value={resolvedPartCatId} onChange={e => setNewPartCatId(e.target.value)}
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#94a3b8", padding: "5px 8px", fontSize: 12, outline: "none" }}>
                  {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                {subCategories.filter(sc => sc.categoryId === resolvedPartCatId).length > 0 && (
                  <select value={newPartSubCatId} onChange={e => setNewPartSubCatId(e.target.value)}
                    style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#94a3b8", padding: "5px 8px", fontSize: 12, outline: "none" }}>
                    <option value="">中分類なし</option>
                    {subCategories.filter(sc => sc.categoryId === resolvedPartCatId).map(sc => <option key={sc.id} value={sc.id}>{sc.name}</option>)}
                  </select>
                )}
                <input id="new-part-input" value={newPartName} onChange={e => setNewPartName(e.target.value)} onKeyDown={e => { if(e.key==="Enter"){e.preventDefault();addPart();}}} placeholder="部品名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 100 }} />
                <button onClick={addPart} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 部品</button>
              </div>
              <div style={{ width: 1, height: 20, background: "#1e293b" }} />
              <div style={{ display: "flex", gap: 6 }}>
                <input value={newProcName} onChange={e => setNewProcName(e.target.value)} onKeyDown={e => e.key === "Enter" && addProcess()} placeholder="工程名"
                  style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, color: "#e2e8f0", padding: "5px 10px", fontSize: 12, outline: "none", width: 100 }} />
                <button onClick={addProcess} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "5px 11px", fontSize: 12, cursor: "pointer" }}>＋ 工程</button>
              </div>
            </div>

            {/* -- 大分類タブ -- */}
            <div style={{ borderBottom: "2px solid #1e293b", marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 0, overflowX: "auto" }}>
                {/* すべてタブ */}
                <button onClick={() => setFlowPartId("__all__")}
                  style={{ background: "none", border: "none", borderBottom: `3px solid ${(!flowPartId || flowPartId === "__all__") ? "#6366f1" : "transparent"}`, color: (!flowPartId || flowPartId === "__all__") ? "#e2e8f0" : "#475569", padding: "8px 16px", fontSize: 12, fontWeight: (!flowPartId || flowPartId === "__all__") ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap", marginBottom: -2 }}>
                  すべて
                </button>
                {/* 大分類タブ */}
                {categories.map(cat => {
                  const catParts = parts.filter(p => p.categoryId === cat.id);
                  if (!catParts.length) return null;
                  const isActive = flowPartId === "cat:" + cat.id || catParts.some(p => p.id === flowPartId);
                  return (
                    <button key={cat.id} onClick={() => { setFlowPartId("cat:" + cat.id); setNewPartCatId(cat.id); }}
                      style={{ background: "none", border: "none", borderBottom: `3px solid ${isActive ? cat.color : "transparent"}`, color: isActive ? cat.color : "#475569", padding: "8px 16px", fontSize: 12, fontWeight: isActive ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap", marginBottom: -2, display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: cat.color, flexShrink: 0 }}/>
                      {cat.name}
                    </button>
                  );
                })}
              </div>
              {/* 選択中の大分類内の中分類・部品タブ（2段目） */}
              {(function() {
                if (!flowPartId || flowPartId === "__all__") return null;
                var activeCatId = flowPartId.startsWith("cat:") ? flowPartId.slice(4)
                  : (parts.find(function(p){ return p.id === flowPartId; }) || {}).categoryId;
                var activeCat = categories.find(function(c){ return c.id === activeCatId; });
                var catParts = parts.filter(function(p){ return p.categoryId === activeCatId; });
                if (!catParts.length || !activeCat) return null;
                return (
                  <div style={{ display: "flex", gap: 0, paddingLeft: 8, overflowX: "auto", borderTop: "1px solid #1e293b" }}>
                    {catParts.map(function(part) {
                      var sc = subCategories.find(function(s){ return s.id === part.subCategoryId; });
                      var isActive = flowPartId === part.id;
                      return (
                        <button key={part.id} onClick={function(){ setFlowPartId(part.id); }}
                          style={{ background: "none", border: "none", borderBottom: "2px solid " + (isActive ? activeCat.color : "transparent"), color: isActive ? activeCat.color : "#64748b", padding: "5px 12px", fontSize: 11, fontWeight: isActive ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap", marginBottom: -1 }}>
                          {sc ? <span style={{ fontSize: 9, color: "#64748b", marginRight: 3 }}>{sc.name}/</span> : null}{part.name}
                        </button>
                      );
                    })}
                    <button onClick={function(){ setNewPartCatId(activeCatId); setNewPartName(""); var el = document.getElementById("new-part-input"); if(el) el.focus(); }}
                      style={{ background: "none", border: "none", color: "#334155", padding: "5px 8px", fontSize: 14, cursor: "pointer" }}>＋</button>
                  </div>
                );
              })()}
            </div>

            {/* -- 工程管理バー（フロー図直上） -- */}
            <div style={{ background: "#080f1a", border: "1px solid #1e293b", borderRadius: 10, padding: "10px 14px", marginBottom: 10, overflowX: "auto" }}>
              <div style={{ fontSize: 10, color: "#475569", marginBottom: 7 }}>工程の順番・削除</div>
              <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "nowrap" }}>
                {processes.map(function(proc, ci) {
                  function swapProc(fromIdx, toIdx) {
                    // processes と matrix を同時に updateActiveData で更新
                    var nextProcs = processes.slice();
                    var tmp = nextProcs[fromIdx]; nextProcs[fromIdx] = nextProcs[toIdx]; nextProcs[toIdx] = tmp;
                    var nextMatrix = Object.assign({}, matrix);
                    parts.forEach(function(part) {
                      var keyA = part.id + "_" + fromIdx;
                      var keyB = part.id + "_" + toIdx;
                      var cellA = matrix[keyA];
                      var cellB = matrix[keyB];
                      if (cellA) { nextMatrix[keyB] = cellA; } else { delete nextMatrix[keyB]; }
                      if (cellB) { nextMatrix[keyA] = cellB; } else { delete nextMatrix[keyA]; }
                    });
                    updateActiveData({ processes: nextProcs, matrix: nextMatrix });
                  }
                  function moveLeft() { if (ci > 0) swapProc(ci, ci - 1); }
                  function moveRight() { if (ci < processes.length - 1) swapProc(ci, ci + 1); }
                  function delProc() {
                    showConfirm("「" + proc.name + "」を削除しますか？", function() { removeProcess(proc.id); });
                  }
                  return (
                    <div key={proc.id} style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                      <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "5px 8px", display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, whiteSpace: "nowrap" }}>{proc.name}</span>
                        <button onClick={moveLeft} style={{ background: ci === 0 ? "none" : "#1e293b", border: "1px solid #334155", borderRadius: 4, color: ci === 0 ? "#1e293b" : "#64748b", cursor: ci === 0 ? "default" : "pointer", fontSize: 13, padding: "1px 7px", lineHeight: 1 }}>←</button>
                        <button onClick={moveRight} style={{ background: ci === processes.length - 1 ? "none" : "#1e293b", border: "1px solid #334155", borderRadius: 4, color: ci === processes.length - 1 ? "#1e293b" : "#64748b", cursor: ci === processes.length - 1 ? "default" : "pointer", fontSize: 13, padding: "1px 7px", lineHeight: 1 }}>→</button>
                        <button onClick={delProc} style={{ background: "#1e293b", border: "1px solid #ef444433", borderRadius: 4, color: "#ef4444", cursor: "pointer", fontSize: 13, padding: "1px 7px", lineHeight: 1 }}>×</button>
                      </div>
                      {ci < processes.length - 1 && <span style={{ color: "#334155", fontSize: 14, flexShrink: 0 }}>›</span>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* -- フロー図本体 -- */}
            {(function() {
              var flowPartIds;
              if (!flowPartId || flowPartId === "__all__") {
                flowPartIds = "__all__";
              } else if (flowPartId.indexOf("cat:") === 0) {
                var catId2 = flowPartId.slice(4);
                flowPartIds = parts.filter(function(p) { return p.categoryId === catId2; }).map(function(p) { return p.id; });
              } else {
                flowPartIds = [flowPartId];
              }
              return (
                <div className="flow-container" style={{ background: "#080f1a", border: "1px solid #1e293b", borderRadius: 12, padding: 20, position: "relative" }}>
                  <FlowView partIds={flowPartIds} parts={parts} categories={categories} subCategories={subCategories} processes={processes.map(function(p){ return p.name; })} getCell={function(pid, ci){ return getCell(pid, ci); }} setCell={function(pid, ci, data){ return setCell(pid, ci, data); }} targetCostMap={targetCostMap} setTargetCostMap={setTargetCostMap} onOpenModal={function(partId, partName, ci){ return setModal({ partId: partId, partName: partName, processIdx: ci }); }}
                  themeId={activeThemeId}
                  setParts={setParts}
                  removePart={removePart}
                  showConfirm={showConfirm}
                  />
                </div>
              );
            })()}

            {/* -- 凡例 -- */}
            <div style={{ display: "flex", gap: 16, marginTop: 14, fontSize: 10, color: "#475569" }}>
              {[{ color: "#22c55e", label: "採用確定" }, { color: "#f59e0b", label: "検討中" }, { color: "#1e293b", label: "未着手" }].map(l => (
                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: l.color }} />{l.label}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* -- サマリー -- */}
        {view === "summary" && (
          <div>
            <h2 style={{ color: "#f1f5f9", fontSize: 18, marginBottom: 4, fontWeight: 800 }}>{theme.name}</h2>
            <p style={{ color: "#475569", fontSize: 12, marginBottom: 20 }}>商流サマリー — 大分類別採用状況</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 24 }}>
              {[
                { label: "累計コスト", value: totalCost ? `¥${totalCost.toLocaleString()}` : "—", color: "#0ea5e9" },
                { label: "採用確定セル", value: `${completedCells} / ${totalCells}`, color: "#22c55e" },
                { label: "大分類 / 部品数", value: `${categories.length}分類 / ${parts.length}部品`, color: "#a78bfa" },
              ].map(k => (
                <div key={k.label} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "14px 18px" }}>
                  <div style={{ fontSize: 10, color: "#64748b", marginBottom: 5 }}>{k.label}</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: k.color }}>{k.value}</div>
                </div>
              ))}
            </div>

            {/* 大分類ごとのテーブル */}
            {categories.map(cat => {
              const catParts = parts.filter(p => p.categoryId === cat.id);
              if (catParts.length === 0) return null;
              const catCost = catParts.reduce((s, part) =>
                s + processes.reduce((s2, _, ci) => {
                  const cell = getCell(part.id, ci);
                  const sel = cell.suppliers?.find(s => s.id === cell.selected);
                  return sel?.cost ? s2 + parseFloat(sel.cost) : s2;
                }, 0), 0);
              return (
                <div key={cat.id} style={{ marginBottom: 24 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: cat.color }} />
                    <span style={{ fontSize: 14, fontWeight: 700, color: cat.color }}>{cat.name}</span>
                    {catCost > 0 && <span style={{ fontSize: 12, color: "#475569" }}>小計 ¥{catCost.toLocaleString()}</span>}
                  </div>
                  <div style={{ overflowX: "auto", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, overflow: "hidden" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}>
                      <thead>
                        <tr style={{ borderBottom: "1px solid #1e293b" }}>
                          <th style={{ padding: "8px 12px", textAlign: "left", fontSize: 10, color: "#475569", minWidth: 100 }}>部品</th>
                          {processes.map(p => <th key={p.id} style={{ padding: "8px 12px", textAlign: "left", fontSize: 10, color: "#475569", minWidth: 110 }}>{p.name}</th>)}
                          <th style={{ padding: "8px 12px", textAlign: "right", fontSize: 10, color: "#475569" }}>小計</th>
                        </tr>
                      </thead>
                      <tbody>
                        {catParts.map(part => {
                          const partTotal = processes.reduce((s, _, ci) => {
                            const cell = getCell(part.id, ci);
                            const sel = cell.suppliers?.find(s => s.id === cell.selected);
                            return sel?.cost ? s + parseFloat(sel.cost) : s;
                          }, 0);
                          return (
                            <tr key={part.id} style={{ borderBottom: "1px solid #0f172a" }}>
                              <td style={{ padding: "10px 12px", fontSize: 12, fontWeight: 600, color: "#94a3b8" }}>{part.name}</td>
                              {processes.map((_, ci) => {
                                const cell = getCell(part.id, ci);
                                const s = cell.suppliers?.find(sup => sup.id === cell.selected);
                                return (
                                  <td key={ci} style={{ padding: "10px 12px" }}>
                                    {s ? (
                                      <div>
                                        <div style={{ fontSize: 11, fontWeight: 700, color: "#f1f5f9" }}>{s.name || "未入力"}</div>
                                        {s.cost && <div style={{ fontSize: 10, color: "#0ea5e9" }}>¥{parseFloat(s.cost).toLocaleString()}</div>}
                                        {s.leadTime && <div style={{ fontSize: 9, color: "#64748b" }}>LT:{s.leadTime}日</div>}
                                      </div>
                                    ) : <span style={{ fontSize: 10, color: "#334155" }}>未選択</span>}
                                  </td>
                                );
                              })}
                              <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, fontWeight: 700, color: partTotal ? "#0ea5e9" : "#334155" }}>
                                {partTotal ? `¥${partTotal.toLocaleString()}` : "—"}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* -- アーカイブ -- */}
        {view === "archive" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
              <div>
                <h2 style={{ color: "#f1f5f9", fontSize: 18, fontWeight: 800, margin: "0 0 4px" }}>📁 アーカイブ</h2>
                <p style={{ color: "#475569", fontSize: 12, margin: 0 }}>完了した開発テーマの記録。復元・Excel出力・削除ができます。</p>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 12, color: "#475569" }}>{archive.length} 件</span>
                <div style={{ width: 1, height: 20, background: "#1e293b" }} />
                {/* バックアップ */}
                <button onClick={handleExportBackup}
                  style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#94a3b8", padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  ⬇ バックアップ保存
                </button>
                <button onClick={() => importFileRef.current?.click()}
                  style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#94a3b8", padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                  ⬆ バックアップ復元
                </button>
              </div>
            </div>
            {importError && (
              <div style={{ background: "#450a0a", border: "1px solid #ef4444", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 12, color: "#ef4444" }}>
                ⚠ {importError}
              </div>
            )}
            {archive.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 20px", color: "#334155", border: "2px dashed #1e293b", borderRadius: 12 }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📂</div>
                <p style={{ margin: 0 }}>まだアーカイブはありません。<br/>ヘッダーの「✅ 完了」でテーマを保存すると表示されます。</p>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {archive.map(snap => {
                  const d = new Date(snap.archivedAt);
                  const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                  const prog = snap.totalCells > 0 ? Math.round(snap.completedCells / snap.totalCells * 100) : 0;
                  return (
                    <div key={snap.id} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: "18px 20px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 15, fontWeight: 800, color: "#f1f5f9", marginBottom: 6 }}>{snap.theme?.name || "無題"}</div>
                          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 10 }}>
                            <span style={{ fontSize: 11, color: "#475569" }}>🕐 {dateStr}</span>
                            <span style={{ fontSize: 11, color: "#64748b" }}>📦 {(snap.parts||[]).length}部品 / {(snap.categories||[]).length}大分類</span>
                            <span style={{ fontSize: 11, color: "#64748b" }}>⚙️ {(snap.processes||[]).length}工程</span>
                            {snap.totalCost > 0 && <span style={{ fontSize: 11, color: "#0ea5e9", fontWeight: 600 }}>¥{snap.totalCost.toLocaleString()}</span>}
                          </div>
                          {/* Progress bar */}
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ flex: 1, height: 5, background: "#1e293b", borderRadius: 3, overflow: "hidden" }}>
                              <div style={{ width: `${prog}%`, height: "100%", background: prog === 100 ? "#22c55e" : "#0ea5e9", borderRadius: 3 }} />
                            </div>
                            <span style={{ fontSize: 10, color: prog === 100 ? "#22c55e" : "#64748b", minWidth: 50 }}>{snap.completedCells}/{snap.totalCells} 確定 ({prog}%)</span>
                          </div>
                          {/* Category chips */}
                          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                            {(snap.categories||[]).map(cat => (
                              <span key={cat.id} style={{ fontSize: 10, background: cat.color + "22", color: cat.color, border: `1px solid ${cat.color}44`, borderRadius: 20, padding: "2px 8px" }}>{cat.name}</span>
                            ))}
                          </div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6, flexShrink: 0 }}>
                          <button onClick={() => editFromArchive(snap)}
                            style={{ background: "linear-gradient(135deg,#6366f1,#0ea5e9)", border: "none", borderRadius: 7, color: "#fff", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            ✏ 再編集
                          </button>
                          <div style={{ fontSize: 9, color: "#475569", textAlign: "center", marginTop: 2 }}>編集後に上書き/別名保存</div>
                          <button onClick={() => restoreArchiveItem(snap)}
                            style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#94a3b8", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            🔄 上書き復元
                          </button>
                          <button onClick={() => exportExcel(snap.theme, snap.categories, snap.parts, snap.processes, (partId, ci) => snap.matrix?.[`${partId}_${ci}`] || { suppliers: [], selected: null })}
                            style={{ background: "#14532d", border: "1px solid #22c55e33", borderRadius: 7, color: "#22c55e", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            📊 Excel
                          </button>
                          <button onClick={() => showConfirm(`「${snap.theme?.name}」を削除しますか？`, () => deleteArchiveItem(snap.id))}
                            style={{ background: "none", border: "1px solid #334155", borderRadius: 7, color: "#475569", padding: "6px 12px", fontSize: 11, cursor: "pointer" }}>
                            🗑 削除
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>

      {modal && (
        <CellModal
          partName={modal.partName}
          processName={processes[modal.processIdx]?.name}
          cellData={getCell(modal.partId, modal.processIdx)}
          onUpdate={data => setCell(modal.partId, modal.processIdx, data)}
          onClose={() => setModal(null)}
          showConfirm={showConfirm}
        />
      )}

      {/* 確認モーダル（window.confirm の代替） */}
      {confirmModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000, backdropFilter: "blur(4px)", padding: 20 }}>
          <div style={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 16, padding: "28px 24px", maxWidth: 360, width: "100%", textAlign: "center" }}>
            <div style={{ fontSize: 14, color: "#e2e8f0", marginBottom: 24, lineHeight: 1.6 }}>{confirmModal.message}</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button onClick={() => { setConfirmModal(null); }}
                style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#94a3b8", padding: "10px 24px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                キャンセル
              </button>
              <button onClick={() => { const fn = confirmModal.onOk; setConfirmModal(null); fn(); }}
                style={{ background: "linear-gradient(135deg,#6366f1,#0ea5e9)", border: "none", borderRadius: 8, color: "#fff", padding: "10px 24px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                OK
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body></html>
