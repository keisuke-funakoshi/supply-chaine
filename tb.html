// - ユーティリティ -
const SCORE_WEIGHTS = { cost: 0.35, leadTime: 0.25, quality: 0.25, moq: 0.15 };
let uid = 300;
const newId = () => "id" + (uid++);

function scoreSupplier(supplier, allSuppliers) {
  const parse = (v) => parseFloat(v) || 0;
  const vals = (key) => allSuppliers.map((s) => parse(s[key])).filter(Boolean);
  const norm = (val, arr, inv = false) => {
    if (!arr.length || !val) return 0;
    const [mn, mx] = [Math.min(...arr), Math.max(...arr)];
    if (mx === mn) return 100;
    const n = ((val - mn) / (mx - mn)) * 100;
    return Math.round(inv ? 100 - n : n);
  };
  const p = (k) => parse(supplier[k]);
  return Math.round(
    norm(p("cost"), vals("cost"), true) * SCORE_WEIGHTS.cost +
    norm(p("leadTime"), vals("leadTime"), true) * SCORE_WEIGHTS.leadTime +
    norm(p("quality"), vals("quality")) * SCORE_WEIGHTS.quality +
    norm(p("moq"), vals("moq"), true) * SCORE_WEIGHTS.moq
  );
}

function useDragSort(items, setItems) {
  const dragIdx = useRef(null);
  return {
    onDragStart: (i) => { dragIdx.current = i; },
    onDragOver: (e, i) => {
      e.preventDefault();
      if (dragIdx.current === null || dragIdx.current === i) return;
      const next = [...items];
      const [m] = next.splice(dragIdx.current, 1);
      next.splice(i, 0, m);
      dragIdx.current = i;
      setItems(next);
    },
    onDragEnd: () => { dragIdx.current = null; },
  };
}

// - アーカイブ (localStorage) -
const ARCHIVE_KEY = "shoury_archive_v1";
function loadArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || "[]"); } catch { return []; }
}
function saveToArchive(snapshot) {
  const list = loadArchive();
  list.unshift(snapshot);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list.slice(0, 50)));
}
function deleteFromArchive(id) {
  const list = loadArchive().filter(s => s.id !== id);
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list));
}

function exportBackup(theme, categories, parts, processes, matrix, archive) {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    current: { theme, categories, parts, processes, matrix },
    archive,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "shoury_backup_" + (new Date().toISOString().slice(0,10)) + ".json";
  a.click();
  URL.revokeObjectURL(url);
}
