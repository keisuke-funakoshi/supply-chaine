<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<style>body{background:#020817;color:#fff;padding:20px;font-family:sans-serif}</style>
</head><body>
<div id="root">読み込み中...</div>
<div id="log" style="color:#0f0;font-size:12px;margin-top:10px"></div>
<script>
function log(msg){ document.getElementById('log').innerHTML += msg + '<br>'; }
window.onerror=function(msg,src,line){
  document.getElementById('root').innerHTML='<span style="color:red">ERROR: '+msg+' (line '+line+')</span>';
};
log('Step 1: Starting...');
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
  onload="log('Step 2: React OK')" onerror="log('Step 2: React FAILED')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
  onload="log('Step 3: ReactDOM OK')" onerror="log('Step 3: ReactDOM FAILED')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"
  onload="log('Step 4: Babel OK')" onerror="log('Step 4: Babel FAILED')"></script>
<script type="text/babel" data-presets="react">
function App() {
  return <div style={{color:'#22c55e',fontSize:20}}>✓ 動作確認OK</div>;
}
document.getElementById('log').innerHTML += 'Step 5: JSX OK<br>';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body></html>
