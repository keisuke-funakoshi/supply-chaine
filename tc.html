const {useState,useRef,useCallback,useEffect,useMemo}=React;
// - ユーティリティ -
const SCORE_WEIGHTS = { cost: 0.35, leadTime: 0.25, quality: 0.25, moq: 0.15 };
let uid = 300;
const newId = () => "id" + (uid++);

function scoreSupplier(supplier, allSuppliers) {
  const parse = (v) => parseFloat(v) || 0;
  const vals = (key) => allSuppliers.map((s) => parse(s[key])).filter(Boolean);
  const norm = (val, arr, inv = false) => {
    if (!arr.length || !val) return 0;
    const [mn, mx] = [Math.min(...arr), Math.max(...arr)];
    if (mx === mn) return 100;
    const n = ((val - mn) / (mx - mn)) * 100;
    return Math.round(inv ? 100 - n : n);
  };
  const p = (k) => parse(supplier[k]);
  return Math.round(
    norm(p("cost"), vals("cost"), true) * SCORE_WEIGHTS.cost +
    norm(p("leadTime"), vals("leadTime"), true) * SCORE_WEIGHTS.leadTime +
    norm(p("quality"), vals("quality")) * SCORE_WEIGHTS.quality +
    norm(p("moq"), vals("moq"), true) * SCORE_WEIGHTS.moq
  );
}
